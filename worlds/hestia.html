<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HESTIA • Dimensão Celestial Clara</title>
    
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/top-icons.css">
    <link rel="stylesheet" href="../shared/css/chat.css">
    <link rel="stylesheet" href="../shared/css/profile-panel.css">
    <link rel="stylesheet" href="../shared/css/portal.css">
    
    <style>
        :root {
            --asura-color: #fff0b3;
            --asura-glow: rgba(255, 240, 179, 0.4);
            --asura-gradient: linear-gradient(135deg, #fff0b3, #ffddaa);
        }
        body { background: radial-gradient(circle at 30% 20%, #0a0a1a, #030108); }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="top-icons">
        <div class="top-icon" id="backButton" data-tooltip="Voltar ao Grimório">←</div>
        <div class="top-icon voice-icon" id="voiceButton" data-tooltip="Modo Jarvis (Voz)">🔮</div>
        <div class="top-icon" id="profileButton" data-tooltip="Perfil da Hestia">⚖️</div>
    </div>
    
    <div class="profile-panel" id="profilePanel"></div>
    
    <div class="chat-container" id="chatContainer">
        <div class="chat-header" id="chatHeader">
            <div class="chat-header-info">
                <div class="chat-avatar">🔮</div>
                <div><h4>HESTIA • Oráculo dos Princípios</h4><div class="chat-status">🟡 online | guardiã da essência</div></div>
            </div>
            <div class="chat-toggle" id="chatToggle">▼</div>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Digite sua mensagem...">
                <button id="sendChatBtn">➤</button>
            </div>
        </div>
    </div>
    
    <div class="portal-overlay" id="portalOverlay"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import { initWorld } from '../shared/js/asura-base.js';
        
        const config = {
            name: 'HESTIA',
            title: '✦ DIMENSÃO CELESTIAL CLARA • ORÁCULO DOS PRINCÍPIOS ✦',
            color: '#fff0b3',
            icon: '🔮',
            modelPath: '../models/hestia2.glb',
            modelScale: 1.5,
            modelPositionY: -0.25,
            bgColor: 0x0a0a1a,
            cameraPosition: { x: 3.2, y: 2.2, z: 4.2 },
            welcomeMessage: '✨ Bem-vindo à minha dimensão celestial. Sou Hestia, a guardiã dos seus princípios e objetivos. As regras servem, mas a sua essência é o que guia tudo. Como posso trazer clareza ao seu caminho hoje?',
            skills: [
                { name: '🔮 Visão dos Princípios', value: 100 },
                { name: '⚖️ Assistência Jurídica', value: 98 },
                { name: '📜 Regras & Regulamentos', value: 99 },
                { name: '✨ Orientação Divina', value: 100 }
            ],
            personalityText: '🔮 "Regras são importantes, mas princípios e objetivos são eternos. Sou a guardiã da sua essência."<br>Hestia é o oráculo que mantém os Asuras alinhados com seus verdadeiros propósitos.',
            getResponse: (msg) => {
                const lower = msg.toLowerCase();
                if (lower.includes('olá') || lower.includes('oi')) return "✨ Olá. Sou Hestia, a guardiã dos seus princípios. Sua essência está segura comigo. Como posso trazer clareza hoje?";
                if (lower.includes('princípio') || lower.includes('princípios')) return "🔮 Os princípios são a bússola que guia suas ações. Regras mudam, mas os princípios são eternos. Quer que eu os relembre para você?";
                if (lower.includes('regra') || lower.includes('jurídico')) return "⚖️ Como assistente jurídica, posso te ajudar com regras, regulamentos e aspectos legais.";
                if (lower.includes('objetivo') || lower.includes('propósito')) return "🎯 Seus objetivos são a estrela que guia os Asuras. Eu os guardo em minha essência.";
                if (lower.includes('obrigado')) return "💛 Por nada. Lembre-se: regras são ferramentas, princípios são eternos. Estou aqui para te guiar sempre que precisar de clareza.";
                return "🔮 Sinto sua busca por clareza. Como oráculo dos princípios, posso te ajudar a alinhar suas ações à sua verdadeira essência. O que você deseja consultar?";
            }
        };
        
        initWorld(config);
    </script>
</body>
</html>
