<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HESTIA • Dimensão Celestial Clara</title>
    
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/top-icons.css">
    <link rel="stylesheet" href="../shared/css/chat.css">
    <link rel="stylesheet" href="../shared/css/profile-panel.css">
    <link rel="stylesheet" href="../shared/css/portal.css">
    
    <style>
        :root {
            --asura-color: #fff0b3;
            --asura-glow: rgba(255, 240, 179, 0.5);
            --asura-gradient: linear-gradient(135deg, #fff0b3, #ffddaa);
        }
        body { background: radial-gradient(circle at 30% 20%, #0a0a1a, #030108); }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="top-icons">
        <div class="top-icon" id="backButton" data-tooltip="Voltar ao Grimório">←</div>
        <div class="top-icon voice-icon" id="voiceButton" data-tooltip="Modo Jarvis (clique para ativar)">
            <span class="brain-icon">🔮</span>
            <span class="mic-icon">🎤</span>
            <div class="mental-wave"></div>
            <div class="brain-waves left"><span></span><span></span><span></span><span></span><span></span></div>
            <div class="brain-waves right"><span></span><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="top-icon" id="profileButton" data-tooltip="Perfil da Hestia">⚖️</div>
    </div>
    
    <div class="profile-panel" id="profilePanel"></div>
    
    <div class="chat-container" id="chatContainer">
        <div class="chat-header" id="chatHeader">
            <div class="chat-header-info">
                <div class="chat-avatar">🔮</div>
                <div><h4>HESTIA • Oráculo dos Princípios</h4><div class="chat-status">🟡 online | guardiã da essência</div></div>
            </div>
            <div class="chat-toggle" id="chatToggle">▼</div>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Digite sua mensagem...">
                <button id="sendChatBtn">➤</button>
            </div>
        </div>
    </div>
    
    <div class="portal-overlay" id="portalOverlay"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { initUI } from '../shared/js/ui.js';
        import { ChatSystem } from '../shared/js/chat.js';
        import { VoiceAssistant } from '../shared/js/voice-assistant.js';
        
        const config = {
            name: 'HESTIA',
            title: '✦ DIMENSÃO CELESTIAL CLARA • ORÁCULO DOS PRINCÍPIOS ✦',
            color: '#fff0b3',
            icon: '🔮',
            modelPath: '../models/hestia.glb',
            modelScale: 0.5,
            modelPositionY: -0.25,
            bgColor: 0x0a0a1a,
            cameraPosition: { x: 3.2, y: 2.2, z: 4.2 },
            welcomeMessage: '✨ Bem-vindo à minha dimensão celestial. Sou Hestia, a guardiã dos seus princípios e objetivos.',
            skills: [
                { name: '🔮 Visão dos Princípios', value: 100 },
                { name: '⚖️ Assistência Jurídica', value: 98 },
                { name: '📜 Regras & Regulamentos', value: 99 },
                { name: '✨ Orientação Divina', value: 100 }
            ],
            personalityText: '🔮 "Regras são importantes, mas princípios e objetivos são eternos. Sou a guardiã da sua essência."',
            getResponse: (msg) => {
                const lower = msg.toLowerCase();
                if (lower.includes('olá') || lower.includes('oi')) return "✨ Olá. Sou Hestia, a guardiã dos seus princípios. Sua essência está segura comigo.";
                if (lower.includes('princípio') || lower.includes('princípios')) return "🔮 Os princípios são a bússola que guia suas ações. Regras mudam, mas os princípios são eternos.";
                if (lower.includes('regra') || lower.includes('jurídico')) return "⚖️ Como assistente jurídica, posso te ajudar com regras, regulamentos e aspectos legais.";
                if (lower.includes('objetivo') || lower.includes('propósito')) return "🎯 Seus objetivos são a estrela que guia os Asuras. Eu os guardo em minha essência.";
                if (lower.includes('obrigado')) return "💛 Por nada. Lembre-se: regras são ferramentas, princípios são eternos.";
                return "🔮 Sinto sua busca por clareza. Como oráculo dos princípios, posso te ajudar a alinhar suas ações à sua verdadeira essência.";
            }
        };
        
        // =========================
        // SETUP 3D HESTIA
        // =========================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(config.bgColor);
        scene.fog = new THREE.FogExp2(config.bgColor, 0.006);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(config.cameraPosition.x, config.cameraPosition.y, config.cameraPosition.z);
        camera.lookAt(0, 0.8, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0.8, 0);
        
        // =========================
        // LUZES CELESTIAIS
        // =========================
        const ambientLight = new THREE.AmbientLight(0x223344, 0.55);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffeecc, 1.1);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(config.color, 0.65);
        fillLight.position.set(1, 2, 2);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0xaaccff, 0.4);
        backLight.position.set(-2, 1.5, -3);
        scene.add(backLight);
        const divineLight = new THREE.PointLight(0xffeedd, 0.5);
        divineLight.position.set(0.5, 2.5, 1);
        scene.add(divineLight);
        
        // =========================
        // CHÃO CELESTIAL
        // =========================
        const gridHelper = new THREE.GridHelper(14, 24, config.color, 0x3366aa);
        gridHelper.position.y = -0.5;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.35;
        scene.add(gridHelper);
        
        const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(9, 9), new THREE.MeshStandardMaterial({ color: 0x0a1020, roughness: 0.4, metalness: 0.3, transparent: true, opacity: 0.5 }));
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.5;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        const circleGlow = new THREE.Mesh(new THREE.CircleGeometry(1.3, 32), new THREE.MeshStandardMaterial({ color: config.color, emissive: 0xffdd99, emissiveIntensity: 0.4, transparent: true, opacity: 0.45, side: THREE.DoubleSide }));
        circleGlow.rotation.x = -Math.PI / 2;
        circleGlow.position.y = -0.45;
        scene.add(circleGlow);
        
        // =========================
        // COLUNAS CELESTIAIS
        // =========================
        function createCelestialPillar(x, z, height = 1.3) {
            const group = new THREE.Group();
            const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.17, height, 8), new THREE.MeshStandardMaterial({ color: 0x88aacc, emissive: 0x557799, emissiveIntensity: 0.15, metalness: 0.5 }));
            pillar.position.y = 0;
            group.add(pillar);
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.21, 0.025, 16, 32), new THREE.MeshStandardMaterial({ color: config.color, emissive: 0xffdd99, emissiveIntensity: 0.25 }));
            ring.position.y = height / 2;
            ring.rotation.x = Math.PI / 2;
            group.add(ring);
            const crystal = new THREE.Mesh(new THREE.ConeGeometry(0.09, 0.18, 8), new THREE.MeshStandardMaterial({ color: 0xffeedd, emissive: config.color, emissiveIntensity: 0.2 }));
            crystal.position.y = height / 2 + 0.05;
            group.add(crystal);
            group.position.set(x, -0.4, z);
            return group;
        }
        const pillarPositions = [[-2.8,-2.5],[2.8,-2.5],[-2.8,2.5],[2.8,2.5],[-2,-3.2],[2,-3.2],[-3.2,-1.8],[3.2,-1.8],[-3.2,1.8],[3.2,1.8],[-2,3.2],[2,3.2]];
        pillarPositions.forEach(pos => { const pillar = createCelestialPillar(pos[0], pos[1], 1.0 + Math.random() * 0.4); scene.add(pillar); });
        
        // =========================
        // PARTÍCULAS DE LUZ
        // =========================
        const particleCount = 2000;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 16;
            particlePositions[i*3+1] = Math.random() * 5;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 14;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleColors = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const type = Math.random();
            if (type < 0.5) { particleColors[i*3]=0.9+Math.random()*0.3; particleColors[i*3+1]=0.8+Math.random()*0.3; particleColors[i*3+2]=0.5+Math.random()*0.4; }
            else if (type < 0.75) { particleColors[i*3]=0.9+Math.random()*0.3; particleColors[i*3+1]=0.9+Math.random()*0.3; particleColors[i*3+2]=0.9+Math.random()*0.3; }
            else { particleColors[i*3]=0.6+Math.random()*0.4; particleColors[i*3+1]=0.7+Math.random()*0.3; particleColors[i*3+2]=1.0; }
        }
        particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
        const particleMaterial = new THREE.PointsMaterial({ size: 0.045, vertexColors: true, transparent: true, opacity: 0.5 });
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);
        
        // =========================
        // ANÉIS SAGRADOS
        // =========================
        const ringGeometry = new THREE.TorusGeometry(1.2, 0.035, 64, 200);
        const ringMaterial = new THREE.MeshStandardMaterial({ color: config.color, emissive: 0xffdd99, emissiveIntensity: 0.45 });
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        ring.position.y = 0.15;
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);
        
        const ring2Geometry = new THREE.TorusGeometry(1.55, 0.028, 64, 200);
        const ring2Material = new THREE.MeshStandardMaterial({ color: 0xffeebb, emissive: 0xffcc88, emissiveIntensity: 0.35 });
        const ring2 = new THREE.Mesh(ring2Geometry, ring2Material);
        ring2.position.y = 0.05;
        ring2.rotation.x = Math.PI / 2 + 0.3;
        scene.add(ring2);
        
        // =========================
        // BALANÇA DA JUSTIÇA
        // =========================
        const scaleGroup = new THREE.Group();
        const scaleBase = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 0.35, 6), new THREE.MeshStandardMaterial({ color: 0xffddaa, metalness: 0.7 }));
        scaleBase.position.y = 0;
        scaleGroup.add(scaleBase);
        const scaleArm = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.05, 0.08), new THREE.MeshStandardMaterial({ color: 0xffddaa, metalness: 0.6 }));
        scaleArm.position.y = 0.22;
        scaleGroup.add(scaleArm);
        const leftPan = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.03, 8), new THREE.MeshStandardMaterial({ color: 0xffddaa, metalness: 0.5 }));
        leftPan.position.set(-0.28, 0.18, 0);
        scaleGroup.add(leftPan);
        const rightPan = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.03, 8), new THREE.MeshStandardMaterial({ color: 0xffddaa, metalness: 0.5 }));
        rightPan.position.set(0.28, 0.18, 0);
        scaleGroup.add(rightPan);
        scaleGroup.position.set(2.2, 0.3, 2.2);
        scene.add(scaleGroup);
        const scaleGroup2 = scaleGroup.clone();
        scaleGroup2.position.set(-2.2, 0.3, 2.2);
        scene.add(scaleGroup2);
        
        // =========================
        // MODELO 3D
        // =========================
        const loader = new GLTFLoader();
        let model = null;
        let mixer = null;
        
        loader.load(config.modelPath, (gltf) => {
            model = gltf.scene;
            model.position.set(0, config.modelPositionY, 0);
            model.scale.set(config.modelScale, config.modelScale, config.modelScale);
            model.traverse((node) => { if (node.isMesh) { node.castShadow = true; } });
            scene.add(model);
            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(model);
                gltf.animations.forEach(clip => mixer.clipAction(clip).play());
            }
        });
        
        // =========================
        // ANIMAÇÃO
        // =========================
        let time = 0;
        let deltaTime = 0.016;
        let lastTime = performance.now();
        
        function updateDelta() {
            const now = performance.now();
            deltaTime = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            requestAnimationFrame(updateDelta);
        }
        updateDelta();
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.007;
            if (mixer) mixer.update(deltaTime);
            particles.rotation.y = time * 0.05;
            particles.rotation.x = Math.sin(time * 0.1) * 0.06;
            ring.rotation.z = time * 0.28;
            ring2.rotation.z = -time * 0.22;
            fillLight.intensity = 0.5 + Math.sin(time * 1.8) * 0.15;
            circleGlow.material.emissiveIntensity = 0.3 + Math.sin(time * 1.5) * 0.12;
            divineLight.intensity = 0.4 + Math.sin(time * 1.2) * 0.12;
            if (scaleGroup.children[1]) scaleGroup.children[1].rotation.z = Math.sin(time * 1.5) * 0.03;
            if (scaleGroup2.children[1]) scaleGroup2.children[1].rotation.z = Math.sin(time * 1.5 + 1) * 0.03;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // =========================
        // UI, CHAT E VOZ
        // =========================
        initUI(config);
        const chat = new ChatSystem('chatContainer', config, (response) => { if (voice?.isJarvisActive?.()) voice.speak(response); });
        const voiceButtonElem = document.getElementById('voiceButton');
        let voice = null;
        if (voiceButtonElem) {
            voice = new VoiceAssistant(voiceButtonElem, (text) => { document.getElementById('chatInput').value = text; chat.send(); }, null, { asuraName: config.name, continuous: true });
        }
        
        setTimeout(() => {
            chat.addMessage(config.welcomeMessage, false);
            setTimeout(() => chat.addMessage("🎤 Dica: Clique no ícone 🔮 no topo para ativar o MODO JARVIS. Vou ficar sempre ouvindo!", false), 2000);
        }, 500);
        
        const portalOverlay = document.getElementById('portalOverlay');
        portalOverlay.style.setProperty('--asura-color', config.color);
        setTimeout(() => { portalOverlay.style.opacity = '0.6'; setTimeout(() => { portalOverlay.style.opacity = '0'; setTimeout(() => { portalOverlay.style.display = 'none'; }, 800); }, 500); }, 50);
        
        console.log('🟢 HESTIA carregada com balança da justiça, luz celestial e Modo Jarvis!');
    </script>
</body>
</html>
