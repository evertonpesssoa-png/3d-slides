<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HESTIA • Dimensão Celestial Clara</title>
    
    <!-- FONTE EXCLUSIVA PARA HESTIA - ESTILO CELESTIAL CLARO -->
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/top-icons.css">
    <link rel="stylesheet" href="../shared/css/chat.css">
    <link rel="stylesheet" href="../shared/css/profile-panel.css">
    <link rel="stylesheet" href="../shared/css/portal.css">
    
    <style>
        :root {
            --asura-color: #fff0b3;
            --asura-glow: rgba(255, 240, 179, 0.5);
            --asura-gradient: linear-gradient(135deg, #fff0b3, #ffddaa);
        }
        body { background: radial-gradient(circle at 30% 20%, #0a0a1a, #030108); }
        
        /* =========================
           BOTÃO DO PORTAL - TOPO ESQUERDO
        ========================= */
        .portal-planner-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            color: #fff0b3;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 28px;
            z-index: 9999;
            border: 2px solid #fff0b3;
            box-shadow: 0 0 20px rgba(255, 240, 179, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
            font-family: monospace;
        }
        
        .portal-planner-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 35px rgba(255, 240, 179, 0.8);
            background: rgba(255, 240, 179, 0.2);
        }
        
        .portal-planner-btn::before {
            content: "🗺️ Portal Planner";
            position: absolute;
            top: 70px;
            left: 0;
            background: rgba(0,0,0,0.9);
            color: #fff0b3;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            font-family: 'Poppins', sans-serif;
            border: 1px solid #fff0b3;
        }
        
        .portal-planner-btn:hover::before { opacity: 1; }
        
        body.transition-out {
            opacity: 0;
            transform: scale(0.98);
            transition: all 0.4s ease;
        }
        
        /* =========================
           CHAT MELHORADO - ESTILO CELESTIAL CLARO
        ========================= */
        .chat-container {
            position: fixed !important;
            bottom: 20px !important;
            right: 20px !important;
            width: 340px !important;
            max-width: calc(100% - 40px) !important;
            background: rgba(10, 10, 26, 0.95) !important;
            backdrop-filter: blur(12px) !important;
            border-radius: 16px !important;
            border: 1px solid rgba(255, 240, 179, 0.3) !important;
            box-shadow: 0 5px 30px rgba(0,0,0,0.5), 0 0 15px rgba(255, 240, 179, 0.2) !important;
            z-index: 9998 !important;
            overflow: hidden !important;
        }
        
        .chat-header {
            background: rgba(0, 0, 0, 0.9) !important;
            padding: 12px 15px !important;
            cursor: pointer !important;
            border-bottom: 1px solid #fff0b3 !important;
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
        }
        
        .chat-header-info {
            display: flex !important;
            align-items: center !important;
            gap: 10px !important;
        }
        
        .chat-avatar { font-size: 24px !important; }
        .chat-header-info h4 {
            font-size: 14px !important;
            margin: 0 !important;
            color: #fff0b3 !important;
            font-family: 'Lora', serif !important;
            letter-spacing: 0.5px !important;
        }
        .chat-status { font-size: 10px !important; color: #0f0 !important; }
        .chat-toggle { color: #fff0b3 !important; font-size: 18px !important; }
        
        .chat-body {
            display: flex !important;
            flex-direction: column !important;
            height: 380px !important;
        }
        
        .chat-body.collapsed {
            display: none !important;
        }
        
        .chat-messages {
            flex: 1 !important;
            overflow-y: auto !important;
            padding: 12px !important;
            display: flex !important;
            flex-direction: column !important;
            gap: 10px !important;
            background: rgba(0, 0, 0, 0.5) !important;
        }
        
        .message {
            display: flex !important;
            gap: 10px !important;
            max-width: 90% !important;
        }
        
        .message.user {
            align-self: flex-end !important;
            flex-direction: row-reverse !important;
        }
        
        .message-avatar {
            width: 32px !important;
            height: 32px !important;
            border-radius: 50% !important;
            background: rgba(255, 240, 179, 0.2) !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            font-size: 16px !important;
        }
        
        .message-content {
            background: rgba(255, 240, 179, 0.12) !important;
            border: 1px solid #fff0b3 !important;
            border-radius: 15px !important;
            padding: 8px 12px !important;
            color: #fff5e0 !important;
            font-size: 13px !important;
            font-family: 'Lora', serif !important;
            position: relative !important;
            word-break: break-word !important;
        }
        
        .message.user .message-content {
            background: rgba(255, 240, 179, 0.2) !important;
        }
        
        .message-time {
            font-size: 9px !important;
            color: rgba(255,255,255,0.5) !important;
            margin-top: 4px !important;
            text-align: right !important;
        }
        
        .chat-image {
            max-width: 180px !important;
            max-height: 150px !important;
            border-radius: 10px !important;
            margin-top: 5px !important;
            border: 1px solid #fff0b3 !important;
            cursor: pointer !important;
        }
        
        .chat-file {
            display: flex !important;
            align-items: center !important;
            gap: 8px !important;
            background: rgba(255, 240, 179, 0.1) !important;
            border: 1px solid #fff0b3 !important;
            border-radius: 10px !important;
            padding: 8px 12px !important;
            margin-top: 5px !important;
            cursor: pointer !important;
            transition: all 0.2s !important;
        }
        
        .chat-file:hover {
            background: rgba(255, 240, 179, 0.25) !important;
            transform: scale(1.01) !important;
        }
        
        .file-icon { font-size: 24px !important; }
        .file-info { flex: 1 !important; overflow: hidden !important; }
        .file-name {
            font-size: 11px !important;
            color: #fff0b3 !important;
            white-space: nowrap !important;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
        }
        .file-size { font-size: 9px !important; color: #888 !important; }
        .file-badge {
            background: rgba(255, 240, 179, 0.2) !important;
            border-radius: 4px !important;
            padding: 2px 6px !important;
            font-size: 9px !important;
            color: #fff0b3 !important;
        }
        
        .chat-input-area {
            display: flex !important;
            gap: 8px !important;
            padding: 10px !important;
            background: rgba(0, 0, 0, 0.85) !important;
            border-top: 1px solid rgba(255, 240, 179, 0.2) !important;
            align-items: center !important;
        }
        
        .chat-input-area input[type="text"] {
            flex: 1 !important;
            background: rgba(10, 20, 40, 0.9) !important;
            border: 1px solid #fff0b3 !important;
            border-radius: 25px !important;
            padding: 10px 15px !important;
            color: #fff0b3 !important;
            font-family: 'Lora', serif !important;
            font-size: 12px !important;
            outline: none !important;
        }
        
        .chat-input-area input[type="text"]:focus {
            box-shadow: 0 0 10px rgba(255, 240, 179, 0.5) !important;
        }
        
        .chat-input-area button {
            background: rgba(0, 0, 0, 0.8) !important;
            border: 1px solid #fff0b3 !important;
            color: #fff0b3 !important;
            width: 38px !important;
            height: 38px !important;
            border-radius: 50% !important;
            cursor: pointer !important;
            font-size: 16px !important;
            transition: all 0.2s !important;
        }
        
        .chat-input-area button:hover {
            transform: scale(1.05) !important;
            box-shadow: 0 0 10px rgba(255, 240, 179, 0.5) !important;
            background: rgba(255, 240, 179, 0.2) !important;
        }
        
        .attach-btn {
            background: rgba(0, 0, 0, 0.8) !important;
            border: 1px solid #fff0b3 !important;
            color: #fff0b3 !important;
            width: 38px !important;
            height: 38px !important;
            border-radius: 50% !important;
            cursor: pointer !important;
            font-size: 16px !important;
            transition: all 0.2s !important;
        }
        
        .attach-btn:hover {
            transform: scale(1.05) !important;
            box-shadow: 0 0 10px rgba(255, 240, 179, 0.5) !important;
            background: rgba(255, 240, 179, 0.2) !important;
        }
        
        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-track { background: #0a0a1a; }
        .chat-messages::-webkit-scrollbar-thumb { background: #fff0b3; border-radius: 5px; }
        
        @media (max-width: 600px) {
            .chat-container { width: calc(100% - 20px) !important; right: 10px !important; bottom: 10px !important; }
            .chat-messages { height: 280px !important; }
            .chat-image { max-width: 130px !important; }
            .chat-file { padding: 6px 10px !important; }
            .file-icon { font-size: 20px !important; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <!-- BOTÃO DO PORTAL PLANNER -->
    <div class="portal-planner-btn" id="portalPlannerBtn" title="Abrir Portal Planner">
        🗺️
    </div>
    
    <div class="top-icons">
        <div class="top-icon" id="backButton" data-tooltip="Voltar ao Grimório">←</div>
        <div class="top-icon voice-icon" id="voiceButton" data-tooltip="Modo Jarvis (clique para ativar)">
            <span class="brain-icon">🔮</span>
            <span class="mic-icon">🎤</span>
            <div class="mental-wave"></div>
            <div class="brain-waves left"><span></span><span></span><span></span><span></span><span></span></div>
            <div class="brain-waves right"><span></span><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="top-icon" id="profileButton" data-tooltip="Perfil da Hestia">⚖️</div>
    </div>
    
    <div class="profile-panel" id="profilePanel"></div>
    
    <div class="chat-container" id="chatContainer">
        <div class="chat-header" id="chatHeader">
            <div class="chat-header-info">
                <div class="chat-avatar">🔮</div>
                <div><h4>HESTIA • Oráculo dos Princípios</h4><div class="chat-status">🟡 online | guardiã da essência</div></div>
            </div>
            <div class="chat-toggle" id="chatToggle">▼</div>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Digite sua mensagem...">
                <button id="sendChatBtn">➤</button>
            </div>
        </div>
    </div>
    
    <div class="portal-overlay" id="portalOverlay"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { initUI } from '../shared/js/ui.js';
        import { ChatSystem } from '../shared/js/chat.js';
        import { VoiceAssistant } from '../shared/js/voice-assistant.js';
        
        // =========================
        // EXTENDE O CHAT SYSTEM ORIGINAL PARA ADICIONAR ANEXO
        // =========================
        const OriginalChatSystem = ChatSystem;
        
        class EnhancedChatSystem extends OriginalChatSystem {
            constructor(containerId, config, onSpeak) {
                super(containerId, config, onSpeak);
                this.addAttachButton();
                
                setTimeout(() => {
                    if (this.chatBody) {
                        this.chatBody.classList.add('collapsed');
                    }
                    if (this.chatToggle) {
                        this.chatToggle.textContent = '▲';
                    }
                }, 100);
            }
            
            addAttachButton() {
                const inputArea = this.container.querySelector('.chat-input-area');
                if (!inputArea || inputArea.querySelector('.attach-btn')) return;
                
                const attachBtn = document.createElement('button');
                attachBtn.className = 'attach-btn';
                attachBtn.innerHTML = '📎';
                attachBtn.title = 'Enviar arquivo (imagem, PDF, DOC, etc)';
                
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = '*/*';
                fileInput.style.display = 'none';
                fileInput.multiple = false;
                
                attachBtn.onclick = () => fileInput.click();
                fileInput.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        this.handleFileUpload(file);
                    }
                    fileInput.value = '';
                };
                
                const textInput = inputArea.querySelector('input[type="text"]');
                if (textInput) {
                    inputArea.insertBefore(attachBtn, textInput);
                    inputArea.insertBefore(fileInput, textInput);
                }
            }
            
            handleFileUpload(file) {
                const fileType = file.type;
                const fileName = file.name;
                const fileSize = this.formatFileSize(file.size);
                const fileExtension = fileName.split('.').pop().toUpperCase();
                
                if (fileType.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        this.addImageMessage(ev.target.result, fileName, fileSize);
                    };
                    reader.readAsDataURL(file);
                } else {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        this.addFileMessage(ev.target.result, fileName, fileSize, fileExtension);
                    };
                    reader.readAsDataURL(file);
                }
            }
            
            formatFileSize(bytes) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }
            
            getFileIcon(extension) {
                const icons = {
                    'PDF': '📄', 'DOC': '📃', 'DOCX': '📃',
                    'XLS': '📊', 'XLSX': '📊', 'PPT': '📽️', 'PPTX': '📽️',
                    'TXT': '📝', 'ZIP': '🗜️', 'RAR': '🗜️',
                    'MP3': '🎵', 'MP4': '🎬', 'JPG': '🖼️', 'PNG': '🖼️',
                    'GIF': '🎞️', 'JSON': '🔧', 'XML': '🔧', 'HTML': '🌐'
                };
                return icons[extension] || '📎';
            }
            
            addImageMessage(imageUrl, fileName, fileSize) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message user';
                const time = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                
                messageDiv.innerHTML = `
                    <div class="message-avatar">👤</div>
                    <div class="message-content">
                        <div>🖼️ ${fileName} <span style="font-size:9px; color:#888;">(${fileSize})</span></div>
                        <img src="${imageUrl}" class="chat-image" onclick="window.open('${imageUrl}')">
                        <div class="message-time">${time}</div>
                    </div>
                `;
                
                this.messagesContainer.appendChild(messageDiv);
                this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
                
                const messages = this.getMessages ? this.getMessages() : [];
                if (this.saveMessages) {
                    messages.push({
                        text: `🖼️ ${fileName} (${fileSize})`,
                        image: imageUrl,
                        isUser: true,
                        timestamp: Date.now()
                    });
                    this.saveMessages(messages);
                }
            }
            
            addFileMessage(fileData, fileName, fileSize, extension) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message user';
                const time = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                const fileIcon = this.getFileIcon(extension);
                const downloadUrl = fileData;
                
                messageDiv.innerHTML = `
                    <div class="message-avatar">👤</div>
                    <div class="message-content">
                        <div>📎 Arquivo anexado</div>
                        <div class="chat-file" onclick="window.open('${downloadUrl}')">
                            <div class="file-icon">${fileIcon}</div>
                            <div class="file-info">
                                <div class="file-name">${fileName}</div>
                                <div class="file-size">${fileSize}</div>
                            </div>
                            <div class="file-badge">${extension}</div>
                        </div>
                        <div class="message-time">${time}</div>
                    </div>
                `;
                
                this.messagesContainer.appendChild(messageDiv);
                this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
                
                const messages = this.getMessages ? this.getMessages() : [];
                if (this.saveMessages) {
                    messages.push({
                        text: `📎 ${fileName} (${fileSize})`,
                        fileData: fileData,
                        isUser: true,
                        timestamp: Date.now()
                    });
                    this.saveMessages(messages);
                }
            }
        }
        
        const config = {
            name: 'HESTIA',
            title: '✦ DIMENSÃO CELESTIAL CLARA • ORÁCULO DOS PRINCÍPIOS ✦',
            color: '#fff0b3',
            icon: '🔮',
            modelPath: '../models/hestia2.glb',
            modelScale: 0.8,
            modelPositionY: -0.25,
            bgColor: 0x0a0a1a,
            cameraPosition: { x: 3.2, y: 2.2, z: 4.2 },
            welcomeMessage: '✨ Bem-vindo à minha dimensão celestial. Sou Hestia, a guardiã dos seus princípios e objetivos.',
            skills: [
                { name: '🔮 Visão dos Princípios', value: 100 },
                { name: '⚖️ Assistência Jurídica', value: 98 },
                { name: '📜 Regras & Regulamentos', value: 99 },
                { name: '✨ Orientação Divina', value: 100 }
            ],
            personalityText: '🔮 "Regras são importantes, mas princípios e objetivos são eternos. Sou a guardiã da sua essência."',
            getResponse: (msg) => {
                const lower = msg.toLowerCase();
                if (lower.includes('olá') || lower.includes('oi')) return "✨ Olá. Sou Hestia, a guardiã dos seus princípios. Sua essência está segura comigo.";
                if (lower.includes('princípio') || lower.includes('princípios')) return "🔮 Os princípios são a bússola que guia suas ações. Regras mudam, mas os princípios são eternos.";
                if (lower.includes('regra') || lower.includes('jurídico')) return "⚖️ Como assistente jurídica, posso te ajudar com regras, regulamentos e aspectos legais.";
                if (lower.includes('objetivo') || lower.includes('propósito')) return "🎯 Seus objetivos são a estrela que guia os Asuras. Eu os guardo em minha essência.";
                if (lower.includes('imagem') || lower.includes('foto') || lower.includes('arquivo')) return "📎 Arquivo recebido! Analisando sob a luz dos princípios... Tudo está em harmonia.";
                if (lower.includes('obrigado')) return "💛 Por nada. Lembre-se: regras são ferramentas, princípios são eternos.";
                return "🔮 Sinto sua busca por clareza. Como oráculo dos princípios, posso te ajudar a alinhar suas ações à sua verdadeira essência.";
            }
        };
        
        // =========================
        // BOTÃO PORTAL PLANNER
        // =========================
        const portalPlannerBtn = document.getElementById('portalPlannerBtn');
        
        function openPortalPlanner() {
            localStorage.setItem('lastAsura', 'hestia');
            document.body.classList.add('transition-out');
            const flashOverlay = document.createElement('div');
            flashOverlay.style.cssText = `
                position: fixed;
                inset: 0;
                background: radial-gradient(circle, #fff0b3, transparent);
                opacity: 0;
                transition: opacity 0.5s ease;
                z-index: 10000;
                pointer-events: none;
            `;
            document.body.appendChild(flashOverlay);
            requestAnimationFrame(() => {
                flashOverlay.style.opacity = '0.8';
                setTimeout(() => {
                    window.location.href = '../shared/portals/portal-system.html?asura=hestia';
                }, 400);
            });
        }
        
        if (portalPlannerBtn) {
            portalPlannerBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                openPortalPlanner();
            });
            console.log("✅ Botão do portal configurado para HESTIA!");
        }
        
        // =========================
        // BOTÃO VOLTAR DO CELULAR (ASURA → GRIMÓRIO)
        // =========================
        function voltarAoGrimorio() {
            document.body.classList.add('transition-out');
            
            const flash = document.createElement('div');
            flash.style.cssText = `
                position: fixed;
                inset: 0;
                background: radial-gradient(circle, ${config.color}, transparent);
                opacity: 0;
                transition: opacity 0.4s ease;
                z-index: 100000;
                pointer-events: none;
            `;
            document.body.appendChild(flash);
            
            requestAnimationFrame(() => {
                flash.style.opacity = '0.8';
                setTimeout(() => {
                    window.location.href = '../index.html';
                }, 350);
            });
        }
        
        window.addEventListener('popstate', (event) => {
            event.preventDefault();
            history.pushState(null, null, window.location.href);
            voltarAoGrimorio();
        });
        
        history.pushState(null, null, window.location.href);
        console.log("✅ Botão 'voltar' do celular configurado para voltar ao Grimório!");
        
        // =========================
        // SETUP 3D HESTIA (COMPLETAMENTE PRESERVADO)
        // =========================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(config.bgColor);
        scene.fog = new THREE.FogExp2(config.bgColor, 0.006);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(config.cameraPosition.x, config.cameraPosition.y, config.cameraPosition.z);
        camera.lookAt(0, 0.8, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0.8, 0);
        
        // LUZES CELESTIAIS
        const ambientLight = new THREE.AmbientLight(0x223344, 0.55);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffeecc, 1.1);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(config.color, 0.65);
        fillLight.position.set(1, 2, 2);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0xaaccff, 0.4);
        backLight.position.set(-2, 1.5, -3);
        scene.add(backLight);
        const divineLight = new THREE.PointLight(0xffeedd, 0.5);
        divineLight.position.set(0.5, 2.5, 1);
        scene.add(divineLight);
        
        // CHÃO CELESTIAL
        const gridHelper = new THREE.GridHelper(14, 24, config.color, 0x3366aa);
        gridHelper.position.y = -0.5;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.35;
        scene.add(gridHelper);
        
        const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(9, 9), new THREE.MeshStandardMaterial({ color: 0x0a1020, roughness: 0.4, metalness: 0.3, transparent: true, opacity: 0.5 }));
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.5;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        const circleGlow = new THREE.Mesh(new THREE.CircleGeometry(1.3, 32), new THREE.MeshStandardMaterial({ color: config.color, emissive: 0xffdd99, emissiveIntensity: 0.4, transparent: true, opacity: 0.45, side: THREE.DoubleSide }));
        circleGlow.rotation.x = -Math.PI / 2;
        circleGlow.position.y = -0.45;
        scene.add(circleGlow);
        
        // COLUNAS CELESTIAIS
        function createCelestialPillar(x, z, height = 1.3) {
            const group = new THREE.Group();
            const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.17, height, 8), new THREE.MeshStandardMaterial({ color: 0x88aacc, emissive: 0x557799, emissiveIntensity: 0.15, metalness: 0.5 }));
            pillar.position.y = 0;
            group.add(pillar);
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.21, 0.025, 16, 32), new THREE.MeshStandardMaterial({ color: config.color, emissive: 0xffdd99, emissiveIntensity: 0.25 }));
            ring.position.y = height / 2;
            ring.rotation.x = Math.PI / 2;
            group.add(ring);
            const crystal = new THREE.Mesh(new THREE.ConeGeometry(0.09, 0.18, 8), new THREE.MeshStandardMaterial({ color: 0xffeedd, emissive: config.color, emissiveIntensity: 0.2 }));
            crystal.position.y = height / 2 + 0.05;
            group.add(crystal);
            group.position.set(x, -0.4, z);
            return group;
        }
        const pillarPositions = [[-2.8,-2.5],[2.8,-2.5],[-2.8,2.5],[2.8,2.5],[-2,-3.2],[2,-3.2],[-3.2,-1.8],[3.2,-1.8],[-3.2,1.8],[3.2,1.8],[-2,3.2],[2,3.2]];
        pillarPositions.forEach(pos => { const pillar = createCelestialPillar(pos[0], pos[1], 1.0 + Math.random() * 0.4); scene.add(pillar); });
        
        // PARTÍCULAS DE LUZ
        const particleCount = 2000;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 16;
            particlePositions[i*3+1] = Math.random() * 5;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 14;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleColors = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const type = Math.random();
            if (type < 0.5) { particleColors[i*3]=0.9+Math.random()*0.3; particleColors[i*3+1]=0.8+Math.random()*0.3; particleColors[i*3+2]=0.5+Math.random()*0.4; }
            else if (type < 0.75) { particleColors[i*3]=0.9+Math.random()*0.3; particleColors[i*3+1]=0.9+Math.random()*0.3; particleColors[i*3+2]=0.9+Math.random()*0.3; }
            else { particleColors[i*3]=0.6+Math.random()*0.4; particleColors[i*3+1]=0.7+Math.random()*0.3; particleColors[i*3+2]=1.0; }
        }
        particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
        const particleMaterial = new THREE.PointsMaterial({ size: 0.045, vertexColors: true, transparent: true, opacity: 0.5 });
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);
        
        // ANÉIS SAGRADOS
        const ringGeometry = new THREE.TorusGeometry(1.2, 0.035, 64, 200);
        const ringMaterial = new THREE.MeshStandardMaterial({ color: config.color, emissive: 0xffdd99, emissiveIntensity: 0.45 });
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        ring.position.y = 0.15;
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);
        
        const ring2Geometry = new THREE.TorusGeometry(1.55, 0.028, 64, 200);
        const ring2Material = new THREE.MeshStandardMaterial({ color: 0xffeebb, emissive: 0xffcc88, emissiveIntensity: 0.35 });
        const ring2 = new THREE.Mesh(ring2Geometry, ring2Material);
        ring2.position.y = 0.05;
        ring2.rotation.x = Math.PI / 2 + 0.3;
        scene.add(ring2);
        
        // BALANÇA DA JUSTIÇA
        const scaleGroup = new THREE.Group();
        const scaleBase = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 0.35, 6), new THREE.MeshStandardMaterial({ color: 0xffddaa, metalness: 0.7 }));
        scaleBase.position.y = 0;
        scaleGroup.add(scaleBase);
        const scaleArm = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.05, 0.08), new THREE.MeshStandardMaterial({ color: 0xffddaa, metalness: 0.6 }));
        scaleArm.position.y = 0.22;
        scaleGroup.add(scaleArm);
        const leftPan = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.03, 8), new THREE.MeshStandardMaterial({ color: 0xffddaa, metalness: 0.5 }));
        leftPan.position.set(-0.28, 0.18, 0);
        scaleGroup.add(leftPan);
        const rightPan = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.03, 8), new THREE.MeshStandardMaterial({ color: 0xffddaa, metalness: 0.5 }));
        rightPan.position.set(0.28, 0.18, 0);
        scaleGroup.add(rightPan);
        scaleGroup.position.set(2.2, 0.3, 2.2);
        scene.add(scaleGroup);
        const scaleGroup2 = scaleGroup.clone();
        scaleGroup2.position.set(-2.2, 0.3, 2.2);
        scene.add(scaleGroup2);
        
        // MODELO 3D
        const loader = new GLTFLoader();
        let model = null;
        let mixer = null;
        
        loader.load(config.modelPath, (gltf) => {
            model = gltf.scene;
            model.position.set(0, config.modelPositionY, 0);
            model.scale.set(config.modelScale, config.modelScale, config.modelScale);
            model.traverse((node) => { if (node.isMesh) { node.castShadow = true; } });
            scene.add(model);
            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(model);
                gltf.animations.forEach(clip => mixer.clipAction(clip).play());
            }
        });
        
        // ANIMAÇÃO
        let time = 0;
        let deltaTime = 0.016;
        let lastTime = performance.now();
        
        function updateDelta() {
            const now = performance.now();
            deltaTime = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            requestAnimationFrame(updateDelta);
        }
        updateDelta();
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.007;
            if (mixer) mixer.update(deltaTime);
            particles.rotation.y = time * 0.05;
            particles.rotation.x = Math.sin(time * 0.1) * 0.06;
            ring.rotation.z = time * 0.28;
            ring2.rotation.z = -time * 0.22;
            fillLight.intensity = 0.5 + Math.sin(time * 1.8) * 0.15;
            circleGlow.material.emissiveIntensity = 0.3 + Math.sin(time * 1.5) * 0.12;
            divineLight.intensity = 0.4 + Math.sin(time * 1.2) * 0.12;
            if (scaleGroup.children[1]) scaleGroup.children[1].rotation.z = Math.sin(time * 1.5) * 0.03;
            if (scaleGroup2.children[1]) scaleGroup2.children[1].rotation.z = Math.sin(time * 1.5 + 1) * 0.03;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // =========================
        // UI, CHAT E VOZ
        // =========================
        initUI(config);
        
        const chat = new EnhancedChatSystem('chatContainer', config, (response) => {
            if (voice?.isJarvisActive?.()) voice.speak(response);
        });
        
        const voiceButtonElem = document.getElementById('voiceButton');
        let voice = null;
        if (voiceButtonElem) {
            voice = new VoiceAssistant(voiceButtonElem, (text) => { document.getElementById('chatInput').value = text; chat.send(); }, null, { asuraName: config.name, continuous: true });
        }
        
        setTimeout(() => {
            chat.addMessage(config.welcomeMessage, false);
            setTimeout(() => {
                chat.addMessage("🎤 Dica: Clique no ícone 🔮 no topo para ativar o MODO JARVIS. Vou ficar sempre ouvindo!", false);
                chat.addMessage("📎 Dica: Clique no ícone 📎 para enviar qualquer arquivo (imagem, PDF, DOC, etc)!", false);
                chat.addMessage("🗺️ Dica: Clique no botão do mapa 🗺️ no TOPO ESQUERDO para acessar o PORTAL PLANNER!", false);
            }, 2000);
        }, 500);
        
        const portalOverlay = document.getElementById('portalOverlay');
        portalOverlay.style.setProperty('--asura-color', config.color);
        setTimeout(() => { portalOverlay.style.opacity = '0.6'; setTimeout(() => { portalOverlay.style.opacity = '0'; setTimeout(() => { portalOverlay.style.display = 'none'; }, 800); }, 500); }, 50);
        
        console.log('🟢 HESTIA carregada com PORTAL PLANNER, CHAT FECHADO, UPLOAD DE ARQUIVOS e TIPOGRAFIA CELESTIAL!');
    </script>
</body>
</html>
