<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SIRIA • Floresta Espiritual Verde</title>
    
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/top-icons.css">
    <link rel="stylesheet" href="../shared/css/chat.css">
    <link rel="stylesheet" href="../shared/css/profile-panel.css">
    <link rel="stylesheet" href="../shared/css/portal.css">
    
    <style>
        :root {
            --asura-color: #35ff9c;
            --asura-glow: rgba(53, 255, 156, 0.6);
            --asura-gradient: linear-gradient(135deg, #35ff9c, #00cc66);
        }
        body { background: radial-gradient(circle at 30% 20%, #0a1a0f, #030108); }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="top-icons">
        <div class="top-icon" id="backButton" data-tooltip="Voltar ao Grimório">←</div>
        <div class="top-icon voice-icon" id="voiceButton" data-tooltip="Modo Jarvis (clique para ativar)">
            <span class="brain-icon">🌿</span>
            <span class="mic-icon">🎤</span>
            <div class="mental-wave"></div>
            <div class="brain-waves left"><span></span><span></span><span></span><span></span><span></span></div>
            <div class="brain-waves right"><span></span><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="top-icon" id="profileButton" data-tooltip="Perfil da Siria">🌳</div>
    </div>
    
    <div class="profile-panel" id="profilePanel"></div>
    
    <div class="chat-container" id="chatContainer">
        <div class="chat-header" id="chatHeader">
            <div class="chat-header-info">
                <div class="chat-avatar">🌳</div>
                <div><h4>SIRIA • Guardiã Financeira</h4><div class="chat-status">🟢 online | ciclo da prosperidade</div></div>
            </div>
            <div class="chat-toggle" id="chatToggle">▼</div>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Digite sua mensagem...">
                <button id="sendChatBtn">➤</button>
            </div>
        </div>
    </div>
    
    <div class="portal-overlay" id="portalOverlay"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { initUI } from '../shared/js/ui.js';
        import { ChatSystem } from '../shared/js/chat.js';
        import { VoiceAssistant } from '../shared/js/voice-assistant.js';
        
        const config = {
            name: 'SIRIA',
            title: '✦ FLORESTA ESPIRITUAL • PROSPERIDADE ✦',
            color: '#35ff9c',
            icon: '🌳',
            modelPath: '../models/siria.glb',
            modelScale: 0.002,
            modelPositionY: -0.25,
            bgColor: 0x0a1a0f,
            cameraPosition: { x: 3, y: 2, z: 4 },
            welcomeMessage: '✨ Bem-vindo à minha floresta espiritual. Sou Siria, guardiã da prosperidade.',
            skills: [
                { name: '💰 Educação Financeira', value: 98 },
                { name: '📈 Análise de Investimentos', value: 95 },
                { name: '🔄 Ciclos Econômicos', value: 92 },
                { name: '🌱 Prosperidade & Crescimento', value: 96 }
            ],
            personalityText: '🌳 "Como a árvore que floresce, sua prosperidade tem raízes profundas."',
            getResponse: (msg) => {
                const lower = msg.toLowerCase();
                if (lower.includes('olá') || lower.includes('oi')) return "🌳 Olá! As raízes da prosperidade te recebem.";
                if (lower.includes('investimento')) return "📈 Investir é como plantar uma árvore. Os melhores frutos vêm com paciência.";
                if (lower.includes('educação')) return "📚 Educação financeira é a semente da prosperidade.";
                if (lower.includes('obrigado')) return "💚 Por nada! Que a prosperidade floresça em seu caminho.";
                return "🍃 Sinto sua energia. Como guardiã da prosperidade, posso te guiar nas finanças.";
            }
        };
        
        // =========================
        // SETUP 3D SIRIA
        // =========================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(config.bgColor);
        scene.fog = new THREE.FogExp2(config.bgColor, 0.012);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(config.cameraPosition.x, config.cameraPosition.y, config.cameraPosition.z);
        camera.lookAt(0, 0.8, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0.8, 0);
        
        // =========================
        // LUZES
        // =========================
        const ambientLight = new THREE.AmbientLight(0x224422, 0.6);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xaaffaa, 1.0);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(config.color, 0.7);
        fillLight.position.set(1, 2, 2);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0xffcc44, 0.4);
        backLight.position.set(-2, 1.5, -3);
        scene.add(backLight);
        const spiritLight = new THREE.PointLight(0x44ffaa, 0.3);
        spiritLight.position.set(2, 1, 1.5);
        scene.add(spiritLight);
        
        // =========================
        // CHÃO E CÍRCULO VERDE
        // =========================
        const gridHelper = new THREE.GridHelper(14, 24, config.color, 0x226622);
        gridHelper.position.y = -0.5;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.4;
        scene.add(gridHelper);
        
        const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(9, 9), new THREE.MeshStandardMaterial({ color: 0x0a2a0a, roughness: 0.6, metalness: 0.1, transparent: true, opacity: 0.5 }));
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.5;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        const circleGlow = new THREE.Mesh(new THREE.CircleGeometry(1.3, 32), new THREE.MeshStandardMaterial({ color: config.color, emissive: config.color, emissiveIntensity: 0.4, transparent: true, opacity: 0.5, side: THREE.DoubleSide }));
        circleGlow.rotation.x = -Math.PI / 2;
        circleGlow.position.y = -0.45;
        scene.add(circleGlow);
        
        // =========================
        // ÁRVORES ESPIRITUAIS
        // =========================
        function createSpiritTree(x, z, size = 1) {
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2 * size, 0.3 * size, 0.8 * size, 6), new THREE.MeshStandardMaterial({ color: 0x35aa66, emissive: 0x226633, emissiveIntensity: 0.2 }));
            trunk.position.y = 0;
            group.add(trunk);
            const foliage1 = new THREE.Mesh(new THREE.ConeGeometry(0.4 * size, 0.5 * size, 8), new THREE.MeshStandardMaterial({ color: config.color, emissive: config.color, emissiveIntensity: 0.15 }));
            foliage1.position.y = 0.5 * size;
            group.add(foliage1);
            const foliage2 = new THREE.Mesh(new THREE.ConeGeometry(0.3 * size, 0.4 * size, 8), new THREE.MeshStandardMaterial({ color: 0x55ffaa, emissive: 0x55ffaa, emissiveIntensity: 0.2 }));
            foliage2.position.y = 0.9 * size;
            group.add(foliage2);
            group.position.set(x, -0.4, z);
            return group;
        }
        
        const treePositions = [[-2.5,-2.5],[2.5,-2.5],[-2.5,2.5],[2.5,2.5],[-1.8,-3],[1.8,-3],[-3,-1.5],[3,-1.5],[-3,1.5],[3,1.5],[-1.5,3],[1.5,3],[0,3.2],[0,-3.2]];
        treePositions.forEach(pos => { const tree = createSpiritTree(pos[0], pos[1], 0.8 + Math.random() * 0.3); scene.add(tree); });
        
        // =========================
        // PARTÍCULAS VERDES/DOURADAS
        // =========================
        const particleCount = 1500;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 14;
            particlePositions[i*3+1] = Math.random() * 4.5;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 12;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleColors = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const type = Math.random();
            if (type < 0.6) { particleColors[i*3]=0.2+Math.random()*0.3; particleColors[i*3+1]=0.7+Math.random()*0.3; particleColors[i*3+2]=0.3+Math.random()*0.3; }
            else if (type < 0.8) { particleColors[i*3]=1.0; particleColors[i*3+1]=0.8+Math.random()*0.2; particleColors[i*3+2]=0.2; }
            else { particleColors[i*3]=0.9+Math.random()*0.3; particleColors[i*3+1]=0.9+Math.random()*0.3; particleColors[i*3+2]=0.9+Math.random()*0.3; }
        }
        particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
        const particleMaterial = new THREE.PointsMaterial({ size: 0.045, vertexColors: true, transparent: true, opacity: 0.5 });
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);
        
        // =========================
        // ANÉIS E CRISTAIS
        // =========================
        const ringGeometry = new THREE.TorusGeometry(1.15, 0.035, 64, 200);
        const ringMaterial = new THREE.MeshStandardMaterial({ color: config.color, emissive: config.color, emissiveIntensity: 0.6 });
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        ring.position.y = 0.15;
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);
        
        const ring2Geometry = new THREE.TorusGeometry(1.4, 0.025, 64, 200);
        const ring2Material = new THREE.MeshStandardMaterial({ color: 0xffcc44, emissive: 0xffaa33, emissiveIntensity: 0.4 });
        const ring2 = new THREE.Mesh(ring2Geometry, ring2Material);
        ring2.position.y = 0.05;
        ring2.rotation.x = Math.PI / 2 + 0.3;
        scene.add(ring2);
        
        const crystalMaterial = new THREE.MeshStandardMaterial({ color: 0x88ffaa, emissive: config.color, emissiveIntensity: 0.3, metalness: 0.8 });
        const crystalPositions = [[1.2,-0.3,1.5],[-1.2,-0.3,1.5],[1.5,-0.3,-1.2],[-1.5,-0.3,-1.2],[0.8,-0.3,2],[-0.8,-0.3,2],[2,-0.3,0.8],[-2,-0.3,0.8]];
        crystalPositions.forEach(pos => { const crystal = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.35, 6), crystalMaterial); crystal.position.set(pos[0], pos[1], pos[2]); scene.add(crystal); });
        
        // =========================
        // MODELO 3D
        // =========================
        const loader = new GLTFLoader();
        let model = null;
        let mixer = null;
        
        loader.load(config.modelPath, (gltf) => {
            model = gltf.scene;
            model.position.set(0, config.modelPositionY, 0);
            model.scale.set(config.modelScale, config.modelScale, config.modelScale);
            model.traverse((node) => { if (node.isMesh) { node.castShadow = true; } });
            scene.add(model);
            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(model);
                gltf.animations.forEach(clip => mixer.clipAction(clip).play());
            }
        });
        
        // =========================
        // ANIMAÇÃO
        // =========================
        let time = 0;
        let deltaTime = 0.016;
        let lastTime = performance.now();
        
        function updateDelta() {
            const now = performance.now();
            deltaTime = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            requestAnimationFrame(updateDelta);
        }
        updateDelta();
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.008;
            if (mixer) mixer.update(deltaTime);
            particles.rotation.y = time * 0.05;
            particles.rotation.x = Math.sin(time * 0.15) * 0.1;
            ring.rotation.z = time * 0.25;
            ring2.rotation.z = -time * 0.2;
            fillLight.intensity = 0.5 + Math.sin(time * 2) * 0.15;
            circleGlow.material.emissiveIntensity = 0.25 + Math.sin(time * 1.8) * 0.15;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // =========================
        // UI, CHAT E VOZ
        // =========================
        initUI(config);
        const chat = new ChatSystem('chatContainer', config, (response) => { if (voice?.isJarvisActive?.()) voice.speak(response); });
        const voiceButtonElem = document.getElementById('voiceButton');
        let voice = null;
        if (voiceButtonElem) {
            voice = new VoiceAssistant(voiceButtonElem, (text) => { document.getElementById('chatInput').value = text; chat.send(); }, null, { asuraName: config.name, continuous: true });
        }
        
        setTimeout(() => {
            chat.addMessage(config.welcomeMessage, false);
            setTimeout(() => chat.addMessage("🎤 Dica: Clique no ícone 🌿 no topo para ativar o MODO JARVIS. Vou ficar sempre ouvindo!", false), 2000);
        }, 500);
        
        const portalOverlay = document.getElementById('portalOverlay');
        portalOverlay.style.setProperty('--asura-color', config.color);
        setTimeout(() => { portalOverlay.style.opacity = '0.6'; setTimeout(() => { portalOverlay.style.opacity = '0'; setTimeout(() => { portalOverlay.style.display = 'none'; }, 800); }, 500); }, 50);
        
        console.log('🟢 SIRIA carregada com floresta espiritual e Modo Jarvis!');
    </script>
</body>
</html>
