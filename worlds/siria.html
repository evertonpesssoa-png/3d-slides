<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SIRIA • Floresta Espiritual Verde</title>
    
    <!-- FONTE EXCLUSIVA PARA SIRIA - ESTILO ORGÂNICO/FLORESTA -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/top-icons.css">
    <link rel="stylesheet" href="../shared/css/chat.css">
    <link rel="stylesheet" href="../shared/css/profile-panel.css">
    <link rel="stylesheet" href="../shared/css/portal.css">
    
    <style>
        :root {
            --asura-color: #35ff9c;
            --asura-glow: rgba(53, 255, 156, 0.6);
            --asura-gradient: linear-gradient(135deg, #35ff9c, #00cc66);
        }
        body { background: radial-gradient(circle at 30% 20%, #0a1a0f, #030108); }
        
        /* =========================
           BOTÃO DO PORTAL - TOPO ESQUERDO
        ========================= */
        .portal-planner-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            color: #35ff9c;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 28px;
            z-index: 9999;
            border: 2px solid #35ff9c;
            box-shadow: 0 0 20px rgba(53, 255, 156, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
            font-family: monospace;
        }
        
        .portal-planner-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 35px rgba(53, 255, 156, 0.8);
            background: rgba(53, 255, 156, 0.2);
        }
        
        .portal-planner-btn::before {
            content: "🗺️ Portal Planner";
            position: absolute;
            top: 70px;
            left: 0;
            background: rgba(0,0,0,0.9);
            color: #35ff9c;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            font-family: 'Poppins', sans-serif;
            border: 1px solid #35ff9c;
        }
        
        .portal-planner-btn:hover::before { opacity: 1; }
        
        body.transition-out {
            opacity: 0;
            transform: scale(0.98);
            transition: all 0.4s ease;
        }
        
        /* =========================
           CHAT MELHORADO - ESTILO FLORESTA/ORGÂNICO
        ========================= */
        .chat-container {
            position: fixed !important;
            bottom: 20px !important;
            right: 20px !important;
            width: 340px !important;
            max-width: calc(100% - 40px) !important;
            background: rgba(10, 26, 15, 0.95) !important;
            backdrop-filter: blur(12px) !important;
            border-radius: 16px !important;
            border: 1px solid rgba(53, 255, 156, 0.3) !important;
            box-shadow: 0 5px 30px rgba(0,0,0,0.5), 0 0 15px rgba(53, 255, 156, 0.2) !important;
            z-index: 9998 !important;
            overflow: hidden !important;
        }
        
        .chat-header {
            background: rgba(0, 0, 0, 0.9) !important;
            padding: 12px 15px !important;
            cursor: pointer !important;
            border-bottom: 1px solid #35ff9c !important;
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
        }
        
        .chat-header-info {
            display: flex !important;
            align-items: center !important;
            gap: 10px !important;
        }
        
        .chat-avatar { font-size: 24px !important; }
        .chat-header-info h4 {
            font-size: 14px !important;
            margin: 0 !important;
            color: #35ff9c !important;
            font-family: 'Quicksand', sans-serif !important;
            letter-spacing: 0.5px !important;
        }
        .chat-status { font-size: 10px !important; color: #0f0 !important; }
        .chat-toggle { color: #35ff9c !important; font-size: 18px !important; }
        
        .chat-body {
            display: flex !important;
            flex-direction: column !important;
            height: 380px !important;
        }
        
        .chat-body.collapsed {
            display: none !important;
        }
        
        .chat-messages {
            flex: 1 !important;
            overflow-y: auto !important;
            padding: 12px !important;
            display: flex !important;
            flex-direction: column !important;
            gap: 10px !important;
            background: rgba(0, 0, 0, 0.5) !important;
        }
        
        .message {
            display: flex !important;
            gap: 10px !important;
            max-width: 90% !important;
        }
        
        .message.user {
            align-self: flex-end !important;
            flex-direction: row-reverse !important;
        }
        
        .message-avatar {
            width: 32px !important;
            height: 32px !important;
            border-radius: 50% !important;
            background: rgba(53, 255, 156, 0.2) !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            font-size: 16px !important;
        }
        
        .message-content {
            background: rgba(53, 255, 156, 0.12) !important;
            border: 1px solid #35ff9c !important;
            border-radius: 15px !important;
            padding: 8px 12px !important;
            color: #ccffdd !important;
            font-size: 13px !important;
            font-family: 'Quicksand', sans-serif !important;
            position: relative !important;
            word-break: break-word !important;
        }
        
        .message.user .message-content {
            background: rgba(53, 255, 156, 0.2) !important;
        }
        
        .message-time {
            font-size: 9px !important;
            color: rgba(255,255,255,0.5) !important;
            margin-top: 4px !important;
            text-align: right !important;
        }
        
        .chat-image {
            max-width: 180px !important;
            max-height: 150px !important;
            border-radius: 10px !important;
            margin-top: 5px !important;
            border: 1px solid #35ff9c !important;
            cursor: pointer !important;
        }
        
        .chat-file {
            display: flex !important;
            align-items: center !important;
            gap: 8px !important;
            background: rgba(53, 255, 156, 0.1) !important;
            border: 1px solid #35ff9c !important;
            border-radius: 10px !important;
            padding: 8px 12px !important;
            margin-top: 5px !important;
            cursor: pointer !important;
            transition: all 0.2s !important;
        }
        
        .chat-file:hover {
            background: rgba(53, 255, 156, 0.25) !important;
            transform: scale(1.01) !important;
        }
        
        .file-icon { font-size: 24px !important; }
        .file-info { flex: 1 !important; overflow: hidden !important; }
        .file-name {
            font-size: 11px !important;
            color: #35ff9c !important;
            white-space: nowrap !important;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
        }
        .file-size { font-size: 9px !important; color: #888 !important; }
        .file-badge {
            background: rgba(53, 255, 156, 0.2) !important;
            border-radius: 4px !important;
            padding: 2px 6px !important;
            font-size: 9px !important;
            color: #35ff9c !important;
        }
        
        .chat-input-area {
            display: flex !important;
            gap: 8px !important;
            padding: 10px !important;
            background: rgba(0, 0, 0, 0.85) !important;
            border-top: 1px solid rgba(53, 255, 156, 0.2) !important;
            align-items: center !important;
        }
        
        .chat-input-area input[type="text"] {
            flex: 1 !important;
            background: rgba(10, 20, 40, 0.9) !important;
            border: 1px solid #35ff9c !important;
            border-radius: 25px !important;
            padding: 10px 15px !important;
            color: #35ff9c !important;
            font-family: 'Quicksand', sans-serif !important;
            font-size: 12px !important;
            outline: none !important;
        }
        
        .chat-input-area input[type="text"]:focus {
            box-shadow: 0 0 10px rgba(53, 255, 156, 0.5) !important;
        }
        
        .chat-input-area button {
            background: rgba(0, 0, 0, 0.8) !important;
            border: 1px solid #35ff9c !important;
            color: #35ff9c !important;
            width: 38px !important;
            height: 38px !important;
            border-radius: 50% !important;
            cursor: pointer !important;
            font-size: 16px !important;
            transition: all 0.2s !important;
        }
        
        .chat-input-area button:hover {
            transform: scale(1.05) !important;
            box-shadow: 0 0 10px rgba(53, 255, 156, 0.5) !important;
            background: rgba(53, 255, 156, 0.2) !important;
        }
        
        .attach-btn {
            background: rgba(0, 0, 0, 0.8) !important;
            border: 1px solid #35ff9c !important;
            color: #35ff9c !important;
            width: 38px !important;
            height: 38px !important;
            border-radius: 50% !important;
            cursor: pointer !important;
            font-size: 16px !important;
            transition: all 0.2s !important;
        }
        
        .attach-btn:hover {
            transform: scale(1.05) !important;
            box-shadow: 0 0 10px rgba(53, 255, 156, 0.5) !important;
            background: rgba(53, 255, 156, 0.2) !important;
        }
        
        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-track { background: #0a0a1a; }
        .chat-messages::-webkit-scrollbar-thumb { background: #35ff9c; border-radius: 5px; }
        
        @media (max-width: 600px) {
            .chat-container { width: calc(100% - 20px) !important; right: 10px !important; bottom: 10px !important; }
            .chat-messages { height: 280px !important; }
            .chat-image { max-width: 130px !important; }
            .chat-file { padding: 6px 10px !important; }
            .file-icon { font-size: 20px !important; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <!-- BOTÃO DO PORTAL PLANNER -->
    <div class="portal-planner-btn" id="portalPlannerBtn" title="Abrir Portal Planner">
        🗺️
    </div>
    
    <div class="top-icons">
        <div class="top-icon" id="backButton" data-tooltip="Voltar ao Grimório">←</div>
        <div class="top-icon voice-icon" id="voiceButton" data-tooltip="Modo Jarvis (clique para ativar)">
            <span class="brain-icon">🌿</span>
            <span class="mic-icon">🎤</span>
            <div class="mental-wave"></div>
            <div class="brain-waves left"><span></span><span></span><span></span><span></span><span></span></div>
            <div class="brain-waves right"><span></span><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="top-icon" id="profileButton" data-tooltip="Perfil da Siria">🌳</div>
    </div>
    
    <div class="profile-panel" id="profilePanel"></div>
    
    <div class="chat-container" id="chatContainer">
        <div class="chat-header" id="chatHeader">
            <div class="chat-header-info">
                <div class="chat-avatar">🌳</div>
                <div><h4>SIRIA • Guardiã Financeira</h4><div class="chat-status">🟢 online | ciclo da prosperidade</div></div>
            </div>
            <div class="chat-toggle" id="chatToggle">▼</div>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Digite sua mensagem...">
                <button id="sendChatBtn">➤</button>
            </div>
        </div>
    </div>
    
    <div class="portal-overlay" id="portalOverlay"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { initUI } from '../shared/js/ui.js';
        import { ChatSystem } from '../shared/js/chat.js';
        import { VoiceAssistant } from '../shared/js/voice-assistant.js';
        
        // =========================
        // EXTENDE O CHAT SYSTEM ORIGINAL PARA ADICIONAR ANEXO
        // =========================
        const OriginalChatSystem = ChatSystem;
        
        class EnhancedChatSystem extends OriginalChatSystem {
            constructor(containerId, config, onSpeak) {
                super(containerId, config, onSpeak);
                this.addAttachButton();
                
                setTimeout(() => {
                    if (this.chatBody) {
                        this.chatBody.classList.add('collapsed');
                    }
                    if (this.chatToggle) {
                        this.chatToggle.textContent = '▲';
                    }
                }, 100);
            }
            
            addAttachButton() {
                const inputArea = this.container.querySelector('.chat-input-area');
                if (!inputArea || inputArea.querySelector('.attach-btn')) return;
                
                const attachBtn = document.createElement('button');
                attachBtn.className = 'attach-btn';
                attachBtn.innerHTML = '📎';
                attachBtn.title = 'Enviar arquivo (imagem, PDF, DOC, etc)';
                
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = '*/*';
                fileInput.style.display = 'none';
                fileInput.multiple = false;
                
                attachBtn.onclick = () => fileInput.click();
                fileInput.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        this.handleFileUpload(file);
                    }
                    fileInput.value = '';
                };
                
                const textInput = inputArea.querySelector('input[type="text"]');
                if (textInput) {
                    inputArea.insertBefore(attachBtn, textInput);
                    inputArea.insertBefore(fileInput, textInput);
                }
            }
            
            handleFileUpload(file) {
                const fileType = file.type;
                const fileName = file.name;
                const fileSize = this.formatFileSize(file.size);
                const fileExtension = fileName.split('.').pop().toUpperCase();
                
                if (fileType.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        this.addImageMessage(ev.target.result, fileName, fileSize);
                    };
                    reader.readAsDataURL(file);
                } else {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        this.addFileMessage(ev.target.result, fileName, fileSize, fileExtension);
                    };
                    reader.readAsDataURL(file);
                }
            }
            
            formatFileSize(bytes) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }
            
            getFileIcon(extension) {
                const icons = {
                    'PDF': '📄', 'DOC': '📃', 'DOCX': '📃',
                    'XLS': '📊', 'XLSX': '📊', 'PPT': '📽️', 'PPTX': '📽️',
                    'TXT': '📝', 'ZIP': '🗜️', 'RAR': '🗜️',
                    'MP3': '🎵', 'MP4': '🎬', 'JPG': '🖼️', 'PNG': '🖼️',
                    'GIF': '🎞️', 'JSON': '🔧', 'XML': '🔧', 'HTML': '🌐'
                };
                return icons[extension] || '📎';
            }
            
            addImageMessage(imageUrl, fileName, fileSize) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message user';
                const time = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                
                messageDiv.innerHTML = `
                    <div class="message-avatar">👤</div>
                    <div class="message-content">
                        <div>🖼️ ${fileName} <span style="font-size:9px; color:#888;">(${fileSize})</span></div>
                        <img src="${imageUrl}" class="chat-image" onclick="window.open('${imageUrl}')">
                        <div class="message-time">${time}</div>
                    </div>
                `;
                
                this.messagesContainer.appendChild(messageDiv);
                this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
                
                const messages = this.getMessages ? this.getMessages() : [];
                if (this.saveMessages) {
                    messages.push({
                        text: `🖼️ ${fileName} (${fileSize})`,
                        image: imageUrl,
                        isUser: true,
                        timestamp: Date.now()
                    });
                    this.saveMessages(messages);
                }
            }
            
            addFileMessage(fileData, fileName, fileSize, extension) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message user';
                const time = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                const fileIcon = this.getFileIcon(extension);
                const downloadUrl = fileData;
                
                messageDiv.innerHTML = `
                    <div class="message-avatar">👤</div>
                    <div class="message-content">
                        <div>📎 Arquivo anexado</div>
                        <div class="chat-file" onclick="window.open('${downloadUrl}')">
                            <div class="file-icon">${fileIcon}</div>
                            <div class="file-info">
                                <div class="file-name">${fileName}</div>
                                <div class="file-size">${fileSize}</div>
                            </div>
                            <div class="file-badge">${extension}</div>
                        </div>
                        <div class="message-time">${time}</div>
                    </div>
                `;
                
                this.messagesContainer.appendChild(messageDiv);
                this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
                
                const messages = this.getMessages ? this.getMessages() : [];
                if (this.saveMessages) {
                    messages.push({
                        text: `📎 ${fileName} (${fileSize})`,
                        fileData: fileData,
                        isUser: true,
                        timestamp: Date.now()
                    });
                    this.saveMessages(messages);
                }
            }
        }
        
        const config = {
            name: 'SIRIA',
            title: '✦ FLORESTA ESPIRITUAL • PROSPERIDADE ✦',
            color: '#35ff9c',
            icon: '🌳',
            modelPath: '../models/siria.glb',
            modelScale: 0.002,
            modelPositionY: -0.25,
            bgColor: 0x0a1a0f,
            cameraPosition: { x: 3, y: 2, z: 4 },
            welcomeMessage: '✨ Bem-vindo à minha floresta espiritual. Sou Siria, guardiã da prosperidade.',
            skills: [
                { name: '💰 Educação Financeira', value: 98 },
                { name: '📈 Análise de Investimentos', value: 95 },
                { name: '🔄 Ciclos Econômicos', value: 92 },
                { name: '🌱 Prosperidade & Crescimento', value: 96 }
            ],
            personalityText: '🌳 "Como a árvore que floresce, sua prosperidade tem raízes profundas."',
            getResponse: (msg) => {
                const lower = msg.toLowerCase();
                if (lower.includes('olá') || lower.includes('oi')) return "🌳 Olá! As raízes da prosperidade te recebem.";
                if (lower.includes('investimento')) return "📈 Investir é como plantar uma árvore. Os melhores frutos vêm com paciência.";
                if (lower.includes('educação')) return "📚 Educação financeira é a semente da prosperidade.";
                if (lower.includes('imagem') || lower.includes('foto') || lower.includes('arquivo')) return "📎 Arquivo recebido! Como uma semente que germina, seus dados serão cuidadosamente cultivados.";
                if (lower.includes('obrigado')) return "💚 Por nada! Que a prosperidade floresça em seu caminho.";
                return "🍃 Sinto sua energia. Como guardiã da prosperidade, posso te guiar nas finanças.";
            }
        };
        
        // =========================
        // BOTÃO PORTAL PLANNER
        // =========================
        const portalPlannerBtn = document.getElementById('portalPlannerBtn');
        
        function openPortalPlanner() {
            localStorage.setItem('lastAsura', 'siria');
            document.body.classList.add('transition-out');
            const flashOverlay = document.createElement('div');
            flashOverlay.style.cssText = `
                position: fixed;
                inset: 0;
                background: radial-gradient(circle, #35ff9c, transparent);
                opacity: 0;
                transition: opacity 0.5s ease;
                z-index: 10000;
                pointer-events: none;
            `;
            document.body.appendChild(flashOverlay);
            requestAnimationFrame(() => {
                flashOverlay.style.opacity = '0.8';
                setTimeout(() => {
                    window.location.href = '../shared/portals/portal-system.html?asura=siria';
                }, 400);
            });
        }
        
        if (portalPlannerBtn) {
            portalPlannerBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                openPortalPlanner();
            });
            console.log("✅ Botão do portal configurado para SIRIA!");
        }
        
        // =========================
        // BOTÃO VOLTAR DO CELULAR (ASURA → GRIMÓRIO)
        // =========================
        function voltarAoGrimorio() {
            document.body.classList.add('transition-out');
            
            const flash = document.createElement('div');
            flash.style.cssText = `
                position: fixed;
                inset: 0;
                background: radial-gradient(circle, ${config.color}, transparent);
                opacity: 0;
                transition: opacity 0.4s ease;
                z-index: 100000;
                pointer-events: none;
            `;
            document.body.appendChild(flash);
            
            requestAnimationFrame(() => {
                flash.style.opacity = '0.8';
                setTimeout(() => {
                    window.location.href = '../index.html';
                }, 350);
            });
        }
        
        window.addEventListener('popstate', (event) => {
            event.preventDefault();
            history.pushState(null, null, window.location.href);
            voltarAoGrimorio();
        });
        
        history.pushState(null, null, window.location.href);
        console.log("✅ Botão 'voltar' do celular configurado para voltar ao Grimório!");
        
        // =========================
        // SETUP 3D SIRIA (COMPLETAMENTE PRESERVADO)
        // =========================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(config.bgColor);
        scene.fog = new THREE.FogExp2(config.bgColor, 0.012);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(config.cameraPosition.x, config.cameraPosition.y, config.cameraPosition.z);
        camera.lookAt(0, 0.8, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0.8, 0);
        
        // LUZES
        const ambientLight = new THREE.AmbientLight(0x224422, 0.6);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xaaffaa, 1.0);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(config.color, 0.7);
        fillLight.position.set(1, 2, 2);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0xffcc44, 0.4);
        backLight.position.set(-2, 1.5, -3);
        scene.add(backLight);
        const spiritLight = new THREE.PointLight(0x44ffaa, 0.3);
        spiritLight.position.set(2, 1, 1.5);
        scene.add(spiritLight);
        
        // CHÃO E CÍRCULO VERDE
        const gridHelper = new THREE.GridHelper(14, 24, config.color, 0x226622);
        gridHelper.position.y = -0.5;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.4;
        scene.add(gridHelper);
        
        const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(9, 9), new THREE.MeshStandardMaterial({ color: 0x0a2a0a, roughness: 0.6, metalness: 0.1, transparent: true, opacity: 0.5 }));
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.5;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        const circleGlow = new THREE.Mesh(new THREE.CircleGeometry(1.3, 32), new THREE.MeshStandardMaterial({ color: config.color, emissive: config.color, emissiveIntensity: 0.4, transparent: true, opacity: 0.5, side: THREE.DoubleSide }));
        circleGlow.rotation.x = -Math.PI / 2;
        circleGlow.position.y = -0.45;
        scene.add(circleGlow);
        
        // ÁRVORES ESPIRITUAIS
        function createSpiritTree(x, z, size = 1) {
            const group = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2 * size, 0.3 * size, 0.8 * size, 6), new THREE.MeshStandardMaterial({ color: 0x35aa66, emissive: 0x226633, emissiveIntensity: 0.2 }));
            trunk.position.y = 0;
            group.add(trunk);
            const foliage1 = new THREE.Mesh(new THREE.ConeGeometry(0.4 * size, 0.5 * size, 8), new THREE.MeshStandardMaterial({ color: config.color, emissive: config.color, emissiveIntensity: 0.15 }));
            foliage1.position.y = 0.5 * size;
            group.add(foliage1);
            const foliage2 = new THREE.Mesh(new THREE.ConeGeometry(0.3 * size, 0.4 * size, 8), new THREE.MeshStandardMaterial({ color: 0x55ffaa, emissive: 0x55ffaa, emissiveIntensity: 0.2 }));
            foliage2.position.y = 0.9 * size;
            group.add(foliage2);
            group.position.set(x, -0.4, z);
            return group;
        }
        
        const treePositions = [[-2.5,-2.5],[2.5,-2.5],[-2.5,2.5],[2.5,2.5],[-1.8,-3],[1.8,-3],[-3,-1.5],[3,-1.5],[-3,1.5],[3,1.5],[-1.5,3],[1.5,3],[0,3.2],[0,-3.2]];
        treePositions.forEach(pos => { const tree = createSpiritTree(pos[0], pos[1], 0.8 + Math.random() * 0.3); scene.add(tree); });
        
        // PARTÍCULAS VERDES/DOURADAS
        const particleCount = 1500;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 14;
            particlePositions[i*3+1] = Math.random() * 4.5;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 12;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleColors = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const type = Math.random();
            if (type < 0.6) { particleColors[i*3]=0.2+Math.random()*0.3; particleColors[i*3+1]=0.7+Math.random()*0.3; particleColors[i*3+2]=0.3+Math.random()*0.3; }
            else if (type < 0.8) { particleColors[i*3]=1.0; particleColors[i*3+1]=0.8+Math.random()*0.2; particleColors[i*3+2]=0.2; }
            else { particleColors[i*3]=0.9+Math.random()*0.3; particleColors[i*3+1]=0.9+Math.random()*0.3; particleColors[i*3+2]=0.9+Math.random()*0.3; }
        }
        particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
        const particleMaterial = new THREE.PointsMaterial({ size: 0.045, vertexColors: true, transparent: true, opacity: 0.5 });
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);
        
        // ANÉIS E CRISTAIS
        const ringGeometry = new THREE.TorusGeometry(1.15, 0.035, 64, 200);
        const ringMaterial = new THREE.MeshStandardMaterial({ color: config.color, emissive: config.color, emissiveIntensity: 0.6 });
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        ring.position.y = 0.15;
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);
        
        const ring2Geometry = new THREE.TorusGeometry(1.4, 0.025, 64, 200);
        const ring2Material = new THREE.MeshStandardMaterial({ color: 0xffcc44, emissive: 0xffaa33, emissiveIntensity: 0.4 });
        const ring2 = new THREE.Mesh(ring2Geometry, ring2Material);
        ring2.position.y = 0.05;
        ring2.rotation.x = Math.PI / 2 + 0.3;
        scene.add(ring2);
        
        const crystalMaterial = new THREE.MeshStandardMaterial({ color: 0x88ffaa, emissive: config.color, emissiveIntensity: 0.3, metalness: 0.8 });
        const crystalPositions = [[1.2,-0.3,1.5],[-1.2,-0.3,1.5],[1.5,-0.3,-1.2],[-1.5,-0.3,-1.2],[0.8,-0.3,2],[-0.8,-0.3,2],[2,-0.3,0.8],[-2,-0.3,0.8]];
        crystalPositions.forEach(pos => { const crystal = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.35, 6), crystalMaterial); crystal.position.set(pos[0], pos[1], pos[2]); scene.add(crystal); });
        
        // MODELO 3D
        const loader = new GLTFLoader();
        let model = null;
        let mixer = null;
        
        loader.load(config.modelPath, (gltf) => {
            model = gltf.scene;
            model.position.set(0, config.modelPositionY, 0);
            model.scale.set(config.modelScale, config.modelScale, config.modelScale);
            model.traverse((node) => { if (node.isMesh) { node.castShadow = true; } });
            scene.add(model);
            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(model);
                gltf.animations.forEach(clip => mixer.clipAction(clip).play());
            }
        });
        
        // ANIMAÇÃO
        let time = 0;
        let deltaTime = 0.016;
        let lastTime = performance.now();
        
        function updateDelta() {
            const now = performance.now();
            deltaTime = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            requestAnimationFrame(updateDelta);
        }
        updateDelta();
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.008;
            if (mixer) mixer.update(deltaTime);
            particles.rotation.y = time * 0.05;
            particles.rotation.x = Math.sin(time * 0.15) * 0.1;
            ring.rotation.z = time * 0.25;
            ring2.rotation.z = -time * 0.2;
            fillLight.intensity = 0.5 + Math.sin(time * 2) * 0.15;
            circleGlow.material.emissiveIntensity = 0.25 + Math.sin(time * 1.8) * 0.15;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // =========================
        // UI, CHAT E VOZ
        // =========================
        initUI(config);
        
        const chat = new EnhancedChatSystem('chatContainer', config, (response) => {
            if (voice?.isJarvisActive?.()) voice.speak(response);
        });
        
        const voiceButtonElem = document.getElementById('voiceButton');
        let voice = null;
        if (voiceButtonElem) {
            voice = new VoiceAssistant(voiceButtonElem, (text) => { document.getElementById('chatInput').value = text; chat.send(); }, null, { asuraName: config.name, continuous: true });
        }
        
        setTimeout(() => {
            chat.addMessage(config.welcomeMessage, false);
            setTimeout(() => {
                chat.addMessage("🎤 Dica: Clique no ícone 🌿 no topo para ativar o MODO JARVIS. Vou ficar sempre ouvindo!", false);
                chat.addMessage("📎 Dica: Clique no ícone 📎 para enviar qualquer arquivo (imagem, PDF, DOC, etc)!", false);
                chat.addMessage("🗺️ Dica: Clique no botão do mapa 🗺️ no TOPO ESQUERDO para acessar o PORTAL PLANNER!", false);
            }, 2000);
        }, 500);
        
        const portalOverlay = document.getElementById('portalOverlay');
        portalOverlay.style.setProperty('--asura-color', config.color);
        setTimeout(() => { portalOverlay.style.opacity = '0.6'; setTimeout(() => { portalOverlay.style.opacity = '0'; setTimeout(() => { portalOverlay.style.display = 'none'; }, 800); }, 500); }, 50);
        
        console.log('🟢 SIRIA carregada com PORTAL PLANNER, CHAT FECHADO, UPLOAD DE ARQUIVOS e TIPOGRAFIA ORGÂNICA!');
    </script>
</body>
</html>
