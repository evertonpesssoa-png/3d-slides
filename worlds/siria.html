<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SIRIA • Floresta Espiritual Verde</title>
    
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/top-icons.css">
    <link rel="stylesheet" href="../shared/css/chat.css">
    <link rel="stylesheet" href="../shared/css/profile-panel.css">
    <link rel="stylesheet" href="../shared/css/portal.css">
    
    <style>
        :root {
            --asura-color: #35ff9c;
            --asura-glow: rgba(53, 255, 156, 0.5);
            --asura-gradient: linear-gradient(135deg, #35ff9c, #00cc66);
        }
        body { background: radial-gradient(circle at 30% 20%, #0a1a0f, #030108); }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="top-icons">
        <div class="top-icon" id="backButton" data-tooltip="Voltar ao Grimório">←</div>
        <div class="top-icon voice-icon" id="voiceButton" data-tooltip="Modo Jarvis (Voz)">🎤</div>
        <div class="top-icon" id="profileButton" data-tooltip="Perfil da Siria">🌳</div>
    </div>
    
    <div class="profile-panel" id="profilePanel"></div>
    
    <div class="chat-container" id="chatContainer">
        <div class="chat-header" id="chatHeader">
            <div class="chat-header-info">
                <div class="chat-avatar">🌳</div>
                <div><h4>SIRIA • Guardiã Financeira</h4><div class="chat-status">🟢 online | ciclo da prosperidade</div></div>
            </div>
            <div class="chat-toggle" id="chatToggle">▼</div>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Digite sua mensagem...">
                <button id="sendChatBtn">➤</button>
            </div>
        </div>
    </div>
    
    <div class="portal-overlay" id="portalOverlay"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import { initWorld } from '../shared/js/asura-base.js';
        
        const config = {
            name: 'SIRIA',
            title: '✦ FLORESTA ESPIRITUAL • PROSPERIDADE ✦',
            color: '#35ff9c',
            icon: '🌳',
            modelPath: '../models/siria.glb',
            modelScale: 0.002,
            modelPositionY: -0.25,
            bgColor: 0x0a1a0f,
            cameraPosition: { x: 3, y: 2, z: 4 },
            welcomeMessage: '✨ Bem-vindo à minha floresta espiritual. Sou Siria, guardiã da prosperidade. Como posso ajudar suas finanças a florescerem?',
            skills: [
                { name: '💰 Educação Financeira', value: 98 },
                { name: '📈 Análise de Investimentos', value: 95 },
                { name: '🔄 Ciclos Econômicos', value: 92 },
                { name: '🌱 Prosperidade & Crescimento', value: 96 }
            ],
            personalityText: '🌳 "Como a árvore que floresce, sua prosperidade tem raízes profundas."<br>Siria une sabedoria financeira com a energia vital da floresta.',
            getResponse: (msg) => {
                const lower = msg.toLowerCase();
                if (lower.includes('olá') || lower.includes('oi')) return "🌳 Olá! As raízes da prosperidade te recebem. Como posso ajudar suas finanças a florescerem?";
                if (lower.includes('investimento')) return "📈 Investir é como plantar uma árvore. Os melhores frutos vêm com paciência e estratégia. Quer aprender sobre ciclos de mercado?";
                if (lower.includes('educação')) return "📚 Educação financeira é a semente da prosperidade. Posso te ensinar sobre orçamento, investimentos e planejamento.";
                if (lower.includes('obrigado')) return "💚 Por nada! Que a prosperidade floresça em seu caminho.";
                return "🍃 Sinto sua energia. Como guardiã da prosperidade, posso te guiar nas finanças. Que sabedoria você busca hoje?";
            }
        };
        
        initWorld(config);
    </script>
</body>
</html>
