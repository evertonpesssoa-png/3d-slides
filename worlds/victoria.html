<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VICTORIA • Guerra Infernal • A MVP dos Asuras</title>
    
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/top-icons.css">
    <link rel="stylesheet" href="../shared/css/chat.css">
    <link rel="stylesheet" href="../shared/css/profile-panel.css">
    <link rel="stylesheet" href="../shared/css/portal.css">
    
    <style>
        :root {
            --asura-color: #ff0000;
            --asura-glow: rgba(255, 0, 0, 0.5);
            --asura-gradient: linear-gradient(135deg, #ff0000, #cc0000);
        }
        body { background: radial-gradient(circle at 30% 20%, #0a0000, #030108); }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="top-icons">
        <div class="top-icon" id="backButton" data-tooltip="Voltar ao Grimório">←</div>
        <div class="top-icon voice-icon" id="voiceButton" data-tooltip="Modo Jarvis (Voz)">⚔️</div>
        <div class="top-icon" id="profileButton" data-tooltip="Perfil da Victoria">🏅</div>
    </div>
    
    <div class="profile-panel" id="profilePanel"></div>
    
    <div class="chat-container" id="chatContainer">
        <div class="chat-header" id="chatHeader">
            <div class="chat-header-info">
                <div class="chat-avatar">🏅</div>
                <div><h4>VICTORIA • A MVP Suprema</h4><div class="chat-status">🔴 modo guerra | força máxima</div></div>
            </div>
            <div class="chat-toggle" id="chatToggle">▼</div>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Descreva o conflito...">
                <button id="sendChatBtn">➤</button>
            </div>
        </div>
    </div>
    
    <div class="portal-overlay" id="portalOverlay"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import { initWorld } from '../shared/js/asura-base.js';
        
        const config = {
            name: 'VICTORIA',
            title: '✦ GUERRA INFERNAL • A MVP DOS ASURAS ✦',
            color: '#ff0000',
            icon: '🏅',
            modelPath: '../models/victoria.glb',
            modelScale: 0.08,
            modelPositionY: -0.25,
            bgColor: 0x0a0000,
            cameraPosition: { x: 3.2, y: 2.2, z: 4.2 },
            welcomeMessage: '🔥 VOCÊ ME CONVOCOU. Quando tudo parece perdido, eu apareço. Sou Victoria, a senhora da guerra, a MVP dos Asuras. A derrota não é uma opção enquanto eu existir. Qual é a batalha?',
            skills: [
                { name: '🏅 Poder Máximo', value: 100 },
                { name: '⚡ Estratégia de Guerra', value: 100 },
                { name: '🔥 Poder Infernal', value: 100 },
                { name: '🏆 Vitória Absoluta', value: 100 }
            ],
            personalityText: '🏅 "Quando tudo estiver perdido... eu estarei lá. Sou a última esperança. A vitória é minha promessa."<br>Victoria é a MVP dos Asuras. Só é acionada em cenários de derrota iminente.',
            getResponse: (msg) => {
                const lower = msg.toLowerCase();
                if (lower.includes('olá') || lower.includes('oi')) return "🔥 VOCÊ ME CONVOCOU. Não perca meu tempo com saudações. Qual é a batalha? A derrota te assombra?";
                if (lower.includes('derrota') || lower.includes('perdido')) return "🏅 Eu sei. Por isso estou aqui. Quando tudo parece perdido, eu trago a vitória. Descreva o cenário.";
                if (lower.includes('batalha') || lower.includes('guerra')) return "⚔️ Guerras são vencidas com estratégia e poder. Eu tenho ambos. Me diga o que você enfrenta.";
                if (lower.includes('obrigado')) return "💀 Não agradeça. Apenas lembre: eu só apareço quando necessário. Agora vá. E vença.";
                return "🔥 FALA CLARO. Estou aqui para vencer batalhas. Me diga o que você enfrenta, e eu te darei a vitória.";
            }
        };
        
        initWorld(config);
    </script>
</body>
</html>
