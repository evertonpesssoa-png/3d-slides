<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

    <title>VICTORIA • Guerra Infernal • A MVP dos Asuras</title>

    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/top-icons.css">
    <link rel="stylesheet" href="../shared/css/chat.css">
    <link rel="stylesheet" href="../shared/css/profile-panel.css">
    <link rel="stylesheet" href="../shared/css/portal.css">

    <style>

        :root{
            --asura-color:#ff0000;
            --asura-glow:rgba(255,0,0,0.6);
            --asura-gradient:linear-gradient(135deg,#ff0000,#aa0000);
        }

        body{
            margin:0;
            overflow:hidden;
            background:
                radial-gradient(circle at 30% 20%, #120000, #020104);
        }

        #canvas-container{
            position:fixed;
            inset:0;
            z-index:1;
        }

        /* =========================
           BOTÃO PORTAL
        ========================= */

        .portal-planner-btn{

            position:fixed;

            top:20px;
            left:20px;

            width:60px;
            height:60px;

            display:flex;
            align-items:center;
            justify-content:center;

            border-radius:50%;

            background:rgba(0,0,0,0.88);

            border:2px solid #ff0000;

            color:#ff0000;

            font-size:30px;

            cursor:pointer;

            z-index:999999;

            backdrop-filter:blur(12px);

            box-shadow:
                0 0 20px rgba(255,0,0,0.5),
                inset 0 0 15px rgba(255,0,0,0.25);

            transition:0.3s;
        }

        .portal-planner-btn:hover{

            transform:scale(1.08);

            background:rgba(255,0,0,0.18);

            box-shadow:
                0 0 35px rgba(255,0,0,0.9),
                inset 0 0 25px rgba(255,0,0,0.35);
        }

        .portal-planner-btn::after{

            content:"Portal Planner";

            position:absolute;

            top:72px;
            left:0;

            background:rgba(0,0,0,0.92);

            border:1px solid #ff0000;

            color:#ff0000;

            padding:6px 12px;

            border-radius:20px;

            font-size:12px;

            white-space:nowrap;

            opacity:0;

            pointer-events:none;

            transition:0.3s;
        }

        .portal-planner-btn:hover::after{
            opacity:1;
        }

        body.transition-out{
            opacity:0;
            transform:scale(0.98);
            transition:0.4s ease;
        }

        /* =========================
           TOP ICONS
        ========================= */

        .top-icons{
            position:fixed;
            top:20px;
            right:20px;
            z-index:999998;

            display:flex;
            gap:12px;
        }

    </style>
</head>

<body>

    <!-- =========================
         PORTAL BUTTON
    ========================= -->

    <div id="portalPlannerBtn"
         class="portal-planner-btn">
        🗺️
    </div>

    <!-- =========================
         CANVAS
    ========================= -->

    <div id="canvas-container"></div>

    <!-- =========================
         TOP ICONS
    ========================= -->

    <div class="top-icons">

        <div class="top-icon"
             id="backButton"
             data-tooltip="Voltar ao Grimório">
            ←
        </div>

        <div class="top-icon voice-icon"
             id="voiceButton"
             data-tooltip="Modo Jarvis">

            <span class="brain-icon">🏅</span>
            <span class="mic-icon">🎤</span>

            <div class="mental-wave"></div>

            <div class="brain-waves left">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>

            <div class="brain-waves right">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>

        </div>

        <div class="top-icon"
             id="profileButton"
             data-tooltip="Perfil da Victoria">
            🏅
        </div>

    </div>

    <!-- =========================
         PROFILE PANEL
    ========================= -->

    <div class="profile-panel"
         id="profilePanel"></div>

    <!-- =========================
         CHAT
    ========================= -->

    <div class="chat-container"
         id="chatContainer">

        <div class="chat-header"
             id="chatHeader">

            <div class="chat-header-info">

                <div class="chat-avatar">
                    🏅
                </div>

                <div>
                    <h4>
                        VICTORIA • A MVP Suprema
                    </h4>

                    <div class="chat-status">
                        🔴 modo guerra | força máxima
                    </div>
                </div>

            </div>

            <div class="chat-toggle"
                 id="chatToggle">
                ▼
            </div>

        </div>

        <div class="chat-body"
             id="chatBody">

            <div class="chat-messages"
                 id="chatMessages"></div>

            <div class="chat-input-area">

                <input
                    type="text"
                    id="chatInput"
                    placeholder="Descreva o conflito..."
                >

                <button id="sendChatBtn">
                    ➤
                </button>

            </div>

        </div>

    </div>

    <!-- =========================
         PORTAL OVERLAY
    ========================= -->

    <div class="portal-overlay"
         id="portalOverlay"></div>

    <!-- =========================
         IMPORTMAP
    ========================= -->

    <script type="importmap">
    {
        "imports": {
            "three":
            "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",

            "three/addons/":
            "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <!-- =========================
         SCRIPT
    ========================= -->

    <script type="module">

        import * as THREE from 'three';

        // =========================
        // CONFIG
        // =========================

        const config = {

            name:'VICTORIA',

            color:'#ff0000',

            bgColor:0x120000
        };

        // =========================
        // SCENE
        // =========================

        const container =
            document.getElementById(
                'canvas-container'
            );

        const scene = new THREE.Scene();

        scene.background =
            new THREE.Color(
                config.bgColor
            );

        const camera =
            new THREE.PerspectiveCamera(
                45,
                window.innerWidth /
                window.innerHeight,
                0.1,
                1000
            );

        camera.position.set(0,2,5);

        // =========================
        // RENDERER
        // =========================

        const renderer =
            new THREE.WebGLRenderer({
                antialias:true
            });

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

        renderer.setPixelRatio(
            window.devicePixelRatio
        );

        container.appendChild(
            renderer.domElement
        );

        // =========================
        // LIGHTS
        // =========================

        const ambient =
            new THREE.AmbientLight(
                0xff3333,
                0.5
            );

        scene.add(ambient);

        const light =
            new THREE.PointLight(
                0xff0000,
                1.5
            );

        light.position.set(2,3,2);

        scene.add(light);

        // =========================
        // FALLBACK MODEL
        // =========================

        const sphere =
            new THREE.Mesh(

                new THREE.SphereGeometry(
                    0.8,
                    64,
                    64
                ),

                new THREE.MeshStandardMaterial({

                    color:0xff0000,

                    emissive:0xaa0000,

                    emissiveIntensity:0.7
                })
            );

        sphere.position.y = 0.5;

        scene.add(sphere);

        // =========================
        // FLOOR
        // =========================

        const floor =
            new THREE.Mesh(

                new THREE.CircleGeometry(
                    2,
                    64
                ),

                new THREE.MeshStandardMaterial({

                    color:0x220000,

                    emissive:0x550000,

                    emissiveIntensity:0.3,

                    transparent:true,

                    opacity:0.7
                })
            );

        floor.rotation.x =
            -Math.PI / 2;

        floor.position.y =
            -0.7;

        scene.add(floor);

        // =========================
        // PARTICLES
        // =========================

        const particlesGeometry =
            new THREE.BufferGeometry();

        const count = 1500;

        const positions =
            new Float32Array(
                count * 3
            );

        for(let i=0;i<count;i++){

            positions[i*3] =
                (Math.random()-0.5)*12;

            positions[i*3+1] =
                Math.random()*5;

            positions[i*3+2] =
                (Math.random()-0.5)*12;
        }

        particlesGeometry.setAttribute(
            'position',
            new THREE.BufferAttribute(
                positions,
                3
            )
        );

        const particles =
            new THREE.Points(

                particlesGeometry,

                new THREE.PointsMaterial({

                    color:0xff3300,

                    size:0.05,

                    transparent:true,

                    opacity:0.6
                })
            );

        scene.add(particles);

        // =========================
        // ANIMATION
        // =========================

        let time = 0;

        function animate(){

            requestAnimationFrame(
                animate
            );

            time += 0.01;

            sphere.rotation.y += 0.01;

            particles.rotation.y =
                time * 0.05;

            floor.material.emissiveIntensity =
                0.25 +
                Math.sin(time * 2)*0.15;

            renderer.render(
                scene,
                camera
            );
        }

        animate();

        // =========================
        // RESIZE
        // =========================

        window.addEventListener(
            'resize',
            ()=>{

                camera.aspect =
                    window.innerWidth /
                    window.innerHeight;

                camera.updateProjectionMatrix();

                renderer.setSize(
                    window.innerWidth,
                    window.innerHeight
                );
            }
        );

        // =========================
        // PORTAL BUTTON
        // =========================

        const portalPlannerBtn =
            document.getElementById(
                'portalPlannerBtn'
            );

        portalPlannerBtn.addEventListener(
            'click',
            ()=>{

                localStorage.setItem(
                    'lastAsura',
                    'victoria'
                );

                document.body.classList.add(
                    'transition-out'
                );

                const flash =
                    document.createElement(
                        'div'
                    );

                flash.style.position =
                    'fixed';

                flash.style.inset =
                    '0';

                flash.style.zIndex =
                    '999999';

                flash.style.pointerEvents =
                    'none';

                flash.style.background =
                    'radial-gradient(circle, rgba(255,0,0,0.9), transparent)';

                flash.style.opacity =
                    '0';

                flash.style.transition =
                    '0.5s ease';

                document.body.appendChild(
                    flash
                );

                requestAnimationFrame(()=>{

                    flash.style.opacity =
                        '1';

                    setTimeout(()=>{

                        window.location.href =
                            '../shared/portals/portal-system.html?asura=victoria';

                    },450);

                });

            }
        );

        console.log(
            '🟢 Victoria carregada com portal planner'
        );

    </script>

</body>
</html>
