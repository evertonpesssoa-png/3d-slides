<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
content="width=device-width, initial-scale=1.0, user-scalable=no" />

<title>VICTORIA • Reino Rosa Arcano</title>

<link rel="stylesheet" href="../shared/css/base.css">
<link rel="stylesheet" href="../shared/css/top-icons.css">
<link rel="stylesheet" href="../shared/css/chat.css">
<link rel="stylesheet" href="../shared/css/profile-panel.css">
<link rel="stylesheet" href="../shared/css/portal.css">

<style>

:root{
    --asura-color: #ff66cc;
    --asura-glow: rgba(255,102,204,.6);
}

body{
    margin:0;
    overflow:hidden;
    background:
    radial-gradient(circle at top,
    #1d0820,
    #050308);
}

/* =========================
PORTAL BUTTON
========================= */

.portal-planner-btn{
    position: fixed;
    top: 20px;
    left: 20px;

    width: 58px;
    height: 58px;

    border-radius: 50%;

    display:flex;
    align-items:center;
    justify-content:center;

    background: rgba(0,0,0,.82);

    color:#ff66cc;

    border:2px solid #ff66cc;

    font-size:30px;

    z-index:999999;

    cursor:pointer;

    backdrop-filter: blur(10px);

    box-shadow:
    0 0 12px rgba(255,102,204,.4),
    0 0 30px rgba(255,102,204,.7);

    transition:.25s;
}

.portal-planner-btn:hover{
    transform: scale(1.08);

    box-shadow:
    0 0 20px rgba(255,102,204,.8),
    0 0 45px rgba(255,102,204,1);
}

.portal-planner-btn:active{
    transform: scale(.95);
}

body.transition-out{
    opacity:0;
    transform:scale(.985);
    transition:.45s ease;
}

/* =========================
TOP ICONS
========================= */

.top-icons{
    position: fixed;
    top:20px;
    right:20px;
    z-index:99999;

    display:flex;
    gap:12px;
}

</style>

</head>

<body>

<div id="canvas-container"></div>

<!-- =========================
BOTÃO PORTAL
========================= -->

<div
class="portal-planner-btn"
id="portalPlannerBtn">
🗺️
</div>

<!-- =========================
TOP ICONS
========================= -->

<div class="top-icons">

<div class="top-icon"
id="backButton">
←
</div>

<div
class="top-icon voice-icon"
id="voiceButton">

<span class="brain-icon">💖</span>
<span class="mic-icon">🎤</span>

</div>

<div
class="top-icon"
id="profileButton">
👑
</div>

</div>

<!-- =========================
PROFILE PANEL
========================= -->

<div
class="profile-panel"
id="profilePanel">
</div>

<!-- =========================
CHAT
========================= -->

<div
class="chat-container"
id="chatContainer">

<div
class="chat-header"
id="chatHeader">

<div class="chat-header-info">

<div class="chat-avatar">
👑
</div>

<div>

<h4>
VICTORIA • Rainha Arcana
</h4>

<div class="chat-status">
🟢 online
</div>

</div>

</div>

<div
class="chat-toggle"
id="chatToggle">
▼
</div>

</div>

<div
class="chat-body"
id="chatBody">

<div
class="chat-messages"
id="chatMessages">
</div>

<div class="chat-input-area">

<input
type="text"
id="chatInput"
placeholder="Digite sua mensagem..."
>

<button id="sendChatBtn">
➤
</button>

</div>
</div>
</div>

<div
class="portal-overlay"
id="portalOverlay">
</div>

<!-- =========================
IMPORT MAP
========================= -->

<script type="importmap">
{
"imports": {
"three":
"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",

"three/addons/":
"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}
}
</script>

<!-- =========================
SCRIPT MODULE
========================= -->

<script type="module">

import * as THREE from "three";

import {
OrbitControls
}
from
"three/addons/controls/OrbitControls.js";

import {
GLTFLoader
}
from
"three/addons/loaders/GLTFLoader.js";

import {
initUI
}
from
"../shared/js/ui.js";

import {
ChatSystem
}
from
"../shared/js/chat.js";

import {
VoiceAssistant
}
from
"../shared/js/voice-assistant.js";

import {
initSkillCarousel
}
from
"../shared/js/skill-carousel.js";

/* =========================
CONFIG
========================= */

const config = {

    name: "VICTORIA",

    title:
    "✦ RAINHA ARCANA ✦",

    color: "#ff66cc",

    icon: "👑",

    modelPath:
    "../models/victoria.glb",

    modelScale: 0.5,

    modelPositionY: -0.25,

    bgColor: 0x120814,

    cameraPosition:{
        x:3,
        y:2,
        z:4
    },

    welcomeMessage:
    "✨ Bem-vindo ao reino da Victoria.",

    skills:[
        {
            name:"✨ Magia Arcana",
            value:98
        },
        {
            name:"👑 Liderança",
            value:96
        },
        {
            name:"💖 Energia",
            value:97
        }
    ],

    personalityText:
    "Victoria domina o reino rosa arcano.",

    getResponse:(msg)=>{

        const lower =
        msg.toLowerCase();

        if(lower.includes("oi")){
            return "✨ Olá viajante.";
        }

        if(lower.includes("portal")){
            return "🗺️ Use o portal no topo esquerdo.";
        }

        return "💖 Estou ouvindo você.";
    }

};

/* =========================
PORTAL SYSTEM
========================= */

const portalPlannerBtn =
document.getElementById(
"portalPlannerBtn"
);

function openPortalPlanner(){

    localStorage.setItem(
    "lastAsura",
    "victoria"
    );

    document.body.classList.add(
    "transition-out"
    );

    const flashOverlay =
    document.createElement("div");

    flashOverlay.style.cssText = `
    position:fixed;
    inset:0;
    background:
    radial-gradient(
    circle,
    rgba(255,102,204,.95),
    transparent
    );
    opacity:0;
    transition:.45s;
    z-index:100000;
    pointer-events:none;
    `;

    document.body.appendChild(
    flashOverlay
    );

    requestAnimationFrame(()=>{

        flashOverlay.style.opacity =
        "1";

        setTimeout(()=>{

            window.location.href =
            "../shared/portals/portal-system.html?asura=victoria";

        },350);

    });

}

if(portalPlannerBtn){

    portalPlannerBtn
    .addEventListener(
    "click",
    (e)=>{

        e.preventDefault();
        e.stopPropagation();

        openPortalPlanner();

    });

}

/* =========================
SCENE
========================= */

const container =
document.getElementById(
"canvas-container"
);

const scene =
new THREE.Scene();

scene.background =
new THREE.Color(
config.bgColor
);

scene.fog =
new THREE.FogExp2(
config.bgColor,
0.015
);

const camera =
new THREE.PerspectiveCamera(
45,
window.innerWidth /
window.innerHeight,
0.1,
1000
);

camera.position.set(
config.cameraPosition.x,
config.cameraPosition.y,
config.cameraPosition.z
);

const renderer =
new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

renderer.setPixelRatio(
window.devicePixelRatio
);

renderer.shadowMap.enabled =
true;

container.appendChild(
renderer.domElement
);

/* =========================
CONTROLS
========================= */

const controls =
new OrbitControls(
camera,
renderer.domElement
);

controls.enableDamping = true;

/* =========================
LIGHTS
========================= */

const ambientLight =
new THREE.AmbientLight(
0xffffff,
0.7
);

scene.add(ambientLight);

const pinkLight =
new THREE.PointLight(
0xff66cc,
1.5
);

pinkLight.position.set(
2,
3,
2
);

scene.add(pinkLight);

/* =========================
GROUND
========================= */

const floor =
new THREE.Mesh(

new THREE.CircleGeometry(
2.2,
64
),

new THREE.MeshStandardMaterial({

color:0xff66cc,

transparent:true,

opacity:.18,

emissive:0xff66cc,

emissiveIntensity:.5

})

);

floor.rotation.x =
-Math.PI/2;

floor.position.y =
-.5;

scene.add(floor);

/* =========================
PARTICLES
========================= */

const particlesGeometry =
new THREE.BufferGeometry();

const particleCount = 1200;

const positions =
new Float32Array(
particleCount * 3
);

for(let i=0;i<particleCount;i++){

positions[i*3] =
(Math.random()-.5)*12;

positions[i*3+1] =
Math.random()*5;

positions[i*3+2] =
(Math.random()-.5)*12;

}

particlesGeometry.setAttribute(
"position",
new THREE.BufferAttribute(
positions,
3
)
);

const particlesMaterial =
new THREE.PointsMaterial({

size:.04,

color:0xff99dd,

transparent:true,

opacity:.7

});

const particles =
new THREE.Points(
particlesGeometry,
particlesMaterial
);

scene.add(particles);

/* =========================
MODEL
========================= */

const loader =
new GLTFLoader();

let victoriaModel = null;

loader.load(

config.modelPath,

(gltf)=>{

victoriaModel =
gltf.scene;

victoriaModel.position.set(
0,
config.modelPositionY,
0
);

victoriaModel.scale.set(
config.modelScale,
config.modelScale,
config.modelScale
);

scene.add(victoriaModel);

},

undefined,

()=>{

const fallback =
new THREE.Mesh(

new THREE.SphereGeometry(
0.7,
32,
32
),

new THREE.MeshStandardMaterial({

color:0xff66cc,

emissive:0xff66cc,

emissiveIntensity:1

})

);

fallback.position.y = .3;

scene.add(fallback);

}

);

/* =========================
SKILL CAROUSEL
========================= */

try{

initSkillCarousel(
scene,
camera,
renderer,
config.color,
"victoria"
);

}catch(err){

console.error(err);

}

/* =========================
CHAT
========================= */

initUI(config);

const chat =
new ChatSystem(
"chatContainer",
config
);

/* =========================
VOICE
========================= */

const voiceButton =
document.getElementById(
"voiceButton"
);

if(voiceButton){

new VoiceAssistant(

voiceButton,

(text)=>{

document
.getElementById(
"chatInput"
).value = text;

chat.send();

},

null,

{
asuraName:"VICTORIA",
continuous:true
}

);

}

/* =========================
WELCOME
========================= */

setTimeout(()=>{

chat.addMessage(
config.welcomeMessage,
false
);

chat.addMessage(
"🗺️ Use o botão do mapa para abrir os portais.",
false
);

},600);

/* =========================
ANIMATION
========================= */

let time = 0;

function animate(){

requestAnimationFrame(
animate
);

time += .01;

particles.rotation.y =
time * .05;

if(victoriaModel){

victoriaModel.rotation.y =
Math.sin(time*.5)*.08;

}

controls.update();

renderer.render(
scene,
camera
);

}

animate();

/* =========================
RESIZE
========================= */

window.addEventListener(
"resize",
()=>{

camera.aspect =
window.innerWidth /
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

}
);

console.log(
"🟢 Victoria carregada com portal!"
);

</script>

</body>
</html>
