<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <title>VICTORIA • Guerra Infernal • A MVP dos Asuras</title>

    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/top-icons.css">
    <link rel="stylesheet" href="../shared/css/chat.css">
    <link rel="stylesheet" href="../shared/css/profile-panel.css">
    <link rel="stylesheet" href="../shared/css/portal.css">

    <style>
        :root {
            --asura-color: #ff0000;
            --asura-glow: rgba(255, 0, 0, 0.6);
            --asura-gradient: linear-gradient(135deg, #ff0000, #cc0000);
        }

        body {
            background: radial-gradient(circle at 30% 20%, #0a0000, #030108);
        }

        /* =========================
           PORTAL PLANNER BUTTON
        ========================= */

        .portal-planner-btn {
            position: fixed;
            top: 20px;
            left: 20px;

            width: 55px;
            height: 55px;

            border-radius: 50%;

            display: flex;
            align-items: center;
            justify-content: center;

            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);

            color: #ff0000;
            font-size: 28px;

            border: 2px solid #ff0000;

            box-shadow:
                0 0 20px rgba(255, 0, 0, 0.4);

            z-index: 9999;

            cursor: pointer;

            transition: all 0.3s ease;

            font-family: monospace;
        }

        .portal-planner-btn:hover {
            transform: scale(1.1);

            background: rgba(255, 0, 0, 0.2);

            box-shadow:
                0 0 35px rgba(255, 0, 0, 0.8);
        }

        .portal-planner-btn::before {
            content: "🗺️ Portal Planner";

            position: absolute;

            top: 70px;
            left: 0;

            background: rgba(0,0,0,0.9);

            color: #ff0000;

            font-size: 12px;

            padding: 6px 12px;

            border-radius: 20px;

            white-space: nowrap;

            opacity: 0;

            pointer-events: none;

            transition: opacity 0.3s;

            font-family: 'Poppins', sans-serif;

            border: 1px solid #ff0000;
        }

        .portal-planner-btn:hover::before {
            opacity: 1;
        }

        body.transition-out {
            opacity: 0;
            transform: scale(0.98);
            transition: all 0.4s ease;
        }

        /* =========================
           TOP ICONS
        ========================= */

        .top-icons {
            position: fixed;

            top: 20px;
            right: 20px;

            z-index: 9998;

            display: flex;
            gap: 12px;
        }
    </style>
</head>

<body>

    <div id="canvas-container"></div>

    <!-- PORTAL PLANNER -->
    <div
        class="portal-planner-btn"
        id="portalPlannerBtn"
        title="Abrir Portal Planner"
    >
        🗺️
    </div>

    <!-- TOP ICONS -->
    <div class="top-icons">

        <div
            class="top-icon"
            id="backButton"
            data-tooltip="Voltar ao Grimório"
        >
            ←
        </div>

        <div
            class="top-icon voice-icon"
            id="voiceButton"
            data-tooltip="Modo Jarvis"
        >
            <span class="brain-icon">🏅</span>
            <span class="mic-icon">🎤</span>

            <div class="mental-wave"></div>

            <div class="brain-waves left">
                <span></span><span></span><span></span><span></span><span></span>
            </div>

            <div class="brain-waves right">
                <span></span><span></span><span></span><span></span><span></span>
            </div>
        </div>

        <div
            class="top-icon"
            id="profileButton"
            data-tooltip="Perfil da Victoria"
        >
            🏅
        </div>

    </div>

    <!-- PROFILE -->
    <div class="profile-panel" id="profilePanel"></div>

    <!-- CHAT -->
    <div class="chat-container" id="chatContainer">

        <div class="chat-header" id="chatHeader">

            <div class="chat-header-info">

                <div class="chat-avatar">🏅</div>

                <div>
                    <h4>VICTORIA • A MVP Suprema</h4>
                    <div class="chat-status">
                        🔴 modo guerra | força máxima
                    </div>
                </div>

            </div>

            <div class="chat-toggle" id="chatToggle">▼</div>

        </div>

        <div class="chat-body" id="chatBody">

            <div class="chat-messages" id="chatMessages"></div>

            <div class="chat-input-area">

                <input
                    type="text"
                    id="chatInput"
                    placeholder="Descreva o conflito..."
                >

                <button id="sendChatBtn">➤</button>

            </div>

        </div>

    </div>

    <div class="portal-overlay" id="portalOverlay"></div>

    <!-- IMPORTMAP -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <!-- MAIN -->
    <script type="module">

        import * as THREE from 'three';

        import { OrbitControls }
        from 'three/addons/controls/OrbitControls.js';

        import { GLTFLoader }
        from 'three/addons/loaders/GLTFLoader.js';

        import { initUI }
        from '../shared/js/ui.js';

        import { ChatSystem }
        from '../shared/js/chat.js';

        import { VoiceAssistant }
        from '../shared/js/voice-assistant.js';

        import { initSkillCarousel }
        from '../shared/js/skill-carousel.js';

        // =========================
        // CONFIG
        // =========================

        const config = {

            name: 'VICTORIA',

            title:
                '✦ GUERRA INFERNAL • A MVP DOS ASURAS ✦',

            color: '#ff0000',

            icon: '🏅',

            modelPath:
                '../models/victoria2.glb',

            modelScale: 0.04,

            modelPositionY: -0.25,

            bgColor: 0x0a0000,

            cameraPosition: {
                x: 3.2,
                y: 2.2,
                z: 4.2
            },

            welcomeMessage:
                '🔥 VOCÊ ME CONVOCOU.',

            skills: [

                {
                    name: '🏅 Poder Máximo',
                    value: 100
                },

                {
                    name: '⚡ Estratégia',
                    value: 100
                }

            ]

        };

        // =========================
        // PORTAL PLANNER
        // =========================

        const portalPlannerBtn =
            document.getElementById(
                'portalPlannerBtn'
            );

        function openPortalPlanner() {

            localStorage.setItem(
                'lastAsura',
                'victoria'
            );

            document.body.classList.add(
                'transition-out'
            );

            const flashOverlay =
                document.createElement('div');

            flashOverlay.style.cssText = `
                position: fixed;
                inset: 0;
                background:
                    radial-gradient(
                        circle,
                        #ff0000,
                        transparent
                    );
                opacity: 0;
                transition: opacity 0.5s ease;
                z-index: 10000;
                pointer-events: none;
            `;

            document.body.appendChild(
                flashOverlay
            );

            requestAnimationFrame(() => {

                flashOverlay.style.opacity =
                    '0.8';

                setTimeout(() => {

                    window.location.href =
                        '../shared/portals/portal-system.html?asura=victoria';

                }, 400);

            });

        }

        if (portalPlannerBtn) {

            portalPlannerBtn.addEventListener(
                'click',
                (e) => {

                    e.preventDefault();
                    e.stopPropagation();

                    openPortalPlanner();

                }
            );

        }

        // =========================
        // THREE JS
        // =========================

        const container =
            document.getElementById(
                'canvas-container'
            );

        const scene =
            new THREE.Scene();

        scene.background =
            new THREE.Color(
                config.bgColor
            );

        const camera =
            new THREE.PerspectiveCamera(
                45,
                window.innerWidth /
                window.innerHeight,
                0.1,
                1000
            );

        camera.position.set(
            config.cameraPosition.x,
            config.cameraPosition.y,
            config.cameraPosition.z
        );

        const renderer =
            new THREE.WebGLRenderer({
                antialias: true
            });

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

        renderer.setPixelRatio(
            window.devicePixelRatio
        );

        container.appendChild(
            renderer.domElement
        );

        const controls =
            new OrbitControls(
                camera,
                renderer.domElement
            );

        controls.enableDamping = true;

        // =========================
        // LIGHTS
        // =========================

        const ambientLight =
            new THREE.AmbientLight(
                0x330000,
                0.5
            );

        scene.add(ambientLight);

        const directionalLight =
            new THREE.DirectionalLight(
                0xff0000,
                1
            );

        directionalLight.position.set(
            3,
            5,
            2
        );

        scene.add(directionalLight);

        // =========================
        // MODEL
        // =========================

        const loader =
            new GLTFLoader();

        loader.load(

            config.modelPath,

            (gltf) => {

                const model =
                    gltf.scene;

                model.scale.set(
                    config.modelScale,
                    config.modelScale,
                    config.modelScale
                );

                model.position.y =
                    config.modelPositionY;

                scene.add(model);

            },

            undefined,

            (err) => {

                console.error(err);

            }

        );

        // =========================
        // UI
        // =========================

        initUI(config);

        const chat =
            new ChatSystem(
                'chatContainer',
                config
            );

        const voiceButtonElem =
            document.getElementById(
                'voiceButton'
            );

        let voice = null;

        if (voiceButtonElem) {

            voice =
                new VoiceAssistant(

                    voiceButtonElem,

                    (text) => {

                        document.getElementById(
                            'chatInput'
                        ).value = text;

                        chat.send();

                    }

                );

        }

        // =========================
        // SKILLS
        // =========================

        try {

            initSkillCarousel(
                scene,
                camera,
                renderer,
                config.color,
                'victoria',
                []
            );

        } catch (err) {

            console.error(err);

        }

        // =========================
        // ANIMATE
        // =========================

        function animate() {

            requestAnimationFrame(
                animate
            );

            controls.update();

            renderer.render(
                scene,
                camera
            );

        }

        animate();

        // =========================
        // RESIZE
        // =========================

        window.addEventListener(
            'resize',
            () => {

                camera.aspect =
                    window.innerWidth /
                    window.innerHeight;

                camera.updateProjectionMatrix();

                renderer.setSize(
                    window.innerWidth,
                    window.innerHeight
                );

            }
        );

        // =========================
        // WELCOME
        // =========================

        setTimeout(() => {

            chat.addMessage(
                config.welcomeMessage,
                false
            );

        }, 500);

        console.log(
            '🟢 Victoria carregada com Portal Planner'
        );

    </script>

</body>
</html>
