<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VICTORIA • Guerra Infernal • A MVP dos Asuras</title>
    
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/top-icons.css">
    <link rel="stylesheet" href="../shared/css/chat.css">
    <link rel="stylesheet" href="../shared/css/profile-panel.css">
    <link rel="stylesheet" href="../shared/css/portal.css">
    
    <style>
        :root {
            --asura-color: #ff0000;
            --asura-glow: rgba(255, 0, 0, 0.6);
            --asura-gradient: linear-gradient(135deg, #ff0000, #cc0000);
        }

        body {
            background: radial-gradient(circle at 30% 20%, #0a0000, #030108);
            overflow: hidden;
        }

        /* =========================
           BOTÃO PORTAL - TOPO ESQUERDO
        ========================= */
        .portal-planner-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 55px;
            height: 55px;

            display: flex;
            align-items: center;
            justify-content: center;

            border-radius: 50%;
            cursor: pointer;

            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(12px);

            color: #ff0000;
            font-size: 28px;

            border: 2px solid #ff0000;

            box-shadow:
                0 0 15px rgba(255, 0, 0, 0.4),
                0 0 35px rgba(255, 0, 0, 0.2);

            z-index: 99999;

            transition:
                transform 0.3s ease,
                box-shadow 0.3s ease,
                background 0.3s ease;
        }

        .portal-planner-btn:hover {
            transform: scale(1.08);

            background: rgba(255, 0, 0, 0.15);

            box-shadow:
                0 0 25px rgba(255, 0, 0, 0.7),
                0 0 60px rgba(255, 0, 0, 0.3);
        }

        .portal-planner-btn::before {
            content: "🗺️ Portal Planner";

            position: absolute;
            top: 70px;
            left: 0;

            padding: 6px 12px;

            border-radius: 20px;

            background: rgba(0, 0, 0, 0.95);

            color: #ff4444;

            font-size: 12px;
            font-family: Poppins, sans-serif;

            white-space: nowrap;

            border: 1px solid #ff0000;

            opacity: 0;
            pointer-events: none;

            transition: opacity 0.3s ease;
        }

        .portal-planner-btn:hover::before {
            opacity: 1;
        }

        body.transition-out {
            opacity: 0;
            transform: scale(0.98);
            transition: all 0.4s ease;
        }

        .top-icons {
            position: fixed;
            top: 20px;
            right: 20px;

            z-index: 9998;

            display: flex;
            gap: 12px;
        }
    </style>
</head>

<body>

    <div id="canvas-container"></div>

    <!-- =========================
         BOTÃO DO PORTAL
    ========================== -->
    <div
        class="portal-planner-btn"
        id="portalPlannerBtn"
        title="Abrir Portal Planner"
    >
        🗺️
    </div>

    <!-- =========================
         TOP ICONS
    ========================== -->
    <div class="top-icons">

        <div
            class="top-icon"
            id="backButton"
            data-tooltip="Voltar ao Grimório"
        >
            ←
        </div>

        <div
            class="top-icon voice-icon"
            id="voiceButton"
            data-tooltip="Modo Jarvis"
        >
            <span class="brain-icon">🏅</span>
            <span class="mic-icon">🎤</span>

            <div class="mental-wave"></div>

            <div class="brain-waves left">
                <span></span><span></span><span></span><span></span><span></span>
            </div>

            <div class="brain-waves right">
                <span></span><span></span><span></span><span></span><span></span>
            </div>
        </div>

        <div
            class="top-icon"
            id="profileButton"
            data-tooltip="Perfil da Victoria"
        >
            🏅
        </div>

    </div>

    <div class="profile-panel" id="profilePanel"></div>

    <!-- =========================
         CHAT
    ========================== -->
    <div class="chat-container" id="chatContainer">

        <div class="chat-header" id="chatHeader">

            <div class="chat-header-info">

                <div class="chat-avatar">🏅</div>

                <div>
                    <h4>VICTORIA • A MVP Suprema</h4>
                    <div class="chat-status">
                        🔴 modo guerra | força máxima
                    </div>
                </div>

            </div>

            <div class="chat-toggle" id="chatToggle">▼</div>

        </div>

        <div class="chat-body" id="chatBody">

            <div class="chat-messages" id="chatMessages"></div>

            <div class="chat-input-area">
                <input
                    type="text"
                    id="chatInput"
                    placeholder="Descreva o conflito..."
                >

                <button id="sendChatBtn">➤</button>
            </div>

        </div>

    </div>

    <div class="portal-overlay" id="portalOverlay"></div>

    <!-- =========================
         IMPORT MAP
    ========================== -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <!-- =========================
         SCRIPT
    ========================== -->
    <script type="module">

        import * as THREE from 'three';

        import {
            OrbitControls
        } from 'three/addons/controls/OrbitControls.js';

        import {
            GLTFLoader
        } from 'three/addons/loaders/GLTFLoader.js';

        import {
            initUI
        } from '../shared/js/ui.js';

        import {
            ChatSystem
        } from '../shared/js/chat.js';

        import {
            VoiceAssistant
        } from '../shared/js/voice-assistant.js';

        import {
            initSkillCarousel
        } from '../shared/js/skill-carousel.js';

        // =========================
        // CONFIG
        // =========================
        const config = {

            name: 'VICTORIA',

            title: '✦ GUERRA INFERNAL • A MVP DOS ASURAS ✦',

            color: '#ff0000',

            icon: '🏅',

            modelPath: '../models/victoria2.glb',

            modelScale: 0.04,

            modelPositionY: -0.25,

            bgColor: 0x0a0000,

            cameraPosition: {
                x: 3.2,
                y: 2.2,
                z: 4.2
            },

            welcomeMessage:
                '🔥 VOCÊ ME CONVOCOU. Sou Victoria, a senhora da guerra.',

            skills: [
                {
                    name: '🏅 Poder Máximo',
                    value: 100
                },
                {
                    name: '⚡ Estratégia',
                    value: 100
                },
                {
                    name: '🔥 Poder Infernal',
                    value: 100
                },
                {
                    name: '🏆 Vitória Absoluta',
                    value: 100
                }
            ],

            personalityText:
                '🏅 "A derrota não é uma opção."',

            getResponse: (msg) => {

                const lower = msg.toLowerCase();

                if (lower.includes('oi')) {
                    return '🔥 Qual é a batalha?';
                }

                return '⚔️ Estou pronta para vencer.';
            }
        };

        // =========================
        // BOTÃO PORTAL
        // =========================
        const portalPlannerBtn =
            document.getElementById('portalPlannerBtn');

        function openPortalPlanner() {

            localStorage.setItem(
                'lastAsura',
                'victoria'
            );

            document.body.classList.add(
                'transition-out'
            );

            const flashOverlay =
                document.createElement('div');

            flashOverlay.style.cssText = `
                position: fixed;
                inset: 0;
                z-index: 100000;
                pointer-events: none;

                background:
                    radial-gradient(
                        circle,
                        rgba(255,0,0,0.95),
                        transparent 70%
                    );

                opacity: 0;

                transition: opacity 0.45s ease;
            `;

            document.body.appendChild(flashOverlay);

            requestAnimationFrame(() => {

                flashOverlay.style.opacity = '1';

                setTimeout(() => {

                    window.location.href =
                        '../shared/portals/portal-system.html?asura=victoria';

                }, 450);

            });

        }

        if (portalPlannerBtn) {

            portalPlannerBtn.addEventListener(
                'click',
                (e) => {

                    e.preventDefault();
                    e.stopPropagation();

                    openPortalPlanner();

                }
            );

        }

        // =========================
        // CENA 3D
        // =========================
        const container =
            document.getElementById('canvas-container');

        const scene = new THREE.Scene();

        scene.background =
            new THREE.Color(config.bgColor);

        scene.fog =
            new THREE.FogExp2(config.bgColor, 0.012);

        // CAMERA
        const camera =
            new THREE.PerspectiveCamera(
                45,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );

        camera.position.set(
            config.cameraPosition.x,
            config.cameraPosition.y,
            config.cameraPosition.z
        );

        camera.lookAt(0, 0.8, 0);

        // RENDERER
        const renderer =
            new THREE.WebGLRenderer({
                antialias: true
            });

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

        renderer.setPixelRatio(
            window.devicePixelRatio
        );

        renderer.shadowMap.enabled = true;

        container.appendChild(renderer.domElement);

        // CONTROLS
        const controls =
            new OrbitControls(
                camera,
                renderer.domElement
            );

        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        controls.target.set(0, 0.8, 0);

        // =========================
        // LUZES
        // =========================
        const ambientLight =
            new THREE.AmbientLight(0x330000, 0.4);

        scene.add(ambientLight);

        const mainLight =
            new THREE.DirectionalLight(0xff4422, 1.1);

        mainLight.position.set(3, 5, 2);

        scene.add(mainLight);

        const fillLight =
            new THREE.PointLight(config.color, 0.9);

        fillLight.position.set(1, 1.5, 2);

        scene.add(fillLight);

        // =========================
        // CHÃO
        // =========================
        const gridHelper =
            new THREE.GridHelper(
                14,
                24,
                config.color,
                0x440000
            );

        gridHelper.position.y = -0.5;

        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.45;

        scene.add(gridHelper);

        // =========================
        // MODELO
        // =========================
        const loader = new GLTFLoader();

        let model = null;

        loader.load(

            config.modelPath,

            (gltf) => {

                model = gltf.scene;

                model.position.set(
                    0,
                    config.modelPositionY,
                    0
                );

                model.scale.set(
                    config.modelScale,
                    config.modelScale,
                    config.modelScale
                );

                scene.add(model);

            },

            undefined,

            (error) => {

                console.error(error);

                const fallback =
                    new THREE.Mesh(

                        new THREE.SphereGeometry(
                            0.7,
                            32,
                            32
                        ),

                        new THREE.MeshStandardMaterial({
                            color: config.color,
                            emissive: config.color,
                            emissiveIntensity: 0.5
                        })

                    );

                scene.add(fallback);

            }

        );

        // =========================
        // CARROSSEL
        // =========================
        try {

            initSkillCarousel(
                scene,
                camera,
                renderer,
                config.color,
                'victoria'
            );

        } catch (err) {

            console.error(err);

        }

        // =========================
        // ANIMAÇÃO
        // =========================
        let time = 0;

        function animate() {

            requestAnimationFrame(animate);

            time += 0.01;

            fillLight.intensity =
                0.7 + Math.sin(time * 3.5) * 0.25;

            controls.update();

            renderer.render(scene, camera);

        }

        animate();

        // =========================
        // RESIZE
        // =========================
        window.addEventListener('resize', () => {

            camera.aspect =
                window.innerWidth /
                window.innerHeight;

            camera.updateProjectionMatrix();

            renderer.setSize(
                window.innerWidth,
                window.innerHeight
            );

        });

        // =========================
        // UI
        // =========================
        initUI(config);

        const chat =
            new ChatSystem(
                'chatContainer',
                config
            );

        const voiceButtonElem =
            document.getElementById('voiceButton');

        let voice = null;

        if (voiceButtonElem) {

            voice = new VoiceAssistant(

                voiceButtonElem,

                (text) => {

                    document.getElementById(
                        'chatInput'
                    ).value = text;

                    chat.send();

                },

                null,

                {
                    asuraName: config.name,
                    continuous: true
                }

            );

        }

        // =========================
        // MENSAGEM
        // =========================
        setTimeout(() => {

            chat.addMessage(
                config.welcomeMessage,
                false
            );

            setTimeout(() => {

                chat.addMessage(
                    '🗺️ Clique no botão do mapa no topo esquerdo para abrir o Portal Planner.',
                    false
                );

            }, 1500);

        }, 500);

        // =========================
        // OVERLAY
        // =========================
        const portalOverlayElem =
            document.getElementById('portalOverlay');

        if (portalOverlayElem) {

            portalOverlayElem.style.setProperty(
                '--asura-color',
                config.color
            );

        }

        console.log(
            '🟥 VICTORIA carregada com PORTAL funcionando'
        );

    </script>

</body>
</html>
