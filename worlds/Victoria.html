<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>

<title>VICTORIA • Reino Celestial</title>

<link rel="stylesheet" href="../shared/css/base.css">
<link rel="stylesheet" href="../shared/css/top-icons.css">
<link rel="stylesheet" href="../shared/css/chat.css">
<link rel="stylesheet" href="../shared/css/profile-panel.css">
<link rel="stylesheet" href="../shared/css/portal.css">

<style>

:root{
    --asura-color:#ff66d9;
    --asura-glow:rgba(255,102,217,.6);
    --asura-gradient:linear-gradient(135deg,#ff66d9,#b366ff);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:
    radial-gradient(circle at top,#2a1038 0%,#080312 60%,#020104 100%);
}

/* =========================
   CANVAS
========================= */

#canvas-container{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:1;
}

/* =========================
   PORTAL BUTTON
========================= */

#portalPlannerBtn{
    position:fixed;
    top:20px;
    left:20px;

    width:58px;
    height:58px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    background:rgba(0,0,0,.82);

    color:#ff66d9;

    font-size:30px;

    border:2px solid #ff66d9;

    box-shadow:
    0 0 18px rgba(255,102,217,.5),
    0 0 40px rgba(255,102,217,.2);

    backdrop-filter:blur(10px);

    cursor:pointer;

    z-index:999999999;

    user-select:none;

    transition:.25s;
}

#portalPlannerBtn:hover{
    transform:scale(1.08);

    box-shadow:
    0 0 28px rgba(255,102,217,.9),
    0 0 60px rgba(255,102,217,.4);
}

/* =========================
   TOP ICONS
========================= */

.top-icons{
    position:fixed;
    top:20px;
    right:20px;
    display:flex;
    gap:12px;
    z-index:999999;
}

/* =========================
   TRANSITION
========================= */

body.transition-out{
    opacity:0;
    transform:scale(.98);
    transition:.4s ease;
}

</style>
</head>

<body>

<!-- =========================
     CANVAS
========================= -->

<div id="canvas-container"></div>

<!-- =========================
     PORTAL BUTTON
========================= -->

<div id="portalPlannerBtn">🗺️</div>

<!-- =========================
     TOP ICONS
========================= -->

<div class="top-icons">

    <div class="top-icon" id="backButton">
        ←
    </div>

    <div class="top-icon voice-icon" id="voiceButton">

        <span class="brain-icon">👑</span>
        <span class="mic-icon">🎤</span>

        <div class="mental-wave"></div>

        <div class="brain-waves left">
            <span></span><span></span><span></span>
            <span></span><span></span>
        </div>

        <div class="brain-waves right">
            <span></span><span></span><span></span>
            <span></span><span></span>
        </div>

    </div>

    <div class="top-icon" id="profileButton">
        👑
    </div>

</div>

<div class="profile-panel" id="profilePanel"></div>

<!-- =========================
     CHAT
========================= -->

<div class="chat-container" id="chatContainer">

    <div class="chat-header" id="chatHeader">

        <div class="chat-header-info">

            <div class="chat-avatar">👑</div>

            <div>
                <h4>VICTORIA • Rainha Celestial</h4>
                <div class="chat-status">
                    🟢 online | consciência divina
                </div>
            </div>

        </div>

        <div class="chat-toggle" id="chatToggle">
            ▼
        </div>

    </div>

    <div class="chat-body" id="chatBody">

        <div class="chat-messages" id="chatMessages"></div>

        <div class="chat-input-area">

            <input
            type="text"
            id="chatInput"
            placeholder="Digite sua mensagem..."
            >

            <button id="sendChatBtn">
                ➤
            </button>

        </div>

    </div>

</div>

<div class="portal-overlay" id="portalOverlay"></div>

<!-- =========================
     IMPORTMAP
========================= -->

<script type="importmap">
{
    "imports": {
        "three":
        "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",

        "three/addons/":
        "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<!-- =========================
     MAIN SCRIPT
========================= -->

<script type="module">

import * as THREE from 'three';

import {
OrbitControls
}
from 'three/addons/controls/OrbitControls.js';

import {
GLTFLoader
}
from 'three/addons/loaders/GLTFLoader.js';

import {
initUI
}
from '../shared/js/ui.js';

import {
ChatSystem
}
from '../shared/js/chat.js';

import {
VoiceAssistant
}
from '../shared/js/voice-assistant.js';

/* =========================
   CONFIG
========================= */

const config = {

    name:'VICTORIA',

    title:'✦ REINO CELESTIAL ✦',

    color:'#ff66d9',

    icon:'👑',

    modelPath:'../models/victoria.glb',

    modelScale:0.52,

    modelPositionY:-0.3,

    bgColor:0x12051d,

    cameraPosition:{
        x:3,
        y:2,
        z:4
    },

    welcomeMessage:
    '✨ Bem-vindo ao reino celestial da Victoria.',

    getResponse:(msg)=>{

        return '👑 Victoria observa o fluxo do destino.';
    }
};

/* =========================
   PORTAL BUTTON
========================= */

const portalBtn =
document.getElementById("portalPlannerBtn");

portalBtn.addEventListener("click",()=>{

    localStorage.setItem(
        "lastAsura",
        "victoria"
    );

    document.body.classList.add(
        "transition-out"
    );

    setTimeout(()=>{

        window.location.href =
        "../shared/portals/portal-system.html?asura=victoria";

    },350);

});

/* =========================
   THREE
========================= */

const container =
document.getElementById(
    "canvas-container"
);

const scene = new THREE.Scene();

scene.background =
new THREE.Color(config.bgColor);

scene.fog =
new THREE.FogExp2(
    config.bgColor,
    0.018
);

const camera =
new THREE.PerspectiveCamera(
    45,
    window.innerWidth /
    window.innerHeight,
    0.1,
    1000
);

camera.position.set(
    config.cameraPosition.x,
    config.cameraPosition.y,
    config.cameraPosition.z
);

const renderer =
new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.setPixelRatio(
    window.devicePixelRatio
);

renderer.shadowMap.enabled = true;

container.appendChild(
    renderer.domElement
);

/* =========================
   CONTROLS
========================= */

const controls =
new OrbitControls(
    camera,
    renderer.domElement
);

controls.enableDamping = true;

controls.target.set(0,.8,0);

/* =========================
   LIGHTS
========================= */

const ambient =
new THREE.AmbientLight(
    0xffffff,
    .6
);

scene.add(ambient);

const light =
new THREE.DirectionalLight(
    0xff99ff,
    1.2
);

light.position.set(3,5,2);

scene.add(light);

const pinkLight =
new THREE.PointLight(
    0xff66d9,
    1.4
);

pinkLight.position.set(0,2,2);

scene.add(pinkLight);

/* =========================
   FLOOR
========================= */

const floor =
new THREE.Mesh(

    new THREE.CircleGeometry(
        2.2,
        64
    ),

    new THREE.MeshStandardMaterial({

        color:0x441155,

        emissive:0xff66d9,

        emissiveIntensity:.2,

        transparent:true,

        opacity:.85
    })
);

floor.rotation.x = -Math.PI/2;

floor.position.y = -.5;

scene.add(floor);

/* =========================
   PARTICLES
========================= */

const particlesGeo =
new THREE.BufferGeometry();

const count = 1200;

const positions =
new Float32Array(count*3);

for(let i=0;i<count;i++){

    positions[i*3] =
    (Math.random()-.5)*14;

    positions[i*3+1] =
    Math.random()*5;

    positions[i*3+2] =
    (Math.random()-.5)*14;
}

particlesGeo.setAttribute(
    'position',
    new THREE.BufferAttribute(
        positions,
        3
    )
);

const particlesMat =
new THREE.PointsMaterial({

    color:0xff99ff,

    size:.03,

    transparent:true,

    opacity:.7
});

const particles =
new THREE.Points(
    particlesGeo,
    particlesMat
);

scene.add(particles);

/* =========================
   MODEL
========================= */

const loader =
new GLTFLoader();

let victoria = null;

loader.load(

    config.modelPath,

    (gltf)=>{

        victoria = gltf.scene;

        victoria.scale.set(
            config.modelScale,
            config.modelScale,
            config.modelScale
        );

        victoria.position.set(
            0,
            config.modelPositionY,
            0
        );

        scene.add(victoria);
    },

    undefined,

    (err)=>{

        console.error(err);

        const fallback =
        new THREE.Mesh(

            new THREE.SphereGeometry(
                .7,
                32,
                32
            ),

            new THREE.MeshStandardMaterial({

                color:0xff66d9,

                emissive:0xff66d9,

                emissiveIntensity:.8
            })
        );

        fallback.position.y = .5;

        scene.add(fallback);
    }
);

/* =========================
   ANIMATION
========================= */

let time = 0;

function animate(){

    requestAnimationFrame(
        animate
    );

    time += .01;

    particles.rotation.y =
    time * .05;

    floor.material.emissiveIntensity =
    .2 + Math.sin(time*2)*.1;

    controls.update();

    renderer.render(
        scene,
        camera
    );
}

animate();

/* =========================
   RESIZE
========================= */

window.addEventListener(
    'resize',
    ()=>{

        camera.aspect =
        window.innerWidth /
        window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );
    }
);

/* =========================
   UI
========================= */

initUI(config);

const chat =
new ChatSystem(
    'chatContainer',
    config
);

const voiceButton =
document.getElementById(
    'voiceButton'
);

if(voiceButton){

    new VoiceAssistant(

        voiceButton,

        (text)=>{

            document.getElementById(
                'chatInput'
            ).value = text;

            chat.send();
        }
    );
}

/* =========================
   START MESSAGE
========================= */

setTimeout(()=>{

    chat.addMessage(

        "🗺️ Clique no portal no canto superior esquerdo.",

        false
    );

},800);

console.log(
    "✅ VICTORIA COM PORTAL OK"
);

</script>

</body>
</html>
