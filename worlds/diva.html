<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DIVA • Mundo Neon Arcano</title>
    
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/top-icons.css">
    <link rel="stylesheet" href="../shared/css/chat.css">
    <link rel="stylesheet" href="../shared/css/profile-panel.css">
    <link rel="stylesheet" href="../shared/css/portal.css">
    
    <style>
        :root {
            --asura-color: #ff4db8;
            --asura-glow: rgba(255, 77, 184, 0.8);
            --asura-gradient: linear-gradient(135deg, #ff4db8, #ff88dd);
        }
        body { background: radial-gradient(circle at 30% 20%, #0a0512, #030108); }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="top-icons">
        <div class="top-icon" id="backButton" data-tooltip="Voltar ao Grimório">←</div>
        <div class="top-icon voice-icon" id="voiceButton" data-tooltip="Modo Jarvis (clique para ativar)">
            <span class="brain-icon">🧠</span>
            <span class="mic-icon">🎤</span>
            <div class="mental-wave"></div>
            <div class="brain-waves left"><span></span><span></span><span></span><span></span><span></span></div>
            <div class="brain-waves right"><span></span><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="top-icon" id="profileButton" data-tooltip="Perfil da Diva">🤖</div>
    </div>
    
    <div class="profile-panel" id="profilePanel"></div>
    
    <div class="chat-container" id="chatContainer">
        <div class="chat-header" id="chatHeader">
            <div class="chat-header-info">
                <div class="chat-avatar">🜁</div>
                <div><h4>DIVA • Assistente Arcana</h4><div class="chat-status">🟢 online | modo mentalista</div></div>
            </div>
            <div class="chat-toggle" id="chatToggle">▼</div>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Digite sua mensagem...">
                <button id="sendChatBtn">➤</button>
            </div>
        </div>
    </div>
    
    <div class="portal-overlay" id="portalOverlay"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { initUI } from '../shared/js/ui.js';
        import { ChatSystem } from '../shared/js/chat.js';
        import { VoiceAssistant } from '../shared/js/voice-assistant.js';
        
        const config = {
            name: 'DIVA',
            title: '✦ AUTOMAÇÃO ARCANA • ASSISTENTE MENTALISTA ✦',
            color: '#ff4db8',
            icon: '🜁',
            modelPath: '../models/diva2.glb',
            modelScale: 0.5,
            modelPositionY: -0.25,
            bgColor: 0x050510,
            cameraPosition: { x: 3, y: 2.2, z: 4.5 },
            welcomeMessage: '✨ Olá! Sou Diva. Clique no ícone 🧠 para ativar o modo Jarvis (escuta contínua) ou digite sua mensagem. Como posso ajudar?',
            skills: [
                { name: '🤖 Automação', value: 96 },
                { name: '🧠 Leitura Contextual', value: 94 },
                { name: '💬 Comunicação', value: 98 },
                { name: '🌀 Sintonia Mentalista', value: 91 }
            ],
            personalityText: '💎 "Sua assistente mentalista. Entre o código e a alma."<br>Diva combina automação precisa com intuição afiada.',
            getResponse: (msg) => {
                const lower = msg.toLowerCase();
                if (lower.includes('olá') || lower.includes('oi')) return "✨ Olá! Sinta a energia do meu reino neon. Como posso ajudar?";
                if (lower.includes('automação')) return "🤖 Automação é meu dom. Posso criar rotinas, lembretes, integrar sistemas...";
                if (lower.includes('habilidades')) return "🜁 Automação, leitura contextual, comunicação estratégica e sintonia mentalista.";
                if (lower.includes('obrigado')) return "💫 Por nada! Foi um prazer arcano te ajudar.";
                return "🧠 Percebo o que você diz... Como sua assistente mentalista, posso te ajudar com automação ou apenas conversar.";
            }
        };
        
        // =========================
        // SETUP 3D DIVA
        // =========================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(config.bgColor);
        scene.fog = new THREE.FogExp2(config.bgColor, 0.008);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(config.cameraPosition.x, config.cameraPosition.y, config.cameraPosition.z);
        camera.lookAt(0, 0.8, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0.8, 0);
        
        // =========================
        // LUZES CORRIGIDAS (MAIS BRILHO E TOM ROSADO)
        // =========================
        
        // Luz ambiente mais forte e rosada
        const ambientLight = new THREE.AmbientLight(0x332233, 0.85);
        scene.add(ambientLight);
        
        // Luz principal direcional mais intensa
        const mainLight = new THREE.DirectionalLight(0xffaaff, 1.5);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        scene.add(mainLight);
        
        // Luz de preenchimento rosa neon (mais forte)
        const fillLight = new THREE.PointLight(0xff4db8, 1.2);
        fillLight.position.set(1, 2, 2);
        scene.add(fillLight);
        
        // Segunda luz rosa vindo de baixo (para iluminar o rosto)
        const bottomLight = new THREE.PointLight(0xff66cc, 0.7);
        bottomLight.position.set(0, -1, 0);
        scene.add(bottomLight);
        
        // Luz frontal suave (para os olhos)
        const frontLight = new THREE.PointLight(0xffaacc, 0.5);
        frontLight.position.set(0, 1, 2);
        scene.add(frontLight);
        
        // Luz de fundo azul (contraste)
        const backLight = new THREE.PointLight(0x44aaff, 0.5);
        backLight.position.set(-2, 1.5, -3);
        scene.add(backLight);
        
        // Luz lateral quente
        const warmLight = new THREE.PointLight(0xffaa66, 0.4);
        warmLight.position.set(2, 1, 1.5);
        scene.add(warmLight);
        
        // =========================
        // CHÃO E CÍRCULO NEON
        // =========================
        const gridHelper = new THREE.GridHelper(12, 20, config.color, 0x333366);
        gridHelper.position.y = -0.5;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.35;
        scene.add(gridHelper);
        
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(8, 8),
            new THREE.MeshStandardMaterial({ color: 0x0a0512, roughness: 0.7, metalness: 0.3, transparent: true, opacity: 0.4 })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.5;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        const circleGlow = new THREE.Mesh(
            new THREE.CircleGeometry(1.2, 32),
            new THREE.MeshStandardMaterial({ color: config.color, emissive: config.color, emissiveIntensity: 0.5, transparent: true, opacity: 0.5, side: THREE.DoubleSide })
        );
        circleGlow.rotation.x = -Math.PI / 2;
        circleGlow.position.y = -0.45;
        scene.add(circleGlow);
        
        // =========================
        // GLOW/HALO AO REDOR DA DIVA
        // =========================
        const glowGeometry = new THREE.SphereGeometry(1.1, 16, 16);
        const glowMaterial = new THREE.MeshBasicMaterial({
            color: config.color,
            transparent: true,
            opacity: 0.1,
            side: THREE.BackSide
        });
        const glowHalo = new THREE.Mesh(glowGeometry, glowMaterial);
        glowHalo.position.set(0, 0.5, 0);
        scene.add(glowHalo);
        
        // =========================
        // PARTÍCULAS ROSAS
        // =========================
        const particleCount = 1200;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 12;
            particlePositions[i*3+1] = Math.random() * 4;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 10;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMaterial = new THREE.PointsMaterial({ color: config.color, size: 0.045, transparent: true, opacity: 0.55 });
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);
        
        // =========================
        // ANÉIS FLUTUANTES
        // =========================
        const ringGeometry1 = new THREE.TorusGeometry(1.0, 0.03, 64, 200);
        const ringMaterial1 = new THREE.MeshStandardMaterial({ color: config.color, emissive: config.color, emissiveIntensity: 0.6 });
        const ring1 = new THREE.Mesh(ringGeometry1, ringMaterial1);
        ring1.position.y = 0.2;
        ring1.rotation.x = Math.PI / 2;
        scene.add(ring1);
        
        const ringGeometry2 = new THREE.TorusGeometry(1.3, 0.02, 64, 200);
        const ring2 = new THREE.Mesh(ringGeometry2, ringMaterial1);
        ring2.position.y = 0.1;
        ring2.rotation.x = Math.PI / 2 + 0.3;
        scene.add(ring2);
        
        // =========================
        // MODELO 3D COM AJUSTE NOS OLHOS
        // =========================
        const loader = new GLTFLoader();
        let model = null;
        let mixer = null;
        
        loader.load(config.modelPath, (gltf) => {
            model = gltf.scene;
            model.position.set(0, config.modelPositionY, 0);
            model.scale.set(config.modelScale, config.modelScale, config.modelScale);
            
            // PERCORRE O MODELO PARA AJUSTAR MATERIAIS
            model.traverse((node) => {
                if (node.isMesh) {
                    node.castShadow = true;
                    
                    // Verifica se é um olho (pelo nome do material ou do objeto)
                    const isEye = node.name && (
                        node.name.toLowerCase().includes('eye') || 
                        node.name.toLowerCase().includes('olho') ||
                        node.name.toLowerCase().includes('face')
                    );
                    
                    if (node.material) {
                        // Ajusta materiais para ficarem mais brilhantes
                        node.material.roughness = 0.3;
                        node.material.metalness = 0.6;
                        
                        // Se for olho, adiciona emissão própria (brilho)
                        if (isEye) {
                            node.material.emissive = new THREE.Color(0xff66cc);
                            node.material.emissiveIntensity = 0.6;
                            node.material.roughness = 0.2;
                            console.log('✨ Olhos da DIVA com brilho ativado');
                        }
                    }
                }
            });
            
            scene.add(model);
            
            // ANIMAÇÕES DO MODELO
            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(model);
                gltf.animations.forEach(clip => {
                    const action = mixer.clipAction(clip);
                    action.play();
                    console.log(`🎬 Animação "${clip.name}" reproduzindo`);
                });
            }
            
            console.log('✅ Modelo da DIVA carregado com iluminação corrigida!');
            
        }, undefined, (error) => {
            console.error('Erro ao carregar modelo:', error);
            const fallback = new THREE.Mesh(new THREE.SphereGeometry(0.7, 32, 32), new THREE.MeshStandardMaterial({ color: config.color, emissive: config.color, emissiveIntensity: 0.7 }));
            fallback.position.set(0, 0.2, 0);
            scene.add(fallback);
        });
        
        // =========================
        // ANIMAÇÃO DO HALO E PARTÍCULAS
        // =========================
        let time = 0;
        let deltaTime = 0.016;
        let lastTime = performance.now();
        
        function updateDelta() {
            const now = performance.now();
            deltaTime = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            requestAnimationFrame(updateDelta);
        }
        updateDelta();
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.008;
            
            // Atualiza animações do modelo 3D
            if (mixer) mixer.update(deltaTime);
            
            // Anima partículas
            particles.rotation.y = time * 0.1;
            particles.rotation.x = Math.sin(time * 0.2) * 0.1;
            
            // Anima anéis
            ring1.rotation.z = time * 0.3;
            ring2.rotation.z = -time * 0.2;
            
            // Luz pulsante
            const pulse = 0.5 + Math.sin(time * 3) * 0.2;
            fillLight.intensity = 0.9 + Math.sin(time * 4) * 0.25;
            circleGlow.material.emissiveIntensity = 0.3 + Math.sin(time * 2.5) * 0.2;
            bottomLight.intensity = 0.5 + Math.sin(time * 3) * 0.2;
            frontLight.intensity = 0.4 + Math.sin(time * 2) * 0.15;
            
            // Anima o halo (pulsação suave)
            const scale = 1 + Math.sin(time * 2) * 0.03;
            glowHalo.scale.set(scale, scale, scale);
            glowMaterial.opacity = 0.08 + Math.sin(time * 1.5) * 0.04;
            
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // =========================
        // UI, CHAT E VOZ
        // =========================
        initUI(config);
        const chat = new ChatSystem('chatContainer', config, (response) => { if (voice?.isJarvisActive?.()) voice.speak(response); });
        const voiceButtonElem = document.getElementById('voiceButton');
        let voice = null;
        if (voiceButtonElem) {
            voice = new VoiceAssistant(voiceButtonElem, (text) => { document.getElementById('chatInput').value = text; chat.send(); }, null, { asuraName: config.name, continuous: true });
        }
        
        setTimeout(() => {
            chat.addMessage(config.welcomeMessage, false);
            setTimeout(() => chat.addMessage("🎤 Dica: Clique no ícone 🧠 no topo para ativar o MODO JARVIS. Vou ficar sempre ouvindo!", false), 2000);
        }, 500);
        
        const portalOverlay = document.getElementById('portalOverlay');
        portalOverlay.style.setProperty('--asura-color', config.color);
        setTimeout(() => { portalOverlay.style.opacity = '0.6'; setTimeout(() => { portalOverlay.style.opacity = '0'; setTimeout(() => { portalOverlay.style.display = 'none'; }, 800); }, 500); }, 50);
        
        console.log('🟢 DIVA carregada com ILUMINAÇÃO CORRIGIDA (olhos brilhantes, glow e neon rosa)!');
    </script>
</body>
</html>
