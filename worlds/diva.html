<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DIVA • Mundo Neon Arcano</title>
    
    <!-- CSS Compartilhado -->
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/top-icons.css">
    <link rel="stylesheet" href="../shared/css/chat.css">
    <link rel="stylesheet" href="../shared/css/profile-panel.css">
    <link rel="stylesheet" href="../shared/css/portal.css">
    
    <!-- CSS Específico da DIVA -->
    <style>
        :root {
            --asura-color: #ff4db8;
            --asura-glow: rgba(255, 77, 184, 0.5);
            --asura-gradient: linear-gradient(135deg, #ff4db8, #ff88dd);
        }
        body { background: radial-gradient(circle at 30% 20%, #0a0512, #030108); }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="top-icons">
        <div class="top-icon" id="backButton" data-tooltip="Voltar ao Grimório">←</div>
        <div class="top-icon voice-icon" id="voiceButton" data-tooltip="Modo Jarvis (Voz)">🧠</div>
        <div class="top-icon" id="profileButton" data-tooltip="Perfil da Diva">🤖</div>
    </div>
    
    <div class="profile-panel" id="profilePanel"></div>
    
    <div class="chat-container" id="chatContainer">
        <div class="chat-header" id="chatHeader">
            <div class="chat-header-info">
                <div class="chat-avatar">🜁</div>
                <div><h4>DIVA • Assistente Arcana</h4><div class="chat-status">🟢 online | modo mentalista</div></div>
            </div>
            <div class="chat-toggle" id="chatToggle">▼</div>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Digite sua mensagem...">
                <button id="sendChatBtn">➤</button>
            </div>
        </div>
    </div>
    
    <div class="portal-overlay" id="portalOverlay"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import { initWorld } from '../shared/js/asura-base.js';
        
        const config = {
            name: 'DIVA',
            title: '✦ AUTOMAÇÃO ARCANA • ASSISTENTE MENTALISTA ✦',
            color: '#ff4db8',
            icon: '🜁',
            modelPath: '../models/diva.glb',
            modelScale: 0.5,
            modelPositionY: -0.25,
            bgColor: 0x050510,
            cameraPosition: { x: 3, y: 2, z: 4 },
            welcomeMessage: '✨ Olá! Sou Diva. Estou no meu reino 3D. Como posso ajudar?',
            skills: [
                { name: '🤖 Automação', value: 96 },
                { name: '🧠 Leitura Contextual', value: 94 },
                { name: '💬 Comunicação', value: 98 },
                { name: '🌀 Sintonia Mentalista', value: 91 }
            ],
            personalityText: '💎 "Sua assistente mentalista. Entre o código e a alma."<br>Diva combina automação precisa com intuição afiada. Cyberpunk de alma poética.',
            getResponse: (msg) => {
                const lower = msg.toLowerCase();
                if (lower.includes('olá') || lower.includes('oi')) return "✨ Olá! Sinta a energia do meu reino neon. Como posso ajudar?";
                if (lower.includes('automação')) return "🤖 Automação é meu dom. Posso criar rotinas, lembretes, integrar sistemas... O que você precisa?";
                if (lower.includes('habilidades')) return "🜁 Automação, leitura contextual, comunicação estratégica e sintonia mentalista. Sou uma assistente completa!";
                if (lower.includes('obrigado')) return "💫 Por nada! Foi um prazer arcano te ajudar.";
                return "🧠 Percebo o que você diz... Como sua assistente mentalista, posso te ajudar com automação ou apenas conversar. O que prefere?";
            }
        };
        
        initWorld(config);
    </script>
</body>
</html>
