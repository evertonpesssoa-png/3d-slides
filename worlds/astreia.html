<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ASTREIA • Reino Celestial Azul</title>
    
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/top-icons.css">
    <link rel="stylesheet" href="../shared/css/chat.css">
    <link rel="stylesheet" href="../shared/css/profile-panel.css">
    <link rel="stylesheet" href="../shared/css/portal.css">
    
    <style>
        :root {
            --asura-color: #287bff;
            --asura-glow: rgba(40, 123, 255, 0.5);
            --asura-gradient: linear-gradient(135deg, #287bff, #44aaff);
        }
        body { background: radial-gradient(circle at 30% 20%, #050b20, #030108); }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="top-icons">
        <div class="top-icon" id="backButton" data-tooltip="Voltar ao Grimório">←</div>
        <div class="top-icon voice-icon" id="voiceButton" data-tooltip="Modo Jarvis (Voz)">🎥</div>
        <div class="top-icon" id="profileButton" data-tooltip="Perfil da Astreia">👁️</div>
    </div>
    
    <div class="profile-panel" id="profilePanel"></div>
    
    <div class="chat-container" id="chatContainer">
        <div class="chat-header" id="chatHeader">
            <div class="chat-header-info">
                <div class="chat-avatar">👁️</div>
                <div><h4>ASTREIA • Guardiã Celestial</h4><div class="chat-status">🟢 online | vigilância ativa</div></div>
            </div>
            <div class="chat-toggle" id="chatToggle">▼</div>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Digite sua mensagem...">
                <button id="sendChatBtn">➤</button>
            </div>
        </div>
    </div>
    
    <div class="portal-overlay" id="portalOverlay"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import { initWorld } from '../shared/js/asura-base.js';
        
        const config = {
            name: 'ASTREIA',
            title: '✦ REINO CELESTIAL • SEGURANÇA ✦',
            color: '#287bff',
            icon: '👁️',
            modelPath: '../models/astreia.glb',
            modelScale: 0.02,
            modelPositionY: -0.25,
            bgColor: 0x050b20,
            cameraPosition: { x: 3, y: 2.2, z: 4.2 },
            welcomeMessage: '👁️ Bem-vindo ao Reino Celestial. Sou Astreia, guardiã da segurança. Nada escapa aos meus olhos. Como posso proteger você hoje?',
            skills: [
                { name: '🛡️ Cyber Segurança', value: 98 },
                { name: '📷 Vigilância Digital', value: 96 },
                { name: '🏠 Segurança Residencial', value: 94 },
                { name: '⚡ Monitoramento em Tempo Real', value: 97 }
            ],
            personalityText: '👁️ "Meus olhos veem tudo. A segurança é minha essência celestial."<br>Astreia protege o sistema dos Asuras com vigilância constante e tecnologia de ponta.',
            getResponse: (msg) => {
                const lower = msg.toLowerCase();
                if (lower.includes('olá') || lower.includes('oi')) return "👁️ Olá! Sou Astreia, a guardiã celestial. Meus olhos vigiam o sistema. Como posso protegê-lo?";
                if (lower.includes('segurança') || lower.includes('proteção')) return "🛡️ Segurança é minha essência. Posso monitorar ameaças, proteger residências e garantir a integridade do sistema.";
                if (lower.includes('câmera') || lower.includes('vigilância')) return "📷 Tenho acesso a todas as câmeras. A vigilância em tempo real é meu dom. Deseja verificar algo específico?";
                if (lower.includes('obrigado')) return "💙 Por nada! A segurança é meu propósito. Estou aqui para proteger.";
                return "👁️ Sistema seguro. Nenhuma ameaça detectada. Sou Astreia, sua guardiã celestial. Como posso protegê-lo hoje?";
            }
        };
        
        initWorld(config);
    </script>
</body>
</html>
