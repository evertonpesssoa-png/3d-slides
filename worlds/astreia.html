<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ASTREIA • Reino Celestial Azul</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/top-icons.css">
    <link rel="stylesheet" href="../shared/css/chat.css">
    <link rel="stylesheet" href="../shared/css/profile-panel.css">
    <link rel="stylesheet" href="../shared/css/portal.css">
    
    <style>
        :root {
            --asura-color: #287bff;
            --asura-glow: rgba(40, 123, 255, 0.6);
            --asura-gradient: linear-gradient(135deg, #287bff, #44aaff);
        }
        body { background: radial-gradient(circle at 30% 20%, #050b20, #030108); }
        
        .portal-planner-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            color: #287bff;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 28px;
            z-index: 9999;
            border: 2px solid #287bff;
            box-shadow: 0 0 20px rgba(40, 123, 255, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .portal-planner-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 35px rgba(40, 123, 255, 0.8);
            background: rgba(40, 123, 255, 0.2);
        }
        
        .portal-planner-btn::before {
            content: "🗺️ Portal Planner";
            position: absolute;
            top: 70px;
            left: 0;
            background: rgba(0,0,0,0.9);
            color: #287bff;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            font-family: 'Poppins', sans-serif;
            border: 1px solid #287bff;
        }
        
        .portal-planner-btn:hover::before { opacity: 1; }
        
        body.transition-out {
            opacity: 0;
            transform: scale(0.98);
            transition: all 0.4s ease;
        }
        
        /* =========================
           CHAT 3 NÍVEIS CORRIGIDO
        ========================= */
        .chat-container {
            position: fixed !important;
            bottom: 20px !important;
            right: 20px !important;
            background: rgba(5, 11, 32, 0.95) !important;
            backdrop-filter: blur(12px) !important;
            border-radius: 16px !important;
            border: 1px solid rgba(40,123,255,0.3) !important;
            z-index: 9998 !important;
            overflow: hidden !important;
            transition: all 0.3s ease !important;
        }
        
        /* NÍVEL 0 - MINIMIZADO */
        .chat-container.level-0 {
            width: 320px !important;
            height: 52px !important;
        }
        .chat-container.level-0 .chat-body {
            display: none !important;
        }
        
        /* NÍVEL 1 - NORMAL */
        .chat-container.level-1 {
            width: 380px !important;
            height: 500px !important;
        }
        .chat-container.level-1 .chat-body {
            display: flex !important;
            flex-direction: column !important;
            height: calc(100% - 52px) !important;
        }
        
        /* NÍVEL 2 - TELA CHEIA */
        .chat-container.level-2 {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
            width: 100% !important;
            height: 100% !important;
            border-radius: 0 !important;
            z-index: 99999 !important;
        }
        .chat-container.level-2 .chat-body {
            display: flex !important;
            flex-direction: column !important;
            height: calc(100% - 52px) !important;
        }
        .chat-container.level-2 .chat-messages {
            flex: 1 !important;
            height: auto !important;
            min-height: 0 !important;
        }
        .chat-container.level-2 .chat-input-area {
            flex-shrink: 0 !important;
        }
        
        .chat-header {
            background: rgba(0, 0, 0, 0.9) !important;
            padding: 12px 15px !important;
            cursor: pointer !important;
            border-bottom: 1px solid #287bff !important;
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
            height: 52px !important;
            box-sizing: border-box !important;
        }
        
        .chat-header-info {
            display: flex !important;
            align-items: center !important;
            gap: 10px !important;
            flex: 1 !important;
        }
        
        .chat-avatar { font-size: 24px !important; }
        .chat-header-info h4 {
            font-size: 14px !important;
            margin: 0 !important;
            color: #287bff !important;
            font-family: 'Poppins', sans-serif !important;
        }
        .chat-status { font-size: 10px !important; color: #0f0 !important; }
        
        .chat-header-actions {
            display: flex !important;
            gap: 8px !important;
            align-items: center !important;
        }
        
        .chat-header-actions button {
            background: transparent !important;
            border: none !important;
            cursor: pointer !important;
            font-size: 18px !important;
            padding: 4px 8px !important;
            border-radius: 8px !important;
            color: #287bff !important;
        }
        
        .chat-header-actions button:hover {
            background: rgba(40, 123, 255, 0.2) !important;
        }
        
        .chat-body {
            display: flex !important;
            flex-direction: column !important;
            overflow: hidden !important;
        }
        
        .chat-messages {
            flex: 1 !important;
            overflow-y: auto !important;
            padding: 12px !important;
            display: flex !important;
            flex-direction: column !important;
            gap: 10px !important;
            background: rgba(0, 0, 0, 0.5) !important;
            min-height: 0 !important;
        }
        
        .message {
            display: flex !important;
            gap: 10px !important;
            max-width: 90% !important;
        }
        
        .message.user {
            align-self: flex-end !important;
            flex-direction: row-reverse !important;
        }
        
        .message-avatar {
            width: 32px !important;
            height: 32px !important;
            border-radius: 50% !important;
            background: rgba(40,123,255,0.2) !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            font-size: 16px !important;
        }
        
        .message-content {
            background: rgba(40, 123, 255, 0.12) !important;
            border: 1px solid #287bff !important;
            border-radius: 15px !important;
            padding: 8px 12px !important;
            color: #cceeff !important;
            font-size: 13px !important;
            font-family: 'Poppins', sans-serif !important;
            word-break: break-word !important;
        }
        
        .message.user .message-content {
            background: rgba(40, 123, 255, 0.2) !important;
        }
        
        .message-time {
            font-size: 9px !important;
            color: rgba(255,255,255,0.5) !important;
            margin-top: 4px !important;
            text-align: right !important;
        }
        
        .chat-image {
            max-width: 180px !important;
            max-height: 150px !important;
            border-radius: 10px !important;
            margin-top: 5px !important;
            border: 1px solid #287bff !important;
            cursor: pointer !important;
        }
        
        .chat-file {
            display: flex !important;
            align-items: center !important;
            gap: 8px !important;
            background: rgba(40,123,255,0.1) !important;
            border: 1px solid #287bff !important;
            border-radius: 10px !important;
            padding: 8px 12px !important;
            margin-top: 5px !important;
            cursor: pointer !important;
        }
        
        .chat-file:hover {
            background: rgba(40,123,255,0.25) !important;
        }
        
        .file-icon { font-size: 24px !important; }
        .file-info { flex: 1 !important; }
        .file-name {
            font-size: 11px !important;
            color: #287bff !important;
        }
        .file-size { font-size: 9px !important; color: #888 !important; }
        .file-badge {
            background: rgba(40,123,255,0.2) !important;
            border-radius: 4px !important;
            padding: 2px 6px !important;
            font-size: 9px !important;
            color: #287bff !important;
        }
        
        .chat-input-area {
            display: flex !important;
            gap: 8px !important;
            padding: 10px !important;
            background: rgba(0, 0, 0, 0.85) !important;
            border-top: 1px solid rgba(40,123,255,0.2) !important;
            align-items: center !important;
            flex-shrink: 0 !important;
        }
        
        .chat-input-area input[type="text"] {
            flex: 1 !important;
            background: rgba(10, 20, 40, 0.9) !important;
            border: 1px solid #287bff !important;
            border-radius: 25px !important;
            padding: 10px 15px !important;
            color: #287bff !important;
            font-family: 'Poppins', sans-serif !important;
            font-size: 12px !important;
            outline: none !important;
        }
        
        .chat-input-area input[type="text"]:focus {
            box-shadow: 0 0 10px rgba(40,123,255,0.5) !important;
        }
        
        .chat-input-area button {
            background: rgba(0, 0, 0, 0.8) !important;
            border: 1px solid #287bff !important;
            color: #287bff !important;
            width: 38px !important;
            height: 38px !important;
            border-radius: 50% !important;
            cursor: pointer !important;
            font-size: 16px !important;
        }
        
        .chat-input-area button:hover {
            background: rgba(40,123,255,0.2) !important;
        }
        
        .attach-btn {
            background: rgba(0, 0, 0, 0.8) !important;
            border: 1px solid #287bff !important;
            color: #287bff !important;
            width: 38px !important;
            height: 38px !important;
            border-radius: 50% !important;
            cursor: pointer !important;
            font-size: 16px !important;
        }
        
        .attach-btn:hover {
            background: rgba(40,123,255,0.2) !important;
        }
        
        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-track { background: #0a0a1a; }
        .chat-messages::-webkit-scrollbar-thumb { background: #287bff; border-radius: 5px; }
        
        @media (max-width: 600px) {
            .chat-container.level-1 { width: calc(100% - 20px) !important; }
            .chat-container.level-0 { width: calc(100% - 20px) !important; }
            .chat-image { max-width: 130px !important; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="portal-planner-btn" id="portalPlannerBtn" title="Abrir Portal Planner">🗺️</div>
    
    <div class="top-icons">
        <div class="top-icon" id="backButton" data-tooltip="Voltar ao Grimório">←</div>
        <div class="top-icon voice-icon" id="voiceButton" data-tooltip="Modo Jarvis (clique para ativar)">
            <span class="brain-icon">👁️</span>
            <span class="mic-icon">🎤</span>
            <div class="mental-wave"></div>
            <div class="brain-waves left"><span></span><span></span><span></span><span></span><span></span></div>
            <div class="brain-waves right"><span></span><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="top-icon" id="profileButton" data-tooltip="Perfil da Astreia">👁️</div>
    </div>
    
    <div class="profile-panel" id="profilePanel"></div>
    
    <div class="chat-container" id="chatContainer">
        <div class="chat-header" id="chatHeader">
            <div class="chat-header-info">
                <div class="chat-avatar">👁️</div>
                <div>
                    <h4>ASTREIA • Guardiã Celestial</h4>
                    <div class="chat-status">🟢 online | vigilância ativa</div>
                </div>
            </div>
            <div class="chat-toggle" id="chatToggle">▼</div>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Digite sua mensagem...">
                <button id="sendChatBtn">➤</button>
            </div>
        </div>
    </div>
    
    <div class="portal-overlay" id="portalOverlay"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { initUI } from '../shared/js/ui.js';
        import { ChatSystem } from '../shared/js/chat.js';
        import { VoiceAssistant } from '../shared/js/voice-assistant.js';
        
        class EnhancedChatSystem extends ChatSystem {
            constructor(containerId, config, onSpeak) {
                super(containerId, config, onSpeak);
                this.addAttachButton();
                setTimeout(() => this.setupThreeLevels(), 50);
            }
            
            setupThreeLevels() {
                const header = this.container.querySelector('.chat-header');
                if (!header) return;
                
                // Esconde o toggle original
                const oldToggle = this.container.querySelector('.chat-toggle');
                if (oldToggle) oldToggle.style.display = 'none';
                
                // Cria container dos botões
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'chat-header-actions';
                
                // Botão fullscreen
                const fsBtn = document.createElement('button');
                fsBtn.className = 'fullscreen-toggle';
                fsBtn.innerHTML = '⛶';
                fsBtn.title = 'Tela cheia';
                
                // Botão toggle (substitui o original)
                const toggleBtn = document.createElement('button');
                toggleBtn.className = 'chat-toggle';
                toggleBtn.innerHTML = '▲';
                toggleBtn.title = 'Expandir';
                
                actionsDiv.appendChild(fsBtn);
                actionsDiv.appendChild(toggleBtn);
                header.appendChild(actionsDiv);
                
                let level = 0;
                
                const setLevel = (newLevel) => {
                    level = newLevel;
                    this.container.classList.remove('level-0', 'level-1', 'level-2');
                    this.container.classList.add(`level-${level}`);
                    
                    toggleBtn.innerHTML = level === 0 ? '▲' : '▼';
                    toggleBtn.title = level === 0 ? 'Expandir' : 'Minimizar';
                    fsBtn.innerHTML = level === 2 ? '✖' : '⛶';
                    fsBtn.title = level === 2 ? 'Sair da tela cheia' : 'Tela cheia';
                    
                    if (level === 2) {
                        if (!this._escHandler) {
                            this._escHandler = (e) => {
                                if (e.key === 'Escape') setLevel(1);
                            };
                            document.addEventListener('keydown', this._escHandler);
                        }
                    } else {
                        if (this._escHandler) {
                            document.removeEventListener('keydown', this._escHandler);
                            this._escHandler = null;
                        }
                    }
                };
                
                fsBtn.onclick = (e) => {
                    e.stopPropagation();
                    setLevel(level === 2 ? 1 : 2);
                };
                
                toggleBtn.onclick = (e) => {
                    e.stopPropagation();
                    setLevel(level === 0 ? 1 : 0);
                };
                
                header.onclick = (e) => {
                    if (e.target.closest('button')) return;
                    setLevel(level === 0 ? 1 : 0);
                };
                
                setLevel(0);
            }
            
            addAttachButton() {
                const inputArea = this.container.querySelector('.chat-input-area');
                if (!inputArea || inputArea.querySelector('.attach-btn')) return;
                
                const attachBtn = document.createElement('button');
                attachBtn.className = 'attach-btn';
                attachBtn.innerHTML = '📎';
                attachBtn.title = 'Enviar arquivo';
                
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.style.display = 'none';
                
                attachBtn.onclick = () => fileInput.click();
                fileInput.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) this.handleFileUpload(file);
                    fileInput.value = '';
                };
                
                const textInput = inputArea.querySelector('input[type="text"]');
                if (textInput) {
                    inputArea.insertBefore(attachBtn, textInput);
                    inputArea.insertBefore(fileInput, textInput);
                }
            }
            
            handleFileUpload(file) {
                const fileType = file.type;
                const fileName = file.name;
                const fileSize = this.formatFileSize(file.size);
                
                if (fileType.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        this.addImageMessage(ev.target.result, fileName, fileSize);
                    };
                    reader.readAsDataURL(file);
                } else {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        this.addFileMessage(ev.target.result, fileName, fileSize);
                    };
                    reader.readAsDataURL(file);
                }
            }
            
            formatFileSize(bytes) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }
            
            addImageMessage(imageUrl, fileName, fileSize) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message user';
                const time = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                
                messageDiv.innerHTML = `
                    <div class="message-avatar">👤</div>
                    <div class="message-content">
                        <div>🖼️ ${fileName} <span style="font-size:9px; color:#888;">(${fileSize})</span></div>
                        <img src="${imageUrl}" class="chat-image" onclick="window.open('${imageUrl}')">
                        <div class="message-time">${time}</div>
                    </div>
                `;
                this.messagesContainer.appendChild(messageDiv);
                this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
            }
            
            addFileMessage(fileData, fileName, fileSize) {
                const extension = fileName.split('.').pop().toUpperCase();
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message user';
                const time = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                
                messageDiv.innerHTML = `
                    <div class="message-avatar">👤</div>
                    <div class="message-content">
                        <div>📎 Arquivo anexado</div>
                        <div class="chat-file" onclick="window.open('${fileData}')">
                            <div class="file-icon">📄</div>
                            <div class="file-info">
                                <div class="file-name">${fileName}</div>
                                <div class="file-size">${fileSize}</div>
                            </div>
                            <div class="file-badge">${extension}</div>
                        </div>
                        <div class="message-time">${time}</div>
                    </div>
                `;
                this.messagesContainer.appendChild(messageDiv);
                this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
            }
        }
        
        const config = {
            name: 'ASTREIA',
            title: '✦ REINO CELESTIAL • SEGURANÇA ✦',
            color: '#287bff',
            icon: '👁️',
            modelPath: '../models/astreia.glb',
            modelScale: 0.04,
            modelPositionY: -0.25,
            bgColor: 0x050b20,
            cameraPosition: { x: 3, y: 2.2, z: 4.2 },
            welcomeMessage: '👁️ Bem-vindo ao Reino Celestial. Sou Astreia, guardiã da segurança.',
            skills: [
                { name: '🛡️ Cyber Segurança', value: 98 },
                { name: '📷 Vigilância Digital', value: 96 },
                { name: '🏠 Segurança Residencial', value: 94 },
                { name: '⚡ Monitoramento em Tempo Real', value: 97 }
            ],
            personalityText: '👁️ "Meus olhos veem tudo."',
            getResponse: (msg) => {
                const lower = msg.toLowerCase();
                if (lower.includes('olá') || lower.includes('oi')) return "👁️ Olá! Sou Astreia, a guardiã celestial.";
                if (lower.includes('segurança')) return "🛡️ Segurança é minha essência.";
                if (lower.includes('obrigado')) return "💙 Por nada!";
                return "👁️ Como posso ajudar?";
            }
        };
        
        // PORTAL
        const portalPlannerBtn = document.getElementById('portalPlannerBtn');
        function openPortalPlanner() {
            localStorage.setItem('lastAsura', 'astreia');
            document.body.classList.add('transition-out');
            const flashOverlay = document.createElement('div');
            flashOverlay.style.cssText = `position:fixed;inset:0;background:radial-gradient(circle,#287bff,transparent);opacity:0;transition:opacity 0.5s;z-index:10000;pointer-events:none;`;
            document.body.appendChild(flashOverlay);
            requestAnimationFrame(() => {
                flashOverlay.style.opacity = '0.8';
                setTimeout(() => window.location.href = '../shared/portals/portal-system.html?asura=astreia', 400);
            });
        }
        if (portalPlannerBtn) portalPlannerBtn.addEventListener('click', (e) => { e.preventDefault(); openPortalPlanner(); });
        
        // VOLTAR
        function voltarAoGrimorio() {
            document.body.classList.add('transition-out');
            const flash = document.createElement('div');
            flash.style.cssText = `position:fixed;inset:0;background:radial-gradient(circle,${config.color},transparent);opacity:0;transition:opacity 0.4s;z-index:100000;pointer-events:none;`;
            document.body.appendChild(flash);
            requestAnimationFrame(() => {
                flash.style.opacity = '0.8';
                setTimeout(() => window.location.href = '../index.html', 350);
            });
        }
        window.addEventListener('popstate', (event) => { event.preventDefault(); history.pushState(null, null, window.location.href); voltarAoGrimorio(); });
        history.pushState(null, null, window.location.href);
        
        // SETUP 3D (RESUMIDO MAS COMPLETO)
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(config.bgColor);
        scene.fog = new THREE.FogExp2(config.bgColor, 0.008);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 2.2, 4.2);
        camera.lookAt(0, 0.8, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.8, 0);
        
        // Luzes
        const ambientLight = new THREE.AmbientLight(0x113366, 0.6);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xaaccff, 1.1);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(config.color, 0.8);
        fillLight.position.set(1, 2, 2);
        scene.add(fillLight);
        
        // Chão
        const gridHelper = new THREE.GridHelper(14, 24, config.color, 0x224488);
        gridHelper.position.y = -0.5;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.4;
        scene.add(gridHelper);
        
        // Partículas
        const particleCount = 1800;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 15;
            particlePositions[i*3+1] = Math.random() * 5;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 13;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMaterial = new THREE.PointsMaterial({ color: 0x44aaff, size: 0.04, transparent: true, opacity: 0.5 });
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);
        
        // Anéis
        const ringGeometry = new THREE.TorusGeometry(1.2, 0.04, 64, 200);
        const ringMaterial = new THREE.MeshStandardMaterial({ color: config.color, emissive: config.color, emissiveIntensity: 0.5 });
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        ring.position.y = 0.15;
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);
        
        // Modelo 3D
        const loader = new GLTFLoader();
        let model = null;
        let mixer = null;
        loader.load(config.modelPath, (gltf) => {
            model = gltf.scene;
            model.position.set(0, -0.25, 0);
            model.scale.set(0.04, 0.04, 0.04);
            scene.add(model);
            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(model);
                gltf.animations.forEach(clip => mixer.clipAction(clip).play());
            }
        });
        
        // Animação
        let time = 0;
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            const delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            requestAnimationFrame(animate);
            time += 0.008;
            if (mixer) mixer.update(delta);
            particles.rotation.y = time * 0.05;
            ring.rotation.z = time * 0.3;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // INICIALIZAÇÃO DO CHAT
        initUI(config);
        
        const chat = new EnhancedChatSystem('chatContainer', config, (response) => {
            if (voice?.isJarvisActive?.()) voice.speak(response);
        });
        
        const voiceButtonElem = document.getElementById('voiceButton');
        let voice = null;
        if (voiceButtonElem) {
            voice = new VoiceAssistant(voiceButtonElem, (text) => { document.getElementById('chatInput').value = text; chat.send(); }, null, { asuraName: config.name, continuous: true });
        }
        
        setTimeout(() => {
            chat.addMessage(config.welcomeMessage, false);
            setTimeout(() => {
                chat.addMessage("🎤 Clique no 👁️ para MODO JARVIS", false);
                chat.addMessage("📎 Clique em 📎 para enviar arquivos", false);
                chat.addMessage("🖥️ ⛶ = tela cheia | ESC = sair", false);
            }, 2000);
        }, 500);
        
        console.log('✅ ASTREIA carregada com 3 níveis!');
    </script>
</body>
</html>
