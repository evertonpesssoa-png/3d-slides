<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

    <title>ASTREIA • Reino Celestial Azul</title>

    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/top-icons.css">
    <link rel="stylesheet" href="../shared/css/chat.css">
    <link rel="stylesheet" href="../shared/css/profile-panel.css">
    <link rel="stylesheet" href="../shared/css/portal.css">

    <style>
        :root{
            --asura-color:#287bff;
            --asura-glow:rgba(40,123,255,.6);
            --asura-gradient:linear-gradient(135deg,#287bff,#44aaff);
        }

        body{
            margin:0;
            overflow:hidden;
            background:radial-gradient(circle at 30% 20%, #050b20, #030108);
        }

        #canvas-container{
            position:fixed;
            inset:0;
        }

        /* =========================
           BOTÃO PORTAL
        ========================= */
        .portal-planner-btn{
            position:fixed;
            top:20px;
            left:20px;
            width:58px;
            height:58px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:28px;
            cursor:pointer;
            z-index:99999;

            background:rgba(5,10,25,0.82);
            backdrop-filter:blur(12px);

            border:2px solid #287bff;

            color:#5eb6ff;

            box-shadow:
                0 0 18px rgba(40,123,255,0.45),
                inset 0 0 12px rgba(40,123,255,0.25);

            transition:
                transform .25s ease,
                box-shadow .25s ease,
                background .25s ease;
        }

        .portal-planner-btn:hover{
            transform:scale(1.08);

            background:rgba(40,123,255,0.15);

            box-shadow:
                0 0 30px rgba(40,123,255,0.85),
                inset 0 0 18px rgba(40,123,255,0.35);
        }

        .portal-planner-btn::after{
            content:"Portal Planner";

            position:absolute;
            top:72px;
            left:50%;
            transform:translateX(-50%);

            padding:7px 14px;
            border-radius:30px;

            font-size:12px;
            font-family:Poppins,sans-serif;

            color:#8fd3ff;

            background:rgba(0,0,0,.88);

            border:1px solid rgba(40,123,255,.5);

            opacity:0;
            pointer-events:none;

            transition:opacity .25s ease;
            white-space:nowrap;
        }

        .portal-planner-btn:hover::after{
            opacity:1;
        }

        body.transition-out{
            opacity:0;
            transform:scale(.98);
            transition:all .4s ease;
        }

        .top-icons{
            position:fixed;
            top:20px;
            right:20px;
            z-index:9998;
            display:flex;
            gap:12px;
        }
    </style>
</head>

<body>

    <div id="canvas-container"></div>

    <!-- PORTAL -->
    <div class="portal-planner-btn" id="portalPlannerBtn">
        🗺️
    </div>

    <!-- TOPO -->
    <div class="top-icons">

        <div class="top-icon" id="backButton">
            ←
        </div>

        <div class="top-icon voice-icon" id="voiceButton">

            <span class="brain-icon">👁️</span>
            <span class="mic-icon">🎤</span>

            <div class="mental-wave"></div>

            <div class="brain-waves left">
                <span></span><span></span><span></span>
                <span></span><span></span>
            </div>

            <div class="brain-waves right">
                <span></span><span></span><span></span>
                <span></span><span></span>
            </div>

        </div>

        <div class="top-icon" id="profileButton">
            👁️
        </div>

    </div>

    <!-- PROFILE -->
    <div class="profile-panel" id="profilePanel"></div>

    <!-- CHAT -->
    <div class="chat-container" id="chatContainer">

        <div class="chat-header" id="chatHeader">

            <div class="chat-header-info">

                <div class="chat-avatar">
                    👁️
                </div>

                <div>
                    <h4>ASTREIA • Guardiã Celestial</h4>
                    <div class="chat-status">
                        🟢 online | vigilância ativa
                    </div>
                </div>

            </div>

            <div class="chat-toggle" id="chatToggle">
                ▼
            </div>

        </div>

        <div class="chat-body" id="chatBody">

            <div class="chat-messages" id="chatMessages"></div>

            <div class="chat-input-area">

                <input
                    type="text"
                    id="chatInput"
                    placeholder="Digite sua mensagem..."
                >

                <button id="sendChatBtn">
                    ➤
                </button>

            </div>

        </div>

    </div>

    <div class="portal-overlay" id="portalOverlay"></div>

    <!-- IMPORTMAP -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <!-- SCRIPT -->
    <script type="module">

        import * as THREE from 'three';

        import { OrbitControls }
        from 'three/addons/controls/OrbitControls.js';

        import { GLTFLoader }
        from 'three/addons/loaders/GLTFLoader.js';

        import { initUI }
        from '../shared/js/ui.js';

        import { ChatSystem }
        from '../shared/js/chat.js';

        import { VoiceAssistant }
        from '../shared/js/voice-assistant.js';

        // =========================
        // CONFIG
        // =========================
        const config = {

            name:'ASTREIA',

            color:'#287bff',

            modelPath:'../models/astreia.glb',

            modelScale:0.04,

            modelPositionY:-0.25,

            bgColor:0x050b20,

            cameraPosition:{
                x:3,
                y:2.2,
                z:4.2
            },

            welcomeMessage:
            '👁️ Bem-vindo ao Reino Celestial.',

            getResponse:(msg)=>{

                const lower = msg.toLowerCase();

                if(lower.includes('oi')){
                    return '👁️ Olá.';
                }

                if(lower.includes('segurança')){
                    return '🛡️ Segurança é minha especialidade.';
                }

                return '👁️ Sistema seguro.';
            }
        };

        // =========================
        // PORTAL BUTTON
        // =========================
        const portalPlannerBtn =
        document.getElementById('portalPlannerBtn');

        function openPortalPlanner(){

            localStorage.setItem(
                'lastAsura',
                'astreia'
            );

            document.body.classList.add(
                'transition-out'
            );

            const flash =
            document.createElement('div');

            flash.style.cssText = `
                position:fixed;
                inset:0;
                z-index:100000;
                pointer-events:none;
                background:
                radial-gradient(circle,
                rgba(40,123,255,.9),
                transparent 70%);
                opacity:0;
                transition:opacity .45s ease;
            `;

            document.body.appendChild(flash);

            requestAnimationFrame(()=>{

                flash.style.opacity = '1';

                setTimeout(()=>{

                    window.location.href =
                    '../shared/portals/portal-system.html?asura=astreia';

                },400);

            });

        }

        portalPlannerBtn.addEventListener(
            'click',
            openPortalPlanner
        );

        // =========================
        // SCENE
        // =========================
        const container =
        document.getElementById('canvas-container');

        const scene = new THREE.Scene();

        scene.background =
        new THREE.Color(config.bgColor);

        scene.fog =
        new THREE.FogExp2(config.bgColor,0.008);

        // =========================
        // CAMERA
        // =========================
        const camera =
        new THREE.PerspectiveCamera(
            45,
            window.innerWidth /
            window.innerHeight,
            0.1,
            1000
        );

        camera.position.set(
            config.cameraPosition.x,
            config.cameraPosition.y,
            config.cameraPosition.z
        );

        // =========================
        // RENDERER
        // =========================
        const renderer =
        new THREE.WebGLRenderer({
            antialias:true
        });

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

        renderer.setPixelRatio(
            window.devicePixelRatio
        );

        renderer.shadowMap.enabled = true;

        container.appendChild(
            renderer.domElement
        );

        // =========================
        // CONTROLS
        // =========================
        const controls =
        new OrbitControls(
            camera,
            renderer.domElement
        );

        controls.enableDamping = true;

        controls.target.set(0,0.8,0);

        // =========================
        // LIGHTS
        // =========================
        scene.add(
            new THREE.AmbientLight(
                0x224466,
                0.8
            )
        );

        const light =
        new THREE.DirectionalLight(
            0xaaccff,
            1.2
        );

        light.position.set(3,5,2);

        scene.add(light);

        // =========================
        // FLOOR
        // =========================
        const floor =
        new THREE.Mesh(

            new THREE.CircleGeometry(
                1.5,
                64
            ),

            new THREE.MeshStandardMaterial({
                color:0x287bff,
                emissive:0x287bff,
                emissiveIntensity:0.4,
                transparent:true,
                opacity:0.6
            })

        );

        floor.rotation.x = -Math.PI / 2;

        floor.position.y = -0.4;

        scene.add(floor);

        // =========================
        // PARTICLES
        // =========================
        const particlesGeo =
        new THREE.BufferGeometry();

        const count = 1800;

        const pos =
        new Float32Array(count * 3);

        for(let i=0;i<count;i++){

            pos[i*3] =
            (Math.random()-.5)*15;

            pos[i*3+1] =
            Math.random()*5;

            pos[i*3+2] =
            (Math.random()-.5)*15;
        }

        particlesGeo.setAttribute(
            'position',
            new THREE.BufferAttribute(pos,3)
        );

        const particlesMat =
        new THREE.PointsMaterial({
            color:0x66bbff,
            size:0.03,
            transparent:true,
            opacity:0.8
        });

        const particles =
        new THREE.Points(
            particlesGeo,
            particlesMat
        );

        scene.add(particles);

        // =========================
        // MODEL
        // =========================
        const loader =
        new GLTFLoader();

        let model = null;

        loader.load(

            config.modelPath,

            (gltf)=>{

                model = gltf.scene;

                model.position.set(
                    0,
                    config.modelPositionY,
                    0
                );

                model.scale.set(
                    config.modelScale,
                    config.modelScale,
                    config.modelScale
                );

                scene.add(model);

            },

            undefined,

            ()=>{

                const fallback =
                new THREE.Mesh(

                    new THREE.SphereGeometry(
                        0.7,
                        32,
                        32
                    ),

                    new THREE.MeshStandardMaterial({
                        color:0x287bff,
                        emissive:0x287bff,
                        emissiveIntensity:0.5
                    })

                );

                scene.add(fallback);

            }

        );

        // =========================
        // ANIMATION
        // =========================
        let time = 0;

        function animate(){

            requestAnimationFrame(animate);

            time += 0.01;

            particles.rotation.y =
            time * 0.05;

            floor.material.emissiveIntensity =
            0.25 + Math.sin(time * 2)*0.15;

            controls.update();

            renderer.render(scene,camera);
        }

        animate();

        // =========================
        // RESIZE
        // =========================
        window.addEventListener(
            'resize',
            ()=>{

                camera.aspect =
                window.innerWidth /
                window.innerHeight;

                camera.updateProjectionMatrix();

                renderer.setSize(
                    window.innerWidth,
                    window.innerHeight
                );

            }
        );

        // =========================
        // UI
        // =========================
        initUI(config);

        const chat =
        new ChatSystem(
            'chatContainer',
            config
        );

        const voiceButtonElem =
        document.getElementById(
            'voiceButton'
        );

        let voice = null;

        if(voiceButtonElem){

            voice =
            new VoiceAssistant(

                voiceButtonElem,

                (text)=>{

                    document.getElementById(
                        'chatInput'
                    ).value = text;

                    chat.send();
                }

            );
        }

        // =========================
        // PORTAL OVERLAY
        // =========================
        const portalOverlay =
        document.getElementById(
            'portalOverlay'
        );

        portalOverlay.style.setProperty(
            '--asura-color',
            config.color
        );

        setTimeout(()=>{

            portalOverlay.style.opacity='0.6';

            setTimeout(()=>{

                portalOverlay.style.opacity='0';

                setTimeout(()=>{

                    portalOverlay.style.display='none';

                },800);

            },500);

        },50);

        // =========================
        // WELCOME
        // =========================
        setTimeout(()=>{

            chat.addMessage(
                config.welcomeMessage,
                false
            );

        },500);

        console.log(
            '🟢 ASTREIA carregada'
        );

    </script>

</body>
</html>
