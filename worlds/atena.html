<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ATENA • Reino Dourado Divino</title>
    
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/top-icons.css">
    <link rel="stylesheet" href="../shared/css/chat.css">
    <link rel="stylesheet" href="../shared/css/profile-panel.css">
    <link rel="stylesheet" href="../shared/css/portal.css">
    
    <style>
        :root {
            --asura-color: #ffd700;
            --asura-glow: rgba(255, 215, 0, 0.6);
            --asura-gradient: linear-gradient(135deg, #ffd700, #ffaa33);
        }
        body { background: radial-gradient(circle at 30% 20%, #0a0a1a, #030108); }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="top-icons">
        <div class="top-icon" id="backButton" data-tooltip="Voltar ao Grimório">←</div>
        <div class="top-icon voice-icon" id="voiceButton" data-tooltip="Modo Jarvis (clique para ativar)">
            <span class="brain-icon">🦉</span>
            <span class="mic-icon">🎤</span>
            <div class="mental-wave"></div>
            <div class="brain-waves left"><span></span><span></span><span></span><span></span><span></span></div>
            <div class="brain-waves right"><span></span><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="top-icon" id="profileButton" data-tooltip="Perfil da Atena">🦉</div>
    </div>
    
    <div class="profile-panel" id="profilePanel"></div>
    
    <div class="chat-container" id="chatContainer">
        <div class="chat-header" id="chatHeader">
            <div class="chat-header-info">
                <div class="chat-avatar">🦉</div>
                <div><h4>ATENA • Mestra Divina</h4><div class="chat-status">🟢 online | sabedoria infinita</div></div>
            </div>
            <div class="chat-toggle" id="chatToggle">▼</div>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Digite sua mensagem...">
                <button id="sendChatBtn">➤</button>
            </div>
        </div>
    </div>
    
    <div class="portal-overlay" id="portalOverlay"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { initUI } from '../shared/js/ui.js';
        import { ChatSystem } from '../shared/js/chat.js';
        import { VoiceAssistant } from '../shared/js/voice-assistant.js';
        
        const config = {
            name: 'ATENA',
            title: '✦ REINO DOURADO DIVINO • MESTRA SÁBIA ✦',
            color: '#ffd700',
            icon: '🦉',
            modelPath: '../models/atena.glb',
            modelScale: 1.8,
            modelPositionY: -0.25,
            bgColor: 0x0a0a1a,
            cameraPosition: { x: 3.2, y: 2.2, z: 4.2 },
            welcomeMessage: '✨ Bem-vindo ao meu Reino Dourado. Sou Atena, a mestra divina. Todo conhecimento que você busca, eu posso te ensinar.',
            skills: [
                { name: '📚 Pedagogia & Ensino', value: 100 },
                { name: '🦉 Sabedoria Divina', value: 99 },
                { name: '🎓 Formação & Capacitação', value: 98 },
                { name: '⭐ Mentoria & Orientação', value: 100 }
            ],
            personalityText: '🦉 "O conhecimento é a luz que transforma. Sou sua mestra e guia."<br>Atena é a essência da pedagogia.',
            getResponse: (msg) => {
                const lower = msg.toLowerCase();
                if (lower.includes('olá') || lower.includes('oi')) return "✨ Olá, aprendiz! Sou Atena, sua mestra divina. O que deseja aprender hoje?";
                if (lower.includes('ensinar') || lower.includes('aprender')) return "📚 Ensinar é minha paixão. Posso te guiar em qualquer área: concursos, cursos, universidade, artes marciais...";
                if (lower.includes('concurso')) return "🎯 Concursos exigem disciplina. Posso te ajudar com planejamento de estudos.";
                if (lower.includes('obrigado')) return "💛 Por nada, querido aprendiz. Continue estudando e evoluindo!";
                return "🦉 Sinto sua sede de conhecimento. Como mestra divina, posso te ensinar qualquer coisa. Qual área do saber te chama hoje?";
            }
        };
        
        // =========================
        // SETUP 3D ATENA
        // =========================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(config.bgColor);
        scene.fog = new THREE.FogExp2(config.bgColor, 0.008);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(config.cameraPosition.x, config.cameraPosition.y, config.cameraPosition.z);
        camera.lookAt(0, 0.8, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0.8, 0);
        
        // =========================
        // LUZES DOURADAS
        // =========================
        const ambientLight = new THREE.AmbientLight(0x332200, 0.5);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffdd88, 1.2);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(config.color, 0.7);
        fillLight.position.set(1, 2, 2);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0xffaa44, 0.45);
        backLight.position.set(-2, 1.5, -3);
        scene.add(backLight);
        const goldenLight = new THREE.PointLight(0xffcc66, 0.5);
        goldenLight.position.set(0.5, 2.5, 1);
        scene.add(goldenLight);
        
        // =========================
        // CHÃO DOURADO
        // =========================
        const gridHelper = new THREE.GridHelper(14, 24, config.color, 0x664400);
        gridHelper.position.y = -0.5;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.4;
        scene.add(gridHelper);
        
        const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(9, 9), new THREE.MeshStandardMaterial({ color: 0x1a0f00, roughness: 0.5, metalness: 0.4, transparent: true, opacity: 0.5 }));
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.5;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        const circleGlow = new THREE.Mesh(new THREE.CircleGeometry(1.3, 32), new THREE.MeshStandardMaterial({ color: config.color, emissive: config.color, emissiveIntensity: 0.5, transparent: true, opacity: 0.5, side: THREE.DoubleSide }));
        circleGlow.rotation.x = -Math.PI / 2;
        circleGlow.position.y = -0.45;
        scene.add(circleGlow);
        
        // =========================
        // COLUNAS DOURADAS
        // =========================
        function createGoldenPillar(x, z, height = 1.3) {
            const group = new THREE.Group();
            const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.18, height, 8), new THREE.MeshStandardMaterial({ color: 0xcc8800, emissive: 0xaa6600, emissiveIntensity: 0.2, metalness: 0.8 }));
            pillar.position.y = 0;
            group.add(pillar);
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.22, 0.03, 16, 32), new THREE.MeshStandardMaterial({ color: config.color, emissive: config.color, emissiveIntensity: 0.3 }));
            ring.position.y = height / 2;
            ring.rotation.x = Math.PI / 2;
            group.add(ring);
            const topCrystal = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.2, 8), new THREE.MeshStandardMaterial({ color: config.color, emissive: 0xffcc66, emissiveIntensity: 0.3 }));
            topCrystal.position.y = height / 2 + 0.05;
            group.add(topCrystal);
            group.position.set(x, -0.4, z);
            return group;
        }
        const pillarPositions = [[-2.8,-2.5],[2.8,-2.5],[-2.8,2.5],[2.8,2.5],[-2,-3.2],[2,-3.2],[-3.2,-1.8],[3.2,-1.8],[-3.2,1.8],[3.2,1.8],[-2,3.2],[2,3.2]];
        pillarPositions.forEach(pos => { const pillar = createGoldenPillar(pos[0], pos[1], 1.0 + Math.random() * 0.4); scene.add(pillar); });
        
        // =========================
        // PARTÍCULAS DOURADAS
        // =========================
        const particleCount = 2000;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 16;
            particlePositions[i*3+1] = Math.random() * 5;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 14;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleColors = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const type = Math.random();
            if (type < 0.6) { particleColors[i*3]=0.9+Math.random()*0.3; particleColors[i*3+1]=0.7+Math.random()*0.3; particleColors[i*3+2]=0.1+Math.random()*0.2; }
            else if (type < 0.85) { particleColors[i*3]=0.9+Math.random()*0.3; particleColors[i*3+1]=0.8+Math.random()*0.3; particleColors[i*3+2]=0.5+Math.random()*0.4; }
            else { particleColors[i*3]=0.8; particleColors[i*3+1]=0.9; particleColors[i*3+2]=1.0; }
        }
        particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
        const particleMaterial = new THREE.PointsMaterial({ size: 0.05, vertexColors: true, transparent: true, opacity: 0.55 });
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);
        
        // =========================
        // ANÉIS DOURADOS
        // =========================
        const ringGeometry = new THREE.TorusGeometry(1.25, 0.04, 64, 200);
        const ringMaterial = new THREE.MeshStandardMaterial({ color: config.color, emissive: config.color, emissiveIntensity: 0.5 });
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        ring.position.y = 0.15;
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);
        
        const ring2Geometry = new THREE.TorusGeometry(1.55, 0.03, 64, 200);
        const ring2Material = new THREE.MeshStandardMaterial({ color: 0xffcc66, emissive: 0xffaa44, emissiveIntensity: 0.4 });
        const ring2 = new THREE.Mesh(ring2Geometry, ring2Material);
        ring2.position.y = 0.05;
        ring2.rotation.x = Math.PI / 2 + 0.3;
        scene.add(ring2);
        
        // =========================
        // CORUJAS FLUTUANTES
        // =========================
        function createOwlSymbol(x, z, yOffset) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), new THREE.MeshStandardMaterial({ color: config.color, emissive: 0xcc8800, emissiveIntensity: 0.2 }));
            group.add(body);
            const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.045, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: config.color, emissiveIntensity: 0.3 }));
            leftEye.position.set(-0.06, 0.05, 0.12);
            group.add(leftEye);
            const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.045, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: config.color, emissiveIntensity: 0.3 }));
            rightEye.position.set(0.06, 0.05, 0.12);
            group.add(rightEye);
            const beak = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.08, 4), new THREE.MeshStandardMaterial({ color: 0xffaa44 }));
            beak.position.set(0, -0.02, 0.14);
            group.add(beak);
            group.position.set(x, yOffset, z);
            return group;
        }
        const owlPositions = [[-1.5,1.0,1.6],[1.5,1.0,1.6],[-1.6,0.9,-1.5],[1.6,0.9,-1.5],[-2.2,1.1,0.5],[2.2,1.1,0.5],[0.5,1.2,-2.2],[-0.5,1.2,-2.2]];
        owlPositions.forEach(pos => { const owl = createOwlSymbol(pos[0], pos[2], pos[1]); scene.add(owl); });
        
        // =========================
        // LIVROS SAGRADOS
        // =========================
        function createFloatingBook(x, z, yOffset) {
            const group = new THREE.Group();
            const cover = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.13, 0.05), new THREE.MeshStandardMaterial({ color: 0xffcc66, metalness: 0.3 }));
            group.add(cover);
            const pages = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.11, 0.04), new THREE.MeshStandardMaterial({ color: 0xffeecc }));
            pages.position.z = 0.01;
            group.add(pages);
            group.position.set(x, yOffset, z);
            group.rotation.y = Math.random() * Math.PI * 2;
            return group;
        }
        const bookPositions = [[-1.0,0.7,2.0],[1.0,0.7,2.0],[-1.2,0.5,-2.0],[1.2,0.5,-2.0],[0,0.8,2.3],[0,0.6,-2.3],[-2.0,0.7,1.0],[2.0,0.7,1.0]];
        bookPositions.forEach(pos => { const book = createFloatingBook(pos[0], pos[2], pos[1]); scene.add(book); });
        
        // =========================
        // MODELO 3D
        // =========================
        const loader = new GLTFLoader();
        let model = null;
        let mixer = null;
        
        loader.load(config.modelPath, (gltf) => {
            model = gltf.scene;
            model.position.set(0, config.modelPositionY, 0);
            model.scale.set(config.modelScale, config.modelScale, config.modelScale);
            model.traverse((node) => { if (node.isMesh) { node.castShadow = true; } });
            scene.add(model);
            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(model);
                gltf.animations.forEach(clip => mixer.clipAction(clip).play());
            }
        });
        
        // =========================
        // ANIMAÇÃO
        // =========================
        let time = 0;
        let deltaTime = 0.016;
        let lastTime = performance.now();
        
        function updateDelta() {
            const now = performance.now();
            deltaTime = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            requestAnimationFrame(updateDelta);
        }
        updateDelta();
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.007;
            if (mixer) mixer.update(deltaTime);
            particles.rotation.y = time * 0.06;
            particles.rotation.x = Math.sin(time * 0.12) * 0.08;
            ring.rotation.z = time * 0.32;
            ring2.rotation.z = -time * 0.26;
            fillLight.intensity = 0.55 + Math.sin(time * 2.0) * 0.2;
            circleGlow.material.emissiveIntensity = 0.3 + Math.sin(time * 1.8) * 0.15;
            goldenLight.intensity = 0.4 + Math.sin(time * 1.5) * 0.15;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // =========================
        // UI, CHAT E VOZ
        // =========================
        initUI(config);
        const chat = new ChatSystem('chatContainer', config, (response) => { if (voice?.isJarvisActive?.()) voice.speak(response); });
        const voiceButtonElem = document.getElementById('voiceButton');
        let voice = null;
        if (voiceButtonElem) {
            voice = new VoiceAssistant(voiceButtonElem, (text) => { document.getElementById('chatInput').value = text; chat.send(); }, null, { asuraName: config.name, continuous: true });
        }
        
        setTimeout(() => {
            chat.addMessage(config.welcomeMessage, false);
            setTimeout(() => chat.addMessage("🎤 Dica: Clique no ícone 🦉 no topo para ativar o MODO JARVIS. Vou ficar sempre ouvindo!", false), 2000);
        }, 500);
        
        const portalOverlay = document.getElementById('portalOverlay');
        portalOverlay.style.setProperty('--asura-color', config.color);
        setTimeout(() => { portalOverlay.style.opacity = '0.6'; setTimeout(() => { portalOverlay.style.opacity = '0'; setTimeout(() => { portalOverlay.style.display = 'none'; }, 800); }, 500); }, 50);
        
        console.log('🟢 ATENA carregada com corujas douradas, livros sagrados e Modo Jarvis!');
    </script>
</body>
</html>
