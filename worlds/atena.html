<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <title>ATENA • Reino Dourado Divino</title>

    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/top-icons.css">
    <link rel="stylesheet" href="../shared/css/chat.css">
    <link rel="stylesheet" href="../shared/css/profile-panel.css">
    <link rel="stylesheet" href="../shared/css/portal.css">

    <style>

        :root {
            --asura-color: #ffd700;
            --asura-glow: rgba(255, 215, 0, 0.6);
            --asura-gradient: linear-gradient(135deg, #ffd700, #ffaa33);
        }

        body {
            background:
            radial-gradient(circle at 30% 20%, #0a0a1a, #030108);
            overflow: hidden;
        }

        /* =========================
           TRANSIÇÃO PORTAL
        ========================= */

        body.transition-out{
            opacity:0;
            transform:scale(.98);
            transition:all .4s ease;
        }

        /* =========================
           BOTÃO PORTAL PLANNER
        ========================= */

        .portal-planner-btn {

            position: fixed;

            top: 20px;
            left: 20px;

            width: 55px;
            height: 55px;

            border-radius: 50%;

            background: rgba(0,0,0,0.85);

            backdrop-filter: blur(12px);

            border: 2px solid #ffd700;

            color: #ffd700;

            display: flex;
            align-items: center;
            justify-content: center;

            z-index: 9999;

            cursor: pointer;

            font-size: 28px;

            transition: all .3s ease;

            box-shadow:
            0 0 20px rgba(255,215,0,.5);

        }

        .portal-planner-btn:hover{

            transform: scale(1.1);

            box-shadow:
            0 0 35px rgba(255,215,0,.9);

        }

        .portal-planner-btn::before {

            content: "🗺️ Portal Planner";

            position: absolute;

            top: 70px;
            left: 0;

            background: rgba(0,0,0,0.9);

            color: #ffd700;

            font-size: 12px;

            padding: 6px 12px;

            border-radius: 20px;

            white-space: nowrap;

            opacity: 0;

            pointer-events: none;

            transition: opacity 0.3s;

            border: 1px solid #ffd700;

            font-family: sans-serif;

        }

        .portal-planner-btn:hover::before {
            opacity: 1;
        }

        /* =========================
           TOP ICONS
        ========================= */

        .top-icons {

            position: fixed;

            top: 20px;
            right: 20px;

            z-index: 9998;

            display: flex;

            gap: 12px;
        }

    </style>
</head>

<body>

    <div id="canvas-container"></div>

    <!-- =========================
         PORTAL BUTTON
    ========================== -->

    <div
        class="portal-planner-btn"
        id="portalPlannerBtn">

        🗺️

    </div>

    <!-- =========================
         TOP ICONS
    ========================== -->

    <div class="top-icons">

        <div
            class="top-icon"
            id="backButton"
            data-tooltip="Voltar ao Grimório">

            ←

        </div>

        <div
            class="top-icon voice-icon"
            id="voiceButton"
            data-tooltip="Modo Jarvis (clique para ativar)">

            <span class="brain-icon">🦉</span>

            <span class="mic-icon">🎤</span>

            <div class="mental-wave"></div>

            <div class="brain-waves left">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>

            <div class="brain-waves right">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>

        </div>

        <div
            class="top-icon"
            id="profileButton"
            data-tooltip="Perfil da Atena">

            🦉

        </div>

    </div>

    <!-- =========================
         PROFILE PANEL
    ========================== -->

    <div
        class="profile-panel"
        id="profilePanel">
    </div>

    <!-- =========================
         CHAT
    ========================== -->

    <div
        class="chat-container"
        id="chatContainer">

        <div
            class="chat-header"
            id="chatHeader">

            <div class="chat-header-info">

                <div class="chat-avatar">
                    🦉
                </div>

                <div>

                    <h4>
                        ATENA • Mestra Divina
                    </h4>

                    <div class="chat-status">
                        🟢 online | sabedoria infinita
                    </div>

                </div>

            </div>

            <div
                class="chat-toggle"
                id="chatToggle">

                ▼

            </div>

        </div>

        <div
            class="chat-body"
            id="chatBody">

            <div
                class="chat-messages"
                id="chatMessages">
            </div>

            <div class="chat-input-area">

                <input
                    type="text"
                    id="chatInput"
                    placeholder="Digite sua mensagem...">

                <button id="sendChatBtn">
                    ➤
                </button>

            </div>

        </div>

    </div>

    <!-- =========================
         PORTAL OVERLAY
    ========================== -->

    <div
        class="portal-overlay"
        id="portalOverlay">
    </div>

    <!-- =========================
         IMPORT MAP
    ========================== -->

    <script type="importmap">
    {
        "imports": {
            "three":
            "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",

            "three/addons/":
            "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <!-- =========================
         SCRIPT MODULE
    ========================== -->

    <script type="module">

        import * as THREE from 'three';

        import { OrbitControls }
        from 'three/addons/controls/OrbitControls.js';

        import { GLTFLoader }
        from 'three/addons/loaders/GLTFLoader.js';

        import { initUI }
        from '../shared/js/ui.js';

        import { ChatSystem }
        from '../shared/js/chat.js';

        import { VoiceAssistant }
        from '../shared/js/voice-assistant.js';

        // =========================
        // CONFIG
        // =========================

        const config = {

            name: 'ATENA',

            title:
            '✦ REINO DOURADO DIVINO • MESTRA SÁBIA ✦',

            color: '#ffd700',

            icon: '🦉',

            modelPath: '../models/atena.glb',

            modelScale: 2.5,

            modelPositionY: 0.7,

            bgColor: 0x0a0a1a,

            cameraPosition: {
                x: 3.2,
                y: 2.2,
                z: 4.2
            },

            welcomeMessage:
            '✨ Bem-vindo ao meu Reino Dourado. Sou Atena, a mestra divina. Todo conhecimento que você busca, eu posso te ensinar.',

            skills: [

                {
                    name:
                    '📚 Pedagogia & Ensino',
                    value: 100
                },

                {
                    name:
                    '🦉 Sabedoria Divina',
                    value: 99
                },

                {
                    name:
                    '🎓 Formação & Capacitação',
                    value: 98
                },

                {
                    name:
                    '⭐ Mentoria & Orientação',
                    value: 100
                }

            ],

            personalityText:
            '🦉 "O conhecimento é a luz que transforma. Sou sua mestra e guia."<br>Atena é a essência da pedagogia.',

            getResponse: (msg) => {

                const lower =
                msg.toLowerCase();

                if (
                    lower.includes('olá') ||
                    lower.includes('oi')
                ) {

                    return
                    "✨ Olá, aprendiz!";

                }

                if (
                    lower.includes('ensinar') ||
                    lower.includes('aprender')
                ) {

                    return
                    "📚 Posso te ensinar qualquer área.";
                }

                if (
                    lower.includes('concurso')
                ) {

                    return
                    "🎯 Concursos exigem disciplina.";

                }

                if (
                    lower.includes('obrigado')
                ) {

                    return
                    "💛 Continue evoluindo.";
                }

                return
                "🦉 O conhecimento ilumina o espírito.";

            }

        };

        // =========================
        // PORTAL SYSTEM
        // =========================

        const portalPlannerBtn =
        document.getElementById(
            'portalPlannerBtn'
        );

        function openPortalPlanner() {

            localStorage.setItem(
                'lastAsura',
                'atena'
            );

            document.body.classList.add(
                'transition-out'
            );

            const flashOverlay =
            document.createElement('div');

            flashOverlay.style.cssText = `

                position: fixed;
                inset: 0;

                background:
                radial-gradient(
                    circle,
                    #ffd700,
                    transparent
                );

                opacity: 0;

                transition:
                opacity .5s ease;

                z-index: 10000;

                pointer-events: none;

            `;

            document.body.appendChild(
                flashOverlay
            );

            requestAnimationFrame(() => {

                flashOverlay.style.opacity = '.8';

                setTimeout(() => {

                    window.location.href =
                    '../shared/portals/portal-system.html?asura=atena';

                }, 400);

            });

        }

        if (portalPlannerBtn) {

            portalPlannerBtn
            .addEventListener(
                'click',
                (e) => {

                    e.preventDefault();
                    e.stopPropagation();

                    openPortalPlanner();

                }
            );
        }

        // =========================
        // SETUP 3D
        // =========================

        const container =
        document.getElementById(
            'canvas-container'
        );

        const scene =
        new THREE.Scene();

        scene.background =
        new THREE.Color(
            config.bgColor
        );

        scene.fog =
        new THREE.FogExp2(
            config.bgColor,
            0.008
        );

        const camera =
        new THREE.PerspectiveCamera(
            45,
            window.innerWidth /
            window.innerHeight,
            0.1,
            1000
        );

        camera.position.set(
            config.cameraPosition.x,
            config.cameraPosition.y,
            config.cameraPosition.z
        );

        camera.lookAt(0, 0.8, 0);

        const renderer =
        new THREE.WebGLRenderer({
            antialias: true
        });

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

        renderer.setPixelRatio(
            window.devicePixelRatio
        );

        renderer.shadowMap.enabled = true;

        container.appendChild(
            renderer.domElement
        );

        const controls =
        new OrbitControls(
            camera,
            renderer.domElement
        );

        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        controls.enableZoom = true;
        controls.enablePan = true;

        controls.target.set(
            0,
            0.8,
            0
        );

        // =========================
        // LIGHTS
        // =========================

        const ambientLight =
        new THREE.AmbientLight(
            0x332200,
            0.5
        );

        scene.add(ambientLight);

        const mainLight =
        new THREE.DirectionalLight(
            0xffdd88,
            1.2
        );

        mainLight.position.set(
            3,
            5,
            2
        );

        mainLight.castShadow = true;

        scene.add(mainLight);

        const fillLight =
        new THREE.PointLight(
            config.color,
            0.7
        );

        fillLight.position.set(
            1,
            2,
            2
        );

        scene.add(fillLight);

        const backLight =
        new THREE.PointLight(
            0xffaa44,
            0.45
        );

        backLight.position.set(
            -2,
            1.5,
            -3
        );

        scene.add(backLight);

        const goldenLight =
        new THREE.PointLight(
            0xffcc66,
            0.5
        );

        goldenLight.position.set(
            0.5,
            2.5,
            1
        );

        scene.add(goldenLight);

        // =========================
        // GROUND
        // =========================

        const gridHelper =
        new THREE.GridHelper(
            14,
            24,
            config.color,
            0x664400
        );

        gridHelper.position.y = -0.5;

        gridHelper.material.transparent =
        true;

        gridHelper.material.opacity =
        0.4;

        scene.add(gridHelper);

        const groundPlane =
        new THREE.Mesh(

            new THREE.PlaneGeometry(
                9,
                9
            ),

            new THREE.MeshStandardMaterial({

                color: 0x1a0f00,

                roughness: 0.5,

                metalness: 0.4,

                transparent: true,

                opacity: 0.5

            })

        );

        groundPlane.rotation.x =
        -Math.PI / 2;

        groundPlane.position.y =
        -0.5;

        groundPlane.receiveShadow =
        true;

        scene.add(groundPlane);

        // =========================
        // GLOW CIRCLE
        // =========================

        const circleGlow =
        new THREE.Mesh(

            new THREE.CircleGeometry(
                1.3,
                32
            ),

            new THREE.MeshStandardMaterial({

                color: config.color,

                emissive: config.color,

                emissiveIntensity: 0.5,

                transparent: true,

                opacity: 0.5,

                side: THREE.DoubleSide

            })

        );

        circleGlow.rotation.x =
        -Math.PI / 2;

        circleGlow.position.y =
        -0.45;

        scene.add(circleGlow);

        // =========================
        // PARTICLES
        // =========================

        const particleCount = 2000;

        const particleGeometry =
        new THREE.BufferGeometry();

        const particlePositions =
        new Float32Array(
            particleCount * 3
        );

        for (
            let i = 0;
            i < particleCount;
            i++
        ) {

            particlePositions[i*3] =
            (Math.random()-0.5)*16;

            particlePositions[i*3+1] =
            Math.random()*5;

            particlePositions[i*3+2] =
            (Math.random()-0.5)*14;

        }

        particleGeometry.setAttribute(

            'position',

            new THREE.BufferAttribute(
                particlePositions,
                3
            )

        );

        const particleMaterial =
        new THREE.PointsMaterial({

            color: config.color,

            size: 0.05,

            transparent: true,

            opacity: 0.55

        });

        const particles =
        new THREE.Points(
            particleGeometry,
            particleMaterial
        );

        scene.add(particles);

        // =========================
        // MODEL
        // =========================

        const loader =
        new GLTFLoader();

        let model = null;
        let mixer = null;

        loader.load(
            config.modelPath,

            (gltf) => {

                model =
                gltf.scene;

                model.position.set(
                    0,
                    config.modelPositionY,
                    0
                );

                model.scale.set(
                    config.modelScale,
                    config.modelScale,
                    config.modelScale
                );

                model.traverse((node) => {

                    if (node.isMesh) {
                        node.castShadow = true;
                    }

                });

                scene.add(model);

                if (
                    gltf.animations &&
                    gltf.animations.length > 0
                ) {

                    mixer =
                    new THREE.AnimationMixer(
                        model
                    );

                    gltf.animations
                    .forEach((clip) => {

                        mixer
                        .clipAction(clip)
                        .play();

                    });

                }

            }
        );

        // =========================
        // ANIMATION
        // =========================

        let time = 0;

        function animate() {

            requestAnimationFrame(
                animate
            );

            time += 0.007;

            if (mixer) {
                mixer.update(0.016);
            }

            particles.rotation.y =
            time * 0.06;

            particles.rotation.x =
            Math.sin(time * 0.12)
            * 0.08;

            fillLight.intensity =
            0.55 +
            Math.sin(time * 2.0)
            * 0.2;

            goldenLight.intensity =
            0.4 +
            Math.sin(time * 1.5)
            * 0.15;

            controls.update();

            renderer.render(
                scene,
                camera
            );

        }

        animate();

        // =========================
        // RESIZE
        // =========================

        window.addEventListener(
            'resize',
            () => {

                camera.aspect =
                window.innerWidth /
                window.innerHeight;

                camera.updateProjectionMatrix();

                renderer.setSize(
                    window.innerWidth,
                    window.innerHeight
                );

            }
        );

        // =========================
        // UI / CHAT / VOICE
        // =========================

        initUI(config);

        const chat =
        new ChatSystem(

            'chatContainer',

            config,

            (response) => {

                if (
                    voice?.isJarvisActive?.()
                ) {

                    voice.speak(
                        response
                    );

                }

            }

        );

        const voiceButtonElem =
        document.getElementById(
            'voiceButton'
        );

        let voice = null;

        if (voiceButtonElem) {

            voice =
            new VoiceAssistant(

                voiceButtonElem,

                (text) => {

                    document
                    .getElementById(
                        'chatInput'
                    ).value = text;

                    chat.send();

                },

                null,

                {

                    asuraName:
                    config.name,

                    continuous:
                    true

                }

            );

        }

        // =========================
        // WELCOME MESSAGES
        // =========================

        setTimeout(() => {

            chat.addMessage(
                config.welcomeMessage,
                false
            );

            setTimeout(() => {

                chat.addMessage(

                    "🎤 Clique na coruja para ativar o modo Jarvis.",

                    false

                );

            }, 1800);

            setTimeout(() => {

                chat.addMessage(

                    "🗺️ Use o portal dourado para acessar o Portal Planner.",

                    false

                );

            }, 3600);

        }, 500);

        // =========================
        // OVERLAY
        // =========================

        const portalOverlay =
        document.getElementById(
            'portalOverlay'
        );

        portalOverlay.style.setProperty(
            '--asura-color',
            config.color
        );

        setTimeout(() => {

            portalOverlay.style.opacity =
            '0.6';

            setTimeout(() => {

                portalOverlay.style.opacity =
                '0';

                setTimeout(() => {

                    portalOverlay.style.display =
                    'none';

                }, 800);

            }, 500);

        }, 50);

        console.log(
            '🟢 ATENA carregada com Reino Dourado + Portal Planner!'
        );

    </script>

</body>
</html>
