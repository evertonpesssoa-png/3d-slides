<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atena Realm</title>
<style>
body{
	margin:0;
	overflow:hidden;
	height:100vh;
	background:
		radial-gradient(circle,
		#ffd54f,
		#3a2a00,
		#000000);
}

.light{
	position:absolute;
	inset:0;
	background:
		linear-gradient(to bottom,
		rgba(255,255,255,0.1),
		transparent);
}

.title{
	position:absolute;
	top:50%;
	left:50%;
	transform:translate(-50%,-50%);
	font-size:6rem;
	color:#fff8d0;
	text-shadow:0 0 50px #ffd54f;
}
</style>
</head>
<body>
<div class="light"></div>
<h1 class="title">ATENA</h1>
</body>
</html>
