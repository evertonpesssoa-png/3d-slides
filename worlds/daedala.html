<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daedala Realm</title>
<style>
body{
	margin:0;
	overflow:hidden;
	height:100vh;
	background:
		radial-gradient(circle,
		#00ffd5,
		#001f1b,
		#000000);
}

.tech{
	position:absolute;
	inset:0;
	background-image:
		linear-gradient(rgba(0,255,213,0.08) 1px, transparent 1px),
		linear-gradient(90deg, rgba(0,255,213,0.08) 1px, transparent 1px);
	background-size:50px 50px;
}

.title{
	position:absolute;
	top:50%;
	left:50%;
	transform:translate(-50%,-50%);
	font-size:6rem;
	color:white;
	text-shadow:0 0 50px #00ffd5;
}
</style>
</head>
<body>
<div class="tech"></div>
<h1 class="title">DAEDALA</h1>
</body>
</html>
