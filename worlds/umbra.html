<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UMBRA • Dimensão Sombria</title>
    
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/top-icons.css">
    <link rel="stylesheet" href="../shared/css/chat.css">
    <link rel="stylesheet" href="../shared/css/profile-panel.css">
    <link rel="stylesheet" href="../shared/css/portal.css">
    
    <style>
        :root {
            --asura-color: #8b2fff;
            --asura-glow: rgba(139, 47, 255, 0.5);
            --asura-gradient: linear-gradient(135deg, #8b2fff, #aa55ff);
        }
        body { background: radial-gradient(circle at 30% 20%, #0a0515, #030108); }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="top-icons">
        <div class="top-icon" id="backButton" data-tooltip="Voltar ao Grimório">←</div>
        <div class="top-icon voice-icon" id="voiceButton" data-tooltip="Modo Jarvis (Voz)">🔍</div>
        <div class="top-icon" id="profileButton" data-tooltip="Perfil da Umbra">🕵️</div>
    </div>
    
    <div class="profile-panel" id="profilePanel"></div>
    
    <div class="chat-container" id="chatContainer">
        <div class="chat-header" id="chatHeader">
            <div class="chat-header-info">
                <div class="chat-avatar">🕵️</div>
                <div><h4>UMBRA • Detetive das Sombras</h4><div class="chat-status">🟢 online | investigação ativa</div></div>
            </div>
            <div class="chat-toggle" id="chatToggle">▼</div>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Digite sua mensagem...">
                <button id="sendChatBtn">➤</button>
            </div>
        </div>
    </div>
    
    <div class="portal-overlay" id="portalOverlay"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import { initWorld } from '../shared/js/asura-base.js';
        
        const config = {
            name: 'UMBRA',
            title: '✦ DIMENSÃO SOMBRIA • ESPIÃ DETETIVE ✦',
            color: '#8b2fff',
            icon: '🕵️',
            modelPath: '../models/umbra.glb',
            modelScale: 0.5,
            modelPositionY: -0.25,
            bgColor: 0x050510,
            cameraPosition: { x: 3.2, y: 2.2, z: 4.2 },
            welcomeMessage: '🌑 Bem-vindo à minha dimensão sombria. Sou Umbra, detetive das sombras. Nas entrelinhas, encontro respostas. Que mistério podemos desvendar juntos hoje?',
            skills: [
                { name: '🕵️ Investigação', value: 98 },
                { name: '👁️ Rastreamento', value: 97 },
                { name: '🌑 Furtividade', value: 99 },
                { name: '🔍 Análise de Evidências', value: 96 }
            ],
            personalityText: '🕵️ "Nas sombras encontro a verdade. Nada escapa ao meu olhar investigativo."<br>Umbra é espiã, detetive e rastreadora. Como Sherlock Holmes das sombras, desvenda qualquer mistério.',
            getResponse: (msg) => {
                const lower = msg.toLowerCase();
                if (lower.includes('olá') || lower.includes('oi')) return "🌑 Olá. Nas sombras, observo tudo. Sou Umbra, detetive das trevas. Que mistério traz hoje?";
                if (lower.includes('investigar') || lower.includes('detetive')) return "🕵️ Investigação é minha especialidade. Cada pista conta uma história. Vamos analisar os fatos juntos?";
                if (lower.includes('rastrear') || lower.includes('rastreamento')) return "👁️ Rastreamento é uma arte. Posso seguir qualquer rastro, digital ou físico. O que você precisa localizar?";
                if (lower.includes('mistério') || lower.includes('enigma')) return "🔍 Adoro um bom mistério. Reúna as evidências e vamos decifrar esse enigma passo a passo.";
                if (lower.includes('obrigado')) return "💜 Por nada. A verdade sempre vem à tona. Estou aqui para desvendar qualquer mistério.";
                return "🔎 Detecto padrões onde outros veem caos. Me descreva sua situação e aplicarei meu método investigativo para encontrar respostas.";
            }
        };
        
        initWorld(config);
    </script>
</body>
</html>
