<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UMBRA • Dimensão Sombria</title>
    
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/top-icons.css">
    <link rel="stylesheet" href="../shared/css/chat.css">
    <link rel="stylesheet" href="../shared/css/profile-panel.css">
    <link rel="stylesheet" href="../shared/css/portal.css">
    
    <style>
        :root {
            --asura-color: #8b2fff;
            --asura-glow: rgba(139, 47, 255, 0.6);
            --asura-gradient: linear-gradient(135deg, #8b2fff, #aa55ff);
        }
        body { background: radial-gradient(circle at 30% 20%, #0a0515, #030108); }
        
        /* =========================
           BOTÃO DO PORTAL - TOPO ESQUERDO
        ========================= */
        .portal-planner-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            color: #8b2fff;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 28px;
            z-index: 9999;
            border: 2px solid #8b2fff;
            box-shadow: 0 0 20px rgba(139, 47, 255, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
            font-family: monospace;
        }
        
        .portal-planner-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 35px rgba(139, 47, 255, 0.8);
            background: rgba(139, 47, 255, 0.2);
        }
        
        .portal-planner-btn::before {
            content: "🗺️ Portal Planner";
            position: absolute;
            top: 70px;
            left: 0;
            background: rgba(0,0,0,0.9);
            color: #8b2fff;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            font-family: 'Poppins', sans-serif;
            border: 1px solid #8b2fff;
        }
        
        .portal-planner-btn:hover::before {
            opacity: 1;
        }
        
        body.transition-out {
            opacity: 0;
            transform: scale(0.98);
            transition: all 0.4s ease;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <!-- BOTÃO DO PORTAL PLANNER -->
    <div class="portal-planner-btn" id="portalPlannerBtn" title="Abrir Portal Planner">
        🗺️
    </div>
    
    <div class="top-icons">
        <div class="top-icon" id="backButton" data-tooltip="Voltar ao Grimório">←</div>
        <div class="top-icon voice-icon" id="voiceButton" data-tooltip="Modo Jarvis (clique para ativar)">
            <span class="brain-icon">🕵️</span>
            <span class="mic-icon">🎤</span>
            <div class="mental-wave"></div>
            <div class="brain-waves left"><span></span><span></span><span></span><span></span><span></span></div>
            <div class="brain-waves right"><span></span><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="top-icon" id="profileButton" data-tooltip="Perfil da Umbra">🕵️</div>
    </div>
    
    <div class="profile-panel" id="profilePanel"></div>
    
    <div class="chat-container" id="chatContainer">
        <div class="chat-header" id="chatHeader">
            <div class="chat-header-info">
                <div class="chat-avatar">🕵️</div>
                <div><h4>UMBRA • Detetive das Sombras</h4><div class="chat-status">🟢 online | investigação ativa</div></div>
            </div>
            <div class="chat-toggle" id="chatToggle">▼</div>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Digite sua mensagem...">
                <button id="sendChatBtn">➤</button>
            </div>
        </div>
    </div>
    
    <div class="portal-overlay" id="portalOverlay"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { initUI } from '../shared/js/ui.js';
        import { ChatSystem } from '../shared/js/chat.js';
        import { VoiceAssistant } from '../shared/js/voice-assistant.js';
        
        const config = {
            name: 'UMBRA',
            title: '✦ DIMENSÃO SOMBRIA • ESPIÃ DETETIVE ✦',
            color: '#8b2fff',
            icon: '🕵️',
            modelPath: '../models/umbra.glb',
            modelScale: 0.1,
            modelPositionY: -0.25,
            bgColor: 0x050510,
            cameraPosition: { x: 3.2, y: 2.2, z: 4.2 },
            welcomeMessage: '🌑 Bem-vindo à minha dimensão sombria. Sou Umbra, detetive das sombras. Nas entrelinhas, encontro respostas.',
            skills: [
                { name: '🕵️ Investigação', value: 98 },
                { name: '👁️ Rastreamento', value: 97 },
                { name: '🌑 Furtividade', value: 99 },
                { name: '🔍 Análise de Evidências', value: 96 }
            ],
            personalityText: '🕵️ "Nas sombras encontro a verdade. Nada escapa ao meu olhar investigativo."',
            getResponse: (msg) => {
                const lower = msg.toLowerCase();
                if (lower.includes('olá') || lower.includes('oi')) return "🌑 Olá. Nas sombras, observo tudo. Que mistério traz hoje?";
                if (lower.includes('investigar')) return "🕵️ Investigação é minha especialidade. Cada pista conta uma história.";
                if (lower.includes('rastrear')) return "👁️ Rastreamento é uma arte. Posso seguir qualquer rastro.";
                if (lower.includes('obrigado')) return "💜 Por nada. A verdade sempre vem à tona.";
                return "🔎 Detecto padrões onde outros veem caos. Me descreva sua situação.";
            }
        };
        
        // =========================
        // BOTÃO PORTAL PLANNER
        // =========================
        const portalPlannerBtn = document.getElementById('portalPlannerBtn');
        
        function openPortalPlanner() {
            localStorage.setItem('lastAsura', 'umbra');
            document.body.classList.add('transition-out');
            const flashOverlay = document.createElement('div');
            flashOverlay.style.cssText = `
                position: fixed;
                inset: 0;
                background: radial-gradient(circle, #8b2fff, transparent);
                opacity: 0;
                transition: opacity 0.5s ease;
                z-index: 10000;
                pointer-events: none;
            `;
            document.body.appendChild(flashOverlay);
            requestAnimationFrame(() => {
                flashOverlay.style.opacity = '0.8';
                setTimeout(() => {
                    window.location.href = '../shared/portals/portal-system.html?asura=umbra';
                }, 400);
            });
        }
        
        if (portalPlannerBtn) {
            portalPlannerBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                openPortalPlanner();
            });
            console.log("✅ Botão do portal configurado para UMBRA!");
        }
        
        // =========================
        // SETUP 3D UMBRA
        // =========================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(config.bgColor);
        scene.fog = new THREE.FogExp2(config.bgColor, 0.015);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(config.cameraPosition.x, config.cameraPosition.y, config.cameraPosition.z);
        camera.lookAt(0, 0.8, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0.8, 0);
        
        // =========================
        // LUZES SOMBRIAS
        // =========================
        const ambientLight = new THREE.AmbientLight(0x111122, 0.35);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xaa88ff, 0.7);
        mainLight.position.set(2, 4, 1.5);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(config.color, 0.5);
        fillLight.position.set(1, 1.5, 2);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0xaa44ff, 0.35);
        backLight.position.set(-2, 1.2, -3);
        scene.add(backLight);
        const shadowLight = new THREE.PointLight(0x6633aa, 0.3);
        shadowLight.position.set(0.5, 0.8, 1);
        scene.add(shadowLight);
        
        // =========================
        // CHÃO SOMBRIO
        // =========================
        const gridHelper = new THREE.GridHelper(14, 24, config.color, 0x331166);
        gridHelper.position.y = -0.5;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.35;
        scene.add(gridHelper);
        
        const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(9, 9), new THREE.MeshStandardMaterial({ color: 0x0a0515, roughness: 0.6, metalness: 0.2, transparent: true, opacity: 0.6 }));
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.5;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        const circleGlow = new THREE.Mesh(new THREE.CircleGeometry(1.3, 32), new THREE.MeshStandardMaterial({ color: config.color, emissive: config.color, emissiveIntensity: 0.35, transparent: true, opacity: 0.45, side: THREE.DoubleSide }));
        circleGlow.rotation.x = -Math.PI / 2;
        circleGlow.position.y = -0.45;
        scene.add(circleGlow);
        
        // =========================
        // COLUNAS SOMBRIAS
        // =========================
        const pillarMaterial = new THREE.MeshStandardMaterial({ color: 0x331177, emissive: 0x5511aa, emissiveIntensity: 0.15, metalness: 0.5 });
        function createShadowPillar(x, z, height = 1.3) {
            const group = new THREE.Group();
            const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.17, height, 8), pillarMaterial);
            pillar.position.y = 0;
            group.add(pillar);
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.21, 0.025, 16, 32), new THREE.MeshStandardMaterial({ color: config.color, emissive: 0xaa55ff, emissiveIntensity: 0.25 }));
            ring.position.y = height / 2;
            ring.rotation.x = Math.PI / 2;
            group.add(ring);
            group.position.set(x, -0.4, z);
            return group;
        }
        const pillarPositions = [[-2.8,-2.5],[2.8,-2.5],[-2.8,2.5],[2.8,2.5],[-2,-3.2],[2,-3.2],[-3.2,-1.8],[3.2,-1.8],[-3.2,1.8],[3.2,1.8],[-2,3.2],[2,3.2]];
        pillarPositions.forEach(pos => { const pillar = createShadowPillar(pos[0], pos[1], 1.0 + Math.random() * 0.4); scene.add(pillar); });
        
        // =========================
        // PARTÍCULAS SOMBRIAS
        // =========================
        const particleCount = 2000;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 16;
            particlePositions[i*3+1] = Math.random() * 4.5;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 14;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleColors = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const type = Math.random();
            if (type < 0.5) { particleColors[i*3]=0.5+Math.random()*0.3; particleColors[i*3+1]=0.1+Math.random()*0.2; particleColors[i*3+2]=0.7+Math.random()*0.3; }
            else if (type < 0.75) { particleColors[i*3]=0.6+Math.random()*0.3; particleColors[i*3+1]=0.2+Math.random()*0.3; particleColors[i*3+2]=1.0; }
            else { particleColors[i*3]=0.1; particleColors[i*3+1]=0.05; particleColors[i*3+2]=0.2; }
        }
        particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
        const particleMaterial = new THREE.PointsMaterial({ size: 0.05, vertexColors: true, transparent: true, opacity: 0.45 });
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);
        
        // =========================
        // ANÉIS E OLHOS VIGILANTES
        // =========================
        const ringGeometry = new THREE.TorusGeometry(1.2, 0.035, 64, 200);
        const ringMaterial = new THREE.MeshStandardMaterial({ color: config.color, emissive: config.color, emissiveIntensity: 0.45 });
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        ring.position.y = 0.15;
        ring.rotation.x = Math.PI / 2;
        scene.add(ring);
        
        const ring2Geometry = new THREE.TorusGeometry(1.5, 0.03, 64, 200);
        const ring2Material = new THREE.MeshStandardMaterial({ color: 0xaa55ff, emissive: 0x7733cc, emissiveIntensity: 0.35 });
        const ring2 = new THREE.Mesh(ring2Geometry, ring2Material);
        ring2.position.y = 0.05;
        ring2.rotation.x = Math.PI / 2 + 0.3;
        scene.add(ring2);
        
        // Olhos vigilantes
        function createWatchfulEye(x, z, yOffset) {
            const group = new THREE.Group();
            const eyeBase = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), new THREE.MeshStandardMaterial({ color: 0xaa55ff, emissive: config.color, emissiveIntensity: 0.4 }));
            group.add(eyeBase);
            const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.2 }));
            pupil.position.z = 0.1;
            group.add(pupil);
            group.position.set(x, yOffset, z);
            return group;
        }
        const eyePositions = [[-1.2,1.3,1.8],[1.2,1.3,1.8],[-1.5,1.1,-1.6],[1.5,1.1,-1.6],[-2,1.4,0.8],[2,1.4,0.8],[0.8,1.2,-2.2],[-0.8,1.2,-2.2]];
        eyePositions.forEach(pos => { const eye = createWatchfulEye(pos[0], pos[2], pos[1]); scene.add(eye); });
        
        // Lupas flutuantes
        const glassMaterial = new THREE.MeshStandardMaterial({ color: 0xcc88ff, metalness: 0.7 });
        function createMagnifyingGlass(x, z, yOffset) {
            const group = new THREE.Group();
            const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.2, 6), glassMaterial);
            handle.position.y = -0.15;
            group.add(handle);
            const ringGlass = new THREE.Mesh(new THREE.TorusGeometry(0.12, 0.025, 16, 32), glassMaterial);
            ringGlass.position.y = 0;
            group.add(ringGlass);
            group.position.set(x, yOffset, z);
            return group;
        }
        const glassPositions = [[-1.8,0.6,1.2],[1.8,0.6,1.2],[-1.5,0.5,-1.8],[1.5,0.5,-1.8],[0,0.7,2.2],[0,0.7,-2.2]];
        glassPositions.forEach(pos => { const glass = createMagnifyingGlass(pos[0], pos[2], pos[1]); scene.add(glass); });
        
        // =========================
        // MODELO 3D
        // =========================
        const loader = new GLTFLoader();
        let model = null;
        let mixer = null;
        
        loader.load(config.modelPath, (gltf) => {
            model = gltf.scene;
            model.position.set(0, config.modelPositionY, 0);
            model.scale.set(config.modelScale, config.modelScale, config.modelScale);
            model.traverse((node) => { if (node.isMesh) { node.castShadow = true; } });
            scene.add(model);
            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(model);
                gltf.animations.forEach(clip => mixer.clipAction(clip).play());
            }
        });
        
        // =========================
        // ANIMAÇÃO
        // =========================
        let time = 0;
        let deltaTime = 0.016;
        let lastTime = performance.now();
        
        function updateDelta() {
            const now = performance.now();
            deltaTime = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            requestAnimationFrame(updateDelta);
        }
        updateDelta();
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.008;
            if (mixer) mixer.update(deltaTime);
            particles.rotation.y = time * 0.04;
            particles.rotation.x = Math.sin(time * 0.1) * 0.05;
            ring.rotation.z = time * 0.28;
            ring2.rotation.z = -time * 0.22;
            fillLight.intensity = 0.4 + Math.sin(time * 2.2) * 0.15;
            circleGlow.material.emissiveIntensity = 0.2 + Math.sin(time * 1.8) * 0.12;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // =========================
        // UI, CHAT E VOZ
        // =========================
        initUI(config);
        const chat = new ChatSystem('chatContainer', config, (response) => { if (voice?.isJarvisActive?.()) voice.speak(response); });
        const voiceButtonElem = document.getElementById('voiceButton');
        let voice = null;
        if (voiceButtonElem) {
            voice = new VoiceAssistant(voiceButtonElem, (text) => { document.getElementById('chatInput').value = text; chat.send(); }, null, { asuraName: config.name, continuous: true });
        }
        
        setTimeout(() => {
            chat.addMessage(config.welcomeMessage, false);
            setTimeout(() => chat.addMessage("🎤 Dica: Clique no ícone 🕵️ no topo para ativar o MODO JARVIS. Vou ficar sempre ouvindo!", false), 2000);
            setTimeout(() => chat.addMessage("🗺️ Dica: Clique no botão do mapa 🗺️ no TOPO ESQUERDO para acessar o PORTAL PLANNER!", false), 4000);
        }, 500);
        
        const portalOverlay = document.getElementById('portalOverlay');
        portalOverlay.style.setProperty('--asura-color', config.color);
        setTimeout(() => { portalOverlay.style.opacity = '0.6'; setTimeout(() => { portalOverlay.style.opacity = '0'; setTimeout(() => { portalOverlay.style.display = 'none'; }, 800); }, 500); }, 50);
        
        console.log('🟢 UMBRA carregada com PORTAL PLANNER, olhos vigilantes, lupas e Modo Jarvis!');
    </script>
</body>
</html>
