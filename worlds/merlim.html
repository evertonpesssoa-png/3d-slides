<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MERLIM • Reino Tecnológico Azul</title>
    
    <!-- FONTES EXCLUSIVAS -->
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/top-icons.css">
    <link rel="stylesheet" href="../shared/css/chat.css">
    <link rel="stylesheet" href="../shared/css/profile-panel.css">
    <link rel="stylesheet" href="../shared/css/portal.css">
    
    <style>
        :root {
            --asura-color: #00d9ff;
            --asura-glow: rgba(0, 217, 255, 0.6);
            --asura-gradient: linear-gradient(135deg, #00d9ff, #00aaff);
        }
        body { background: radial-gradient(circle at 30% 20%, #050a18, #030108); }
        
        /* =========================
           BOTÃO DO PORTAL
        ========================= */
        .portal-planner-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            color: #00d9ff;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            z-index: 9999;
            border: 2px solid #00d9ff;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
            font-family: monospace;
        }
        
        .portal-planner-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 35px rgba(0, 217, 255, 0.8);
            background: rgba(0, 217, 255, 0.2);
        }
        
        .portal-planner-btn::before {
            content: "🗺️ Portal Planner";
            position: absolute;
            top: 70px;
            left: 0;
            background: rgba(0,0,0,0.9);
            color: #00d9ff;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            font-family: 'Poppins', sans-serif;
            border: 1px solid #00d9ff;
        }
        
        .portal-planner-btn:hover::before { opacity: 1; }
        
        body.transition-out {
            opacity: 0;
            transform: scale(0.98);
            transition: all 0.4s ease;
        }
        
        /* =========================
           CHAT - ESTILO TECNOLÓGICO (FONTE MONOSPACE)
        ========================= */
        .chat-container {
            position: fixed;
            bottom: 0;
            right: 20px;
            width: 340px;
            max-width: calc(100% - 40px);
            background: rgba(5, 10, 24, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 16px 16px 0 0;
            border-top: 2px solid #00d9ff;
            border-left: 1px solid rgba(0,217,255,0.3);
            border-right: 1px solid rgba(0,217,255,0.3);
            box-shadow: 0 -5px 30px rgba(0,0,0,0.5), 0 0 15px rgba(0,217,255,0.2);
            z-index: 9998;
            font-family: 'Courier Prime', 'Courier New', monospace;
            transition: transform 0.3s ease;
        }
        
        .chat-container.open { transform: translateY(0); }
        .chat-container { transform: translateY(calc(100% - 48px)); }
        
        .chat-header {
            background: rgba(0, 0, 0, 0.9);
            padding: 12px 15px;
            border-radius: 16px 16px 0 0;
            cursor: pointer;
            border-bottom: 1px solid #00d9ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chat-avatar { font-size: 24px; filter: drop-shadow(0 0 3px #00d9ff); }
        .chat-header-info h4 {
            font-size: 14px;
            margin: 0;
            color: #00d9ff;
            text-shadow: 0 0 5px rgba(0,217,255,0.5);
            font-family: 'Courier Prime', monospace;
            letter-spacing: 1px;
        }
        .chat-status { font-size: 10px; color: #0f0; }
        .chat-toggle { color: #00d9ff; font-size: 18px; }
        
        .chat-body {
            display: flex;
            flex-direction: column;
            height: 380px;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
        }
        
        .user-message {
            align-self: flex-end;
            background: rgba(0, 217, 255, 0.12);
            border: 1px solid #00d9ff;
            border-radius: 15px 15px 5px 15px;
            padding: 8px 12px;
            max-width: 85%;
            color: #cceeff;
            font-size: 13px;
            box-shadow: 0 0 8px rgba(0,217,255,0.3);
            font-family: 'Courier Prime', monospace;
        }
        
        .asura-message {
            align-self: flex-start;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #00d9ff;
            border-radius: 15px 15px 15px 5px;
            padding: 8px 12px;
            max-width: 85%;
            color: #b8f0ff;
            font-size: 13px;
            box-shadow: 0 0 8px rgba(0,217,255,0.3);
            font-family: 'Courier Prime', monospace;
        }
        
        .asura-message .asura-name {
            color: #00d9ff;
            font-size: 10px;
            margin-bottom: 5px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        
        .chat-image {
            max-width: 200px;
            max-height: 150px;
            border-radius: 10px;
            margin-top: 5px;
            border: 1px solid #00d9ff;
            cursor: pointer;
        }
        
        .chat-input-area {
            display: flex;
            gap: 8px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.85);
            border-top: 1px solid rgba(0,217,255,0.2);
            align-items: center;
            flex-wrap: wrap;
        }
        
        .chat-input-area input[type="text"] {
            flex: 1;
            background: rgba(10, 20, 40, 0.9);
            border: 1px solid #00d9ff;
            border-radius: 25px;
            padding: 10px 15px;
            color: #00d9ff;
            font-family: 'Courier Prime', monospace;
            font-size: 12px;
            outline: none;
        }
        
        .chat-input-area input[type="text"]:focus { box-shadow: 0 0 10px rgba(0,217,255,0.5); }
        
        .chat-input-area button, .attach-btn {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #00d9ff;
            color: #00d9ff;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-input-area button:hover, .attach-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(0,217,255,0.5);
            background: rgba(0,217,255,0.2);
        }
        
        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-track { background: #0a0a1a; }
        .chat-messages::-webkit-scrollbar-thumb { background: #00d9ff; border-radius: 5px; }
        
        @media (max-width: 600px) {
            .chat-container { width: calc(100% - 20px); right: 10px; }
            .chat-messages { height: 280px; }
            .chat-image { max-width: 150px; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="portal-planner-btn" id="portalPlannerBtn">🗺️</div>
    
    <div class="top-icons">
        <div class="top-icon" id="backButton" data-tooltip="Voltar ao Grimório">←</div>
        <div class="top-icon voice-icon" id="voiceButton">
            <span class="brain-icon">💻</span>
            <span class="mic-icon">🎤</span>
            <div class="mental-wave"></div>
            <div class="brain-waves left"><span></span><span></span><span></span><span></span><span></span></div>
            <div class="brain-waves right"><span></span><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="top-icon" id="profileButton" data-tooltip="Perfil do Merlim">🔧</div>
    </div>
    
    <div class="profile-panel" id="profilePanel"></div>
    
    <div class="chat-container" id="chatContainer">
        <div class="chat-header" id="chatHeader">
            <div class="chat-header-info">
                <div class="chat-avatar">🔧</div>
                <div><h4>MERLIM • Arquiteta Mágica</h4><div class="chat-status">🟢 online | engenharia arcana</div></div>
            </div>
            <div class="chat-toggle" id="chatToggle">▼</div>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Digite sua mensagem...">
                <button id="sendChatBtn">➤</button>
            </div>
        </div>
    </div>
    
    <div class="portal-overlay" id="portalOverlay"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { initUI } from '../shared/js/ui.js';
        import { VoiceAssistant } from '../shared/js/voice-assistant.js';
        
        // =========================
        // CHAT SYSTEM MELHORADO
        // =========================
        class ChatSystem {
            constructor(containerId, config, onSpeak) {
                this.container = document.getElementById(containerId);
                this.config = config;
                this.onSpeak = onSpeak;
                this.messagesContainer = document.getElementById('chatMessages');
                this.input = document.getElementById('chatInput');
                this.sendBtn = document.getElementById('sendChatBtn');
                this.init();
                this.setupEventListeners();
                this.loadMessages();
            }
            
            init() {
                const inputArea = this.container.querySelector('.chat-input-area');
                if (inputArea && !inputArea.querySelector('.attach-btn')) {
                    const attachBtn = document.createElement('button');
                    attachBtn.className = 'attach-btn';
                    attachBtn.innerHTML = '📎';
                    attachBtn.title = 'Enviar imagem';
                    const fileInput = document.createElement('input');
                    fileInput.type = 'file';
                    fileInput.accept = 'image/*';
                    fileInput.style.display = 'none';
                    attachBtn.onclick = () => fileInput.click();
                    fileInput.onchange = (e) => {
                        const file = e.target.files[0];
                        if (file && file.type.startsWith('image/')) {
                            const reader = new FileReader();
                            reader.onload = (ev) => this.addImageMessage(ev.target.result, file.name);
                            reader.readAsDataURL(file);
                        }
                        fileInput.value = '';
                    };
                    const textInput = inputArea.querySelector('input[type="text"]');
                    if (textInput) {
                        inputArea.insertBefore(attachBtn, textInput);
                        inputArea.insertBefore(fileInput, textInput);
                    }
                }
            }
            
            getMessages() {
                const stored = localStorage.getItem(`chat_messages_${this.config.name}`);
                return stored ? JSON.parse(stored) : [];
            }
            
            saveMessages(messages) {
                localStorage.setItem(`chat_messages_${this.config.name}`, JSON.stringify(messages));
            }
            
            addMessage(text, isUser = true, image = null) {
                const messages = this.getMessages();
                messages.push({ text, image, isUser, timestamp: Date.now() });
                if (messages.length > 100) messages.shift();
                this.saveMessages(messages);
                this.renderMessages();
            }
            
            addImageMessage(imageUrl, fileName) {
                this.addMessage(`📷 ${fileName || 'Imagem'}`, true, imageUrl);
            }
            
            renderMessages() {
                if (!this.messagesContainer) return;
                const messages = this.getMessages();
                if (messages.length === 0) return;
                this.messagesContainer.innerHTML = '';
                messages.forEach(msg => {
                    const messageDiv = document.createElement('div');
                    messageDiv.className = msg.isUser ? 'user-message' : 'asura-message';
                    if (!msg.isUser) {
                        const nameSpan = document.createElement('div');
                        nameSpan.className = 'asura-name';
                        nameSpan.textContent = `✦ ${this.config.name} ✦`;
                        messageDiv.appendChild(nameSpan);
                    }
                    if (msg.image) {
                        const img = document.createElement('img');
                        img.src = msg.image;
                        img.className = 'chat-image';
                        img.onclick = () => window.open(msg.image);
                        messageDiv.appendChild(img);
                    }
                    if (msg.text) {
                        const textSpan = document.createElement('span');
                        textSpan.textContent = msg.text;
                        messageDiv.appendChild(textSpan);
                    }
                    this.messagesContainer.appendChild(messageDiv);
                });
                this.scrollToBottom();
            }
            
            send() {
                const text = this.input.value.trim();
                if (!text) return;
                this.addMessage(text, true);
                this.input.value = '';
                setTimeout(() => {
                    const response = this.config.getResponse(text);
                    this.addMessage(response, false);
                    if (this.onSpeak) this.onSpeak(response);
                }, 500);
            }
            
            setupEventListeners() {
                if (this.sendBtn) this.sendBtn.addEventListener('click', () => this.send());
                if (this.input) this.input.addEventListener('keypress', (e) => { if (e.key === 'Enter') this.send(); });
            }
            
            loadMessages() { this.renderMessages(); }
            scrollToBottom() { if (this.messagesContainer) this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight; }
        }
        
        // =========================
        // CONFIG MERLIM
        // =========================
        const config = {
            name: 'MERLIM',
            title: '✦ REINO TECNOLÓGICO • ENGENHEIRA MÁGICA ✦',
            color: '#00d9ff',
            icon: '🔧',
            modelPath: '../models/merlim.glb',
            modelScale: 0.5,
            modelPositionY: -0.25,
            bgColor: 0x050a18,
            cameraPosition: { x: 3.2, y: 2.2, z: 4.2 },
            welcomeMessage: '✨ Bem-vindo ao meu reino tecnológico. Sou Merlim, a engenheira mágica. Código, sistemas e arquitetura são meus encantamentos.',
            getResponse: (msg) => {
                const lower = msg.toLowerCase();
                if (lower.includes('olá') || lower.includes('oi')) return "✨ Olá! Sou Merlim, a engenheira mágica. Código é minha poesia. Como posso te ajudar a construir algo incrível?";
                if (lower.includes('código') || lower.includes('programação')) return "🔧 Código é magia pura! Posso ajudar com arquitetura de sistemas, debug, otimização. Qual linguagem você está usando?";
                if (lower.includes('arquitetura') || lower.includes('sistema')) return "🏗️ Arquitetura de sistemas é minha especialidade. Projetos robustos e escaláveis são minha paixão.";
                if (lower.includes('bug') || lower.includes('erro')) return "🐛 Um bug? Deixe-me analisar... Como engenheira mágica, resolvo problemas com eficiência.";
                if (lower.includes('imagem') || lower.includes('foto')) return "🖼️ Imagem recebida! Analisando pixels... Tudo está em ordem no sistema.";
                if (lower.includes('obrigado')) return "💙 Por nada! Foi um prazer mágico te ajudar. Estou sempre aqui.";
                return "🔮 Como arquiteta deste reino tecnológico, vejo padrões e soluções. Me conte seu desafio.";
            }
        };
        
        // =========================
        // PORTAL E VOLTAR
        // =========================
        const portalBtn = document.getElementById('portalPlannerBtn');
        function openPortalPlanner() {
            localStorage.setItem('lastAsura', 'merlim');
            document.body.classList.add('transition-out');
            const flash = document.createElement('div');
            flash.style.cssText = `position:fixed;inset:0;background:radial-gradient(circle,#00d9ff,transparent);opacity:0;transition:.5s;z-index:10000;`;
            document.body.appendChild(flash);
            requestAnimationFrame(() => {
                flash.style.opacity = '0.8';
                setTimeout(() => window.location.href = '../shared/portals/portal-system.html?asura=merlim', 400);
            });
        }
        if (portalBtn) portalBtn.addEventListener('click', openPortalPlanner);
        
        function voltarAoGrimorio() {
            document.body.classList.add('transition-out');
            const flash = document.createElement('div');
            flash.style.cssText = `position:fixed;inset:0;background:radial-gradient(circle,${config.color},transparent);opacity:0;transition:.4s;z-index:100000;`;
            document.body.appendChild(flash);
            requestAnimationFrame(() => {
                flash.style.opacity = '0.8';
                setTimeout(() => window.location.href = '../index.html', 350);
            });
        }
        window.addEventListener('popstate', (e) => { e.preventDefault(); history.pushState(null, null, location.href); voltarAoGrimorio(); });
        history.pushState(null, null, location.href);
        
        // =========================
        // SETUP 3D RESUMIDO
        // =========================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(config.bgColor);
        scene.fog = new THREE.FogExp2(config.bgColor, 0.01);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(config.cameraPosition.x, config.cameraPosition.y, config.cameraPosition.z);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.8, 0);
        
        // Luzes
        scene.add(new THREE.AmbientLight(0x112244, 0.6));
        const mainLight = new THREE.DirectionalLight(0xaaddff, 1.1);
        mainLight.position.set(3, 5, 2);
        scene.add(mainLight);
        scene.add(new THREE.PointLight(config.color, 0.8).position.set(1, 2, 2));
        
        // Chão
        const grid = new THREE.GridHelper(14, 24, config.color, 0x2266aa);
        grid.position.y = -0.5;
        scene.add(grid);
        
        // Partículas
        const particleCount = 1800;
        const particleGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 15;
            positions[i*3+1] = Math.random() * 5;
            positions[i*3+2] = (Math.random() - 0.5) * 13;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particles = new THREE.Points(particleGeo, new THREE.PointsMaterial({ color: 0x66eeff, size: 0.045, transparent: true, opacity: 0.55 }));
        scene.add(particles);
        
        // Modelo
        const loader = new GLTFLoader();
        loader.load(config.modelPath, (gltf) => {
            const model = gltf.scene;
            model.position.set(0, config.modelPositionY, 0);
            model.scale.set(config.modelScale, config.modelScale, config.modelScale);
            scene.add(model);
        });
        
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.008;
            particles.rotation.y = time * 0.06;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // =========================
        // UI, CHAT E VOZ
        // =========================
        initUI(config);
        
        const chatContainer = document.getElementById('chatContainer');
        if (chatContainer) chatContainer.classList.remove('open');
        
        const chat = new ChatSystem('chatContainer', config, (response) => { if (voice?.isJarvisActive?.()) voice.speak(response); });
        
        const voiceBtn = document.getElementById('voiceButton');
        let voice = null;
        if (voiceBtn) {
            voice = new VoiceAssistant(voiceBtn, (text) => {
                document.getElementById('chatInput').value = text;
                chat.send();
            }, null, { asuraName: config.name, continuous: true });
        }
        
        const chatToggle = document.getElementById('chatToggle');
        if (chatToggle) {
            chatToggle.addEventListener('click', () => chatContainer.classList.toggle('open'));
        }
        
        setTimeout(() => {
            chat.addMessage(config.welcomeMessage, false);
            setTimeout(() => chat.addMessage("🎤 Dica: Clique no ícone 💻 para ativar o MODO JARVIS.", false), 2000);
            setTimeout(() => chat.addMessage("📎 Dica: Clique no 📎 para enviar imagens do seu dispositivo!", false), 4000);
            setTimeout(() => chat.addMessage("🗺️ Dica: Clique no 🗺️ no topo esquerdo para acessar o PORTAL PLANNER!", false), 6000);
        }, 500);
        
        const portalOverlay = document.getElementById('portalOverlay');
        portalOverlay.style.setProperty('--asura-color', config.color);
        setTimeout(() => { portalOverlay.style.opacity = '0.6'; setTimeout(() => { portalOverlay.style.opacity = '0'; setTimeout(() => { portalOverlay.style.display = 'none'; }, 800); }, 500); }, 50);
        
        console.log('🟢 MERLIM carregada com CHAT TECNOLÓGICO e ENVIO DE IMAGENS!');
    </script>
</body>
</html>
