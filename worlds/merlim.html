<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merlim Realm</title>
<style>
body{
	margin:0;
	overflow:hidden;
	height:100vh;
	background:
		radial-gradient(circle,
		#00d9ff,
		#001c29,
		#000000);
}

.grid{
	position:absolute;
	inset:0;
	background-image:
		linear-gradient(rgba(0,217,255,0.08) 1px, transparent 1px),
		linear-gradient(90deg, rgba(0,217,255,0.08) 1px, transparent 1px);
	background-size:40px 40px;
	transform:perspective(800px) rotateX(75deg);
}

.title{
	position:absolute;
	top:50%;
	left:50%;
	transform:translate(-50%,-50%);
	font-size:6rem;
	color:white;
	text-shadow:0 0 40px #00d9ff;
}
</style>
</head>
<body>
<div class="grid"></div>
<h1 class="title">MERLIM</h1>
</body>
</html>
