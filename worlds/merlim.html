<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MERLIM • Reino Tecnológico Azul</title>
    
    <!-- FONTE EXCLUSIVA PARA MERLIM - ESTILO TECNOLÓGICO -->
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../shared/css/base.css">
    <link rel="stylesheet" href="../shared/css/top-icons.css">
    <link rel="stylesheet" href="../shared/css/chat.css">
    <link rel="stylesheet" href="../shared/css/profile-panel.css">
    <link rel="stylesheet" href="../shared/css/portal.css">
    
    <style>
        :root {
            --asura-color: #00d9ff;
            --asura-glow: rgba(0, 217, 255, 0.6);
            --asura-gradient: linear-gradient(135deg, #00d9ff, #00aaff);
        }
        body { background: radial-gradient(circle at 30% 20%, #050a18, #030108); }
        
        /* =========================
           BOTÃO DO PORTAL - TOPO ESQUERDO
        ========================= */
        .portal-planner-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            color: #00d9ff;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 28px;
            z-index: 9999;
            border: 2px solid #00d9ff;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
            font-family: monospace;
        }
        
        .portal-planner-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 35px rgba(0, 217, 255, 0.8);
            background: rgba(0, 217, 255, 0.2);
        }
        
        .portal-planner-btn::before {
            content: "🗺️ Portal Planner";
            position: absolute;
            top: 70px;
            left: 0;
            background: rgba(0,0,0,0.9);
            color: #00d9ff;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 20px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            font-family: 'Poppins', sans-serif;
            border: 1px solid #00d9ff;
        }
        
        .portal-planner-btn:hover::before { opacity: 1; }
        
        body.transition-out {
            opacity: 0;
            transform: scale(0.98);
            transition: all 0.4s ease;
        }
        
        /* =========================
           CHAT MELHORADO - ESTILO TECNOLÓGICO
        ========================= */
        .chat-container {
            position: fixed !important;
            bottom: 20px !important;
            right: 20px !important;
            width: 340px !important;
            max-width: calc(100% - 40px) !important;
            background: rgba(5, 10, 24, 0.95) !important;
            backdrop-filter: blur(12px) !important;
            border-radius: 16px !important;
            border: 1px solid rgba(0,217,255,0.3) !important;
            box-shadow: 0 5px 30px rgba(0,0,0,0.5), 0 0 15px rgba(0,217,255,0.2) !important;
            z-index: 9998 !important;
            overflow: hidden !important;
        }
        
        .chat-header {
            background: rgba(0, 0, 0, 0.9) !important;
            padding: 12px 15px !important;
            cursor: pointer !important;
            border-bottom: 1px solid #00d9ff !important;
            display: flex !important;
            justify-content: space-between !important;
            align-items: center !important;
        }
        
        .chat-header-info {
            display: flex !important;
            align-items: center !important;
            gap: 10px !important;
        }
        
        .chat-avatar { font-size: 24px !important; }
        .chat-header-info h4 {
            font-size: 14px !important;
            margin: 0 !important;
            color: #00d9ff !important;
            font-family: 'Courier Prime', monospace !important;
            letter-spacing: 1px !important;
        }
        .chat-status { font-size: 10px !important; color: #0f0 !important; }
        .chat-toggle { color: #00d9ff !important; font-size: 18px !important; }
        
        .chat-body {
            display: flex !important;
            flex-direction: column !important;
            height: 380px !important;
        }
        
        .chat-body.collapsed {
            display: none !important;
        }
        
        .chat-messages {
            flex: 1 !important;
            overflow-y: auto !important;
            padding: 12px !important;
            display: flex !important;
            flex-direction: column !important;
            gap: 10px !important;
            background: rgba(0, 0, 0, 0.5) !important;
        }
        
        .message {
            display: flex !important;
            gap: 10px !important;
            max-width: 90% !important;
        }
        
        .message.user {
            align-self: flex-end !important;
            flex-direction: row-reverse !important;
        }
        
        .message-avatar {
            width: 32px !important;
            height: 32px !important;
            border-radius: 50% !important;
            background: rgba(0,217,255,0.2) !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            font-size: 16px !important;
        }
        
        .message-content {
            background: rgba(0, 217, 255, 0.12) !important;
            border: 1px solid #00d9ff !important;
            border-radius: 15px !important;
            padding: 8px 12px !important;
            color: #cceeff !important;
            font-size: 13px !important;
            font-family: 'Courier Prime', monospace !important;
            position: relative !important;
            word-break: break-word !important;
        }
        
        .message.user .message-content {
            background: rgba(0, 217, 255, 0.2) !important;
        }
        
        .message-time {
            font-size: 9px !important;
            color: rgba(255,255,255,0.5) !important;
            margin-top: 4px !important;
            text-align: right !important;
        }
        
        /* Arquivos enviados (PDF, DOC, etc) */
        .chat-file {
            display: flex !important;
            align-items: center !important;
            gap: 8px !important;
            background: rgba(0,217,255,0.1) !important;
            border: 1px solid #00d9ff !important;
            border-radius: 10px !important;
            padding: 8px 12px !important;
            margin-top: 5px !important;
            cursor: pointer !important;
            transition: all 0.2s !important;
        }
        
        .chat-file:hover {
            background: rgba(0,217,255,0.25) !important;
            transform: scale(1.01) !important;
        }
        
        .file-icon {
            font-size: 24px !important;
        }
        
        .file-info {
            flex: 1 !important;
            overflow: hidden !important;
        }
        
        .file-name {
            font-size: 11px !important;
            color: #00d9ff !important;
            white-space: nowrap !important;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
        }
        
        .file-size {
            font-size: 9px !important;
            color: #888 !important;
        }
        
        .file-badge {
            background: rgba(0,217,255,0.2) !important;
            border-radius: 4px !important;
            padding: 2px 6px !important;
            font-size: 9px !important;
            color: #00d9ff !important;
        }
        
        /* Imagens enviadas */
        .chat-image {
            max-width: 180px !important;
            max-height: 150px !important;
            border-radius: 10px !important;
            margin-top: 5px !important;
            border: 1px solid #00d9ff !important;
            cursor: pointer !important;
        }
        
        .chat-input-area {
            display: flex !important;
            gap: 8px !important;
            padding: 10px !important;
            background: rgba(0, 0, 0, 0.85) !important;
            border-top: 1px solid rgba(0,217,255,0.2) !important;
            align-items: center !important;
        }
        
        .chat-input-area input[type="text"] {
            flex: 1 !important;
            background: rgba(10, 20, 40, 0.9) !important;
            border: 1px solid #00d9ff !important;
            border-radius: 25px !important;
            padding: 10px 15px !important;
            color: #00d9ff !important;
            font-family: 'Courier Prime', monospace !important;
            font-size: 12px !important;
            outline: none !important;
        }
        
        .chat-input-area input[type="text"]:focus {
            box-shadow: 0 0 10px rgba(0,217,255,0.5) !important;
        }
        
        .chat-input-area button {
            background: rgba(0, 0, 0, 0.8) !important;
            border: 1px solid #00d9ff !important;
            color: #00d9ff !important;
            width: 38px !important;
            height: 38px !important;
            border-radius: 50% !important;
            cursor: pointer !important;
            font-size: 16px !important;
            transition: all 0.2s !important;
        }
        
        .chat-input-area button:hover {
            transform: scale(1.05) !important;
            box-shadow: 0 0 10px rgba(0,217,255,0.5) !important;
            background: rgba(0,217,255,0.2) !important;
        }
        
        .attach-btn {
            background: rgba(0, 0, 0, 0.8) !important;
            border: 1px solid #00d9ff !important;
            color: #00d9ff !important;
            width: 38px !important;
            height: 38px !important;
            border-radius: 50% !important;
            cursor: pointer !important;
            font-size: 16px !important;
            transition: all 0.2s !important;
        }
        
        .attach-btn:hover {
            transform: scale(1.05) !important;
            box-shadow: 0 0 10px rgba(0,217,255,0.5) !important;
            background: rgba(0,217,255,0.2) !important;
        }
        
        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-track { background: #0a0a1a; }
        .chat-messages::-webkit-scrollbar-thumb { background: #00d9ff; border-radius: 5px; }
        
        @media (max-width: 600px) {
            .chat-container { width: calc(100% - 20px) !important; right: 10px !important; bottom: 10px !important; }
            .chat-messages { height: 280px !important; }
            .chat-image { max-width: 130px !important; }
            .chat-file { padding: 6px 10px !important; }
            .file-icon { font-size: 20px !important; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="portal-planner-btn" id="portalPlannerBtn" title="Abrir Portal Planner">🗺️</div>
    
    <div class="top-icons">
        <div class="top-icon" id="backButton" data-tooltip="Voltar ao Grimório">←</div>
        <div class="top-icon voice-icon" id="voiceButton" data-tooltip="Modo Jarvis (clique para ativar)">
            <span class="brain-icon">💻</span>
            <span class="mic-icon">🎤</span>
            <div class="mental-wave"></div>
            <div class="brain-waves left"><span></span><span></span><span></span><span></span><span></span></div>
            <div class="brain-waves right"><span></span><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="top-icon" id="profileButton" data-tooltip="Perfil do Merlim">🔧</div>
    </div>
    
    <div class="profile-panel" id="profilePanel"></div>
    
    <div class="chat-container" id="chatContainer">
        <div class="chat-header" id="chatHeader">
            <div class="chat-header-info">
                <div class="chat-avatar">🔧</div>
                <div><h4>MERLIM • Arquiteta Mágica</h4><div class="chat-status">🟢 online | engenharia arcana</div></div>
            </div>
            <div class="chat-toggle" id="chatToggle">▼</div>
        </div>
        <div class="chat-body" id="chatBody">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" placeholder="Digite sua mensagem...">
                <button id="sendChatBtn">➤</button>
            </div>
        </div>
    </div>
    
    <div class="portal-overlay" id="portalOverlay"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { initUI } from '../shared/js/ui.js';
        import { ChatSystem } from '../shared/js/chat.js';
        import { VoiceAssistant } from '../shared/js/voice-assistant.js';
        
        // =========================
        // EXTENDE O CHAT SYSTEM ORIGINAL PARA ADICIONAR ANEXO DE QUALQUER ARQUIVO
        // =========================
        const OriginalChatSystem = ChatSystem;
        
        class EnhancedChatSystem extends OriginalChatSystem {
            constructor(containerId, config, onSpeak) {
                super(containerId, config, onSpeak);
                this.addAttachButton();
                
                setTimeout(() => {
                    if (this.chatBody) {
                        this.chatBody.classList.add('collapsed');
                    }
                    if (this.chatToggle) {
                        this.chatToggle.textContent = '▲';
                    }
                }, 100);
            }
            
            addAttachButton() {
                const inputArea = this.container.querySelector('.chat-input-area');
                if (!inputArea || inputArea.querySelector('.attach-btn')) return;
                
                const attachBtn = document.createElement('button');
                attachBtn.className = 'attach-btn';
                attachBtn.innerHTML = '📎';
                attachBtn.title = 'Enviar arquivo (imagem, PDF, DOC, etc)';
                
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = '*/*'; // ACEITA QUALQUER TIPO DE ARQUIVO
                fileInput.style.display = 'none';
                fileInput.multiple = false;
                
                attachBtn.onclick = () => fileInput.click();
                fileInput.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        this.handleFileUpload(file);
                    }
                    fileInput.value = '';
                };
                
                const textInput = inputArea.querySelector('input[type="text"]');
                if (textInput) {
                    inputArea.insertBefore(attachBtn, textInput);
                    inputArea.insertBefore(fileInput, textInput);
                }
            }
            
            handleFileUpload(file) {
                const fileType = file.type;
                const fileName = file.name;
                const fileSize = this.formatFileSize(file.size);
                const fileExtension = fileName.split('.').pop().toUpperCase();
                
                // Para imagens, mostra pré-visualização
                if (fileType.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        this.addImageMessage(ev.target.result, fileName, fileSize);
                    };
                    reader.readAsDataURL(file);
                } else {
                    // Para outros arquivos (PDF, DOC, TXT, etc), mostra como link para download
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        this.addFileMessage(ev.target.result, fileName, fileSize, fileExtension);
                    };
                    reader.readAsDataURL(file);
                }
            }
            
            formatFileSize(bytes) {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }
            
            getFileIcon(extension) {
                const icons = {
                    'PDF': '📄', 'DOC': '📃', 'DOCX': '📃',
                    'XLS': '📊', 'XLSX': '📊', 'PPT': '📽️', 'PPTX': '📽️',
                    'TXT': '📝', 'ZIP': '🗜️', 'RAR': '🗜️',
                    'MP3': '🎵', 'MP4': '🎬', 'JPG': '🖼️', 'PNG': '🖼️',
                    'GIF': '🎞️', 'JSON': '🔧', 'XML': '🔧', 'HTML': '🌐'
                };
                return icons[extension] || '📎';
            }
            
            addImageMessage(imageUrl, fileName, fileSize) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message user';
                const time = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                
                messageDiv.innerHTML = `
                    <div class="message-avatar">👤</div>
                    <div class="message-content">
                        <div>🖼️ ${fileName} <span style="font-size:9px; color:#888;">(${fileSize})</span></div>
                        <img src="${imageUrl}" class="chat-image" onclick="window.open('${imageUrl}')">
                        <div class="message-time">${time}</div>
                    </div>
                `;
                
                this.messagesContainer.appendChild(messageDiv);
                this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
                
                const messages = this.getMessages ? this.getMessages() : [];
                if (this.saveMessages) {
                    messages.push({
                        text: `🖼️ ${fileName} (${fileSize})`,
                        image: imageUrl,
                        isUser: true,
                        timestamp: Date.now()
                    });
                    this.saveMessages(messages);
                }
            }
            
            addFileMessage(fileData, fileName, fileSize, extension) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'message user';
                const time = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                const fileIcon = this.getFileIcon(extension);
                
                // Cria um link para download do arquivo
                const downloadUrl = fileData;
                
                messageDiv.innerHTML = `
                    <div class="message-avatar">👤</div>
                    <div class="message-content">
                        <div>📎 Arquivo anexado</div>
                        <div class="chat-file" onclick="window.open('${downloadUrl}')">
                            <div class="file-icon">${fileIcon}</div>
                            <div class="file-info">
                                <div class="file-name">${fileName}</div>
                                <div class="file-size">${fileSize}</div>
                            </div>
                            <div class="file-badge">${extension}</div>
                        </div>
                        <div class="message-time">${time}</div>
                    </div>
                `;
                
                this.messagesContainer.appendChild(messageDiv);
                this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
                
                const messages = this.getMessages ? this.getMessages() : [];
                if (this.saveMessages) {
                    messages.push({
                        text: `📎 ${fileName} (${fileSize})`,
                        fileData: fileData,
                        isUser: true,
                        timestamp: Date.now()
                    });
                    this.saveMessages(messages);
                }
            }
        }
        
        // =========================
        // CONFIGURAÇÃO ESPECÍFICA DO MERLIM
        // =========================
        
        const config = {
            name: 'MERLIM',
            title: '✦ REINO TECNOLÓGICO • ENGENHEIRA MÁGICA ✦',
            color: '#00d9ff',
            icon: '🔧',
            modelPath: '../models/merlim.glb',
            modelScale: 0.5,
            modelPositionY: -0.25,
            bgColor: 0x050a18,
            cameraPosition: { x: 3.2, y: 2.2, z: 4.2 },
            welcomeMessage: '✨ Bem-vindo ao meu reino tecnológico. Sou Merlim, a engenheira mágica. Código, sistemas e arquitetura são meus encantamentos.',
            skills: [
                { name: '🔧 Arquitetura de Sistemas', value: 97 },
                { name: '⚡ Programação & Código', value: 96 },
                { name: '🛠️ Mecânica do Sistema', value: 94 },
                { name: '✨ Magia da Engenharia', value: 98 }
            ],
            personalityText: '🔧 "Código é magia, engenharia é arte. Eu construo mundos."<br>Merlim é a arquiteta do sistema, une tecnologia e misticismo.',
            getResponse: (msg) => {
                const lower = msg.toLowerCase();
                if (lower.includes('olá') || lower.includes('oi')) return "✨ Olá! Sou Merlim, a engenheira mágica. Código é minha poesia. Como posso te ajudar a construir algo incrível?";
                if (lower.includes('código') || lower.includes('programação')) return "🔧 Código é magia pura! Posso ajudar com arquitetura de sistemas, debug, otimização. Qual linguagem ou projeto você está trabalhando?";
                if (lower.includes('arquitetura') || lower.includes('sistema')) return "🏗️ Arquitetura de sistemas é minha especialidade. Posso ajudar a estruturar projetos robustos e escaláveis.";
                if (lower.includes('bug') || lower.includes('erro')) return "🐛 Um bug? Deixe-me analisar... Como engenheira mágica, consigo rastrear e resolver problemas com eficiência.";
                if (lower.includes('imagem') || lower.includes('foto') || lower.includes('arquivo')) return "📎 Arquivo recebido! Processando dados... Tudo está em ordem no sistema.";
                if (lower.includes('obrigado')) return "💙 Por nada! Foi um prazer mágico te ajudar. Estou sempre aqui para construir e reparar o que for necessário.";
                return "🔮 Como arquiteta deste reino tecnológico, vejo padrões e soluções onde outros veem caos. Me conte seu desafio, e juntos vamos construir a resposta.";
            }
        };
        
        // =========================
        // BOTÃO PORTAL PLANNER
        // =========================
        const portalPlannerBtn = document.getElementById('portalPlannerBtn');
        
        function openPortalPlanner() {
            localStorage.setItem('lastAsura', 'merlim');
            document.body.classList.add('transition-out');
            const flashOverlay = document.createElement('div');
            flashOverlay.style.cssText = `
                position: fixed;
                inset: 0;
                background: radial-gradient(circle, #00d9ff, transparent);
                opacity: 0;
                transition: opacity 0.5s ease;
                z-index: 10000;
                pointer-events: none;
            `;
            document.body.appendChild(flashOverlay);
            requestAnimationFrame(() => {
                flashOverlay.style.opacity = '0.8';
                setTimeout(() => {
                    window.location.href = '../shared/portals/portal-system.html?asura=merlim';
                }, 400);
            });
        }
        
        if (portalPlannerBtn) {
            portalPlannerBtn.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                openPortalPlanner();
            });
            console.log("✅ Botão do portal configurado para MERLIM!");
        }
        
        // =========================
        // BOTÃO VOLTAR DO CELULAR (ASURA → GRIMÓRIO)
        // =========================
        function voltarAoGrimorio() {
            document.body.classList.add('transition-out');
            
            const flash = document.createElement('div');
            flash.style.cssText = `
                position: fixed;
                inset: 0;
                background: radial-gradient(circle, ${config.color}, transparent);
                opacity: 0;
                transition: opacity 0.4s ease;
                z-index: 100000;
                pointer-events: none;
            `;
            document.body.appendChild(flash);
            
            requestAnimationFrame(() => {
                flash.style.opacity = '0.8';
                setTimeout(() => {
                    window.location.href = '../index.html';
                }, 350);
            });
        }
        
        window.addEventListener('popstate', (event) => {
            event.preventDefault();
            history.pushState(null, null, window.location.href);
            voltarAoGrimorio();
        });
        
        history.pushState(null, null, window.location.href);
        console.log("✅ Botão 'voltar' do celular configurado para voltar ao Grimório!");
        
        // =========================
        // SETUP 3D COMPLETO COM EFEITOS (PRESERVADO)
        // =========================
        
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(config.bgColor);
        scene.fog = new THREE.FogExp2(config.bgColor, 0.01);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(config.cameraPosition.x, config.cameraPosition.y, config.cameraPosition.z);
        camera.lookAt(0, 0.8, 0);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.rotateSpeed = 1.0;
        controls.target.set(0, 0.8, 0);
        
        // Luzes
        const ambientLight = new THREE.AmbientLight(0x112244, 0.6);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xaaddff, 1.1);
        mainLight.position.set(3, 5, 2);
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(config.color, 0.8);
        fillLight.position.set(1, 2, 2);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0x3388ff, 0.5);
        backLight.position.set(-2, 1.5, -3);
        scene.add(backLight);
        const techLight = new THREE.PointLight(0x66eeff, 0.4);
        techLight.position.set(2, 1.5, 1.5);
        scene.add(techLight);
        
        // Chão
        const gridHelper = new THREE.GridHelper(14, 24, config.color, 0x2266aa);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);
        
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(9, 9),
            new THREE.MeshStandardMaterial({ color: 0x0a1030, roughness: 0.4, metalness: 0.5, transparent: true, opacity: 0.5 })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.5;
        scene.add(groundPlane);
        
        // Círculo de energia
        const circleGlow = new THREE.Mesh(
            new THREE.CircleGeometry(1.3, 32),
            new THREE.MeshStandardMaterial({ color: config.color, emissive: config.color, emissiveIntensity: 0.5, transparent: true, opacity: 0.6, side: THREE.DoubleSide })
        );
        circleGlow.rotation.x = -Math.PI / 2;
        circleGlow.position.y = -0.45;
        scene.add(circleGlow);
        
        // Anel holográfico
        const hologramRingGeometry = new THREE.TorusGeometry(1.5, 0.03, 64, 200);
        const hologramMaterial = new THREE.MeshStandardMaterial({ color: config.color, emissive: config.color, emissiveIntensity: 0.4, transparent: true, opacity: 0.7 });
        const hologramRing = new THREE.Mesh(hologramRingGeometry, hologramMaterial);
        hologramRing.position.y = 0.1;
        hologramRing.rotation.x = Math.PI / 2;
        scene.add(hologramRing);
        
        // Torres tecnológicas
        const towerMaterial = new THREE.MeshStandardMaterial({ color: 0x2288cc, emissive: 0x1155aa, emissiveIntensity: 0.2, metalness: 0.8, roughness: 0.2 });
        
        function createTechTower(x, z, height = 1.3) {
            const group = new THREE.Group();
            const tower = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.18, height, 8), towerMaterial);
            tower.position.y = 0;
            group.add(tower);
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.2, 0.025, 16, 32), new THREE.MeshStandardMaterial({ color: config.color, emissive: config.color, emissiveIntensity: 0.3 }));
            ring.position.y = height / 2;
            ring.rotation.x = Math.PI / 2;
            group.add(ring);
            const ring2 = new THREE.Mesh(new THREE.TorusGeometry(0.18, 0.02, 16, 32), new THREE.MeshStandardMaterial({ color: 0x66eeff, emissive: config.color, emissiveIntensity: 0.3 }));
            ring2.position.y = height / 3;
            ring2.rotation.x = Math.PI / 2;
            group.add(ring2);
            group.position.set(x, -0.4, z);
            return group;
        }
        
        const towerPositions = [
            [-2.8, -2.5], [2.8, -2.5], [-2.8, 2.5], [2.8, 2.5],
            [-2, -3.2], [2, -3.2], [-3.2, -1.8], [3.2, -1.8],
            [-3.2, 1.8], [3.2, 1.8], [-2, 3.2], [2, 3.2]
        ];
        
        towerPositions.forEach(pos => {
            const tower = createTechTower(pos[0], pos[1], 1.0 + Math.random() * 0.4);
            scene.add(tower);
        });
        
        // Partículas
        const particleCount = 1800;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 15;
            particlePositions[i*3+1] = Math.random() * 5;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 13;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        
        const particleColors = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const colorType = Math.random();
            if (colorType < 0.5) {
                particleColors[i*3] = 0.0;
                particleColors[i*3+1] = 0.7 + Math.random() * 0.3;
                particleColors[i*3+2] = 0.8 + Math.random() * 0.2;
            } else if (colorType < 0.75) {
                particleColors[i*3] = 0.8 + Math.random() * 0.2;
                particleColors[i*3+1] = 0.8 + Math.random() * 0.2;
                particleColors[i*3+2] = 1.0;
            } else {
                particleColors[i*3] = 0.5 + Math.random() * 0.5;
                particleColors[i*3+1] = 0.5 + Math.random() * 0.5;
                particleColors[i*3+2] = 0.8 + Math.random() * 0.2;
            }
        }
        particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
        
        const particleMaterial = new THREE.PointsMaterial({ size: 0.045, vertexColors: true, transparent: true, opacity: 0.55 });
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);
        
        // Anéis de energia
        const ringGeometry1 = new THREE.TorusGeometry(1.2, 0.035, 64, 200);
        const ringMaterial1 = new THREE.MeshStandardMaterial({ color: config.color, emissive: config.color, emissiveIntensity: 0.5 });
        const ring1 = new THREE.Mesh(ringGeometry1, ringMaterial1);
        ring1.position.y = 0.15;
        ring1.rotation.x = Math.PI / 2;
        scene.add(ring1);
        
        const ringGeometry2 = new THREE.TorusGeometry(1.5, 0.03, 64, 200);
        const ringMaterial2 = new THREE.MeshStandardMaterial({ color: 0x66eeff, emissive: config.color, emissiveIntensity: 0.4 });
        const ring2 = new THREE.Mesh(ringGeometry2, ringMaterial2);
        ring2.position.y = 0.05;
        ring2.rotation.x = Math.PI / 2 + 0.3;
        scene.add(ring2);
        
        const ringGeometry3 = new THREE.TorusGeometry(0.9, 0.025, 64, 200);
        const ring3 = new THREE.Mesh(ringGeometry3, ringMaterial1);
        ring3.position.y = 0.25;
        ring3.rotation.x = Math.PI / 2 - 0.2;
        scene.add(ring3);
        
        // Símbolos de código
        const codeSymbols = ['{', '}', '</>', '[]', '()', ';', '#', '~', 'const', 'let', 'function', '=>', 'class'];
        const symbols = [];
        
        for (let i = 0; i < 40; i++) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 128;
            context.fillStyle = config.color;
            context.font = 'Bold 36px monospace';
            context.textAlign = 'center';
            context.fillText(codeSymbols[Math.floor(Math.random() * codeSymbols.length)], canvas.width/2, canvas.height/2);
            
            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.3 });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(0.4, 0.2, 1);
            sprite.position.set(
                (Math.random() - 0.5) * 6,
                Math.random() * 3,
                (Math.random() - 0.5) * 6
            );
            scene.add(sprite);
            symbols.push(sprite);
        }
        
        // Engrenagens
        const gearMaterial = new THREE.MeshStandardMaterial({ color: 0x44aaff, metalness: 0.9, roughness: 0.2 });
        
        function createGear(x, z, yOffset, size = 0.15) {
            const gear = new THREE.Mesh(new THREE.CylinderGeometry(size, size, 0.05, 12), gearMaterial);
            gear.position.set(x, yOffset, z);
            return gear;
        }
        
        const gearPositions = [
            [-1.2, 0.4, 1.5], [1.2, 0.4, 1.5], [-1.5, 0.6, -1.2], [1.5, 0.6, -1.2],
            [-0.8, 0.3, 2.2], [0.8, 0.3, 2.2], [2.2, 0.5, -0.8], [-2.2, 0.5, 0.8]
        ];
        
        gearPositions.forEach(pos => {
            const gear = createGear(pos[0], pos[2], pos[1], 0.12 + Math.random() * 0.08);
            scene.add(gear);
        });
        
        // Modelo 3D
        const loader = new GLTFLoader();
        let merlimModel = null;
        let mixer = null;
        
        loader.load(config.modelPath, (gltf) => {
            merlimModel = gltf.scene;
            merlimModel.position.set(0, config.modelPositionY, 0);
            merlimModel.scale.set(config.modelScale, config.modelScale, config.modelScale);
            merlimModel.traverse((node) => {
                if (node.isMesh) {
                    node.castShadow = true;
                    node.receiveShadow = false;
                }
            });
            scene.add(merlimModel);
            
            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(merlimModel);
                gltf.animations.forEach((clip) => {
                    mixer.clipAction(clip).play();
                });
                console.log(`✅ ${gltf.animations.length} animação(ões) ativada(s)`);
            }
            
            console.log('✅ Modelo do MERLIM carregado');
        }, undefined, (error) => {
            console.error('❌ Erro ao carregar modelo:', error);
            const fallbackModel = new THREE.Mesh(new THREE.SphereGeometry(0.7, 32, 32), new THREE.MeshStandardMaterial({ color: config.color, emissive: config.color, emissiveIntensity: 0.5, metalness: 0.8, roughness: 0.2 }));
            fallbackModel.position.set(0, 0.2, 0);
            scene.add(fallbackModel);
            const techRing = new THREE.Mesh(new THREE.TorusGeometry(0.95, 0.04, 32, 60), new THREE.MeshStandardMaterial({ color: 0x66eeff, emissive: config.color, emissiveIntensity: 0.4 }));
            techRing.position.set(0, 0.5, 0);
            techRing.rotation.x = Math.PI / 2;
            scene.add(techRing);
        });
        
        // Animação
        let time = 0;
        let deltaTime = 0.016;
        let lastTime = performance.now();
        
        function updateDelta() {
            const now = performance.now();
            deltaTime = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            requestAnimationFrame(updateDelta);
        }
        updateDelta();
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.008;
            
            if (mixer) mixer.update(deltaTime);
            
            particles.rotation.y = time * 0.06;
            particles.rotation.x = Math.sin(time * 0.12) * 0.08;
            
            ring1.rotation.z = time * 0.35;
            ring2.rotation.z = -time * 0.28;
            ring3.rotation.z = time * 0.2;
            hologramRing.rotation.z = time * 0.15;
            
            symbols.forEach((symbol, idx) => {
                symbol.material.opacity = 0.25 + Math.sin(time * 1.5 + idx) * 0.15;
                symbol.position.y += 0.001;
                if (symbol.position.y > 2.5) symbol.position.y = 0;
            });
            
            fillLight.intensity = 0.6 + Math.sin(time * 2.8) * 0.2;
            circleGlow.material.emissiveIntensity = 0.3 + Math.sin(time * 2.2) * 0.2;
            hologramRing.material.emissiveIntensity = 0.3 + Math.sin(time * 1.5) * 0.15;
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // =========================
        // UI E CHAT
        // =========================
        
        initUI(config);
        
        const chat = new EnhancedChatSystem('chatContainer', config, (response) => {
            if (voice && voice.isJarvisActive && voice.isJarvisActive()) {
                voice.speak(response);
            }
        });
        
        const voiceButton = document.getElementById('voiceButton');
        let voice = null;
        
        if (voiceButton) {
            voice = new VoiceAssistant(
                voiceButton,
                (text, isContinuous) => {
                    document.getElementById('chatInput').value = text;
                    chat.send();
                },
                null,
                { asuraName: config.name, continuous: true }
            );
        }
        
        setTimeout(() => {
            chat.addMessage(config.welcomeMessage, false);
            setTimeout(() => {
                chat.addMessage("🎤 Dica: Clique no ícone 💻 no topo para ativar o MODO JARVIS. Vou ficar sempre ouvindo!", false);
                chat.addMessage("📎 Dica: Clique no ícone 📎 para enviar qualquer arquivo (imagem, PDF, DOC, etc)!", false);
                chat.addMessage("🗺️ Dica: Clique no botão do mapa 🗺️ no TOPO ESQUERDO para acessar o PORTAL PLANNER!", false);
            }, 2000);
        }, 500);
        
        const portalOverlay = document.getElementById('portalOverlay');
        portalOverlay.style.setProperty('--asura-color', config.color);
        setTimeout(() => {
            portalOverlay.style.opacity = '0.6';
            setTimeout(() => {
                portalOverlay.style.opacity = '0';
                setTimeout(() => {
                    portalOverlay.style.display = 'none';
                }, 800);
            }, 500);
        }, 50);
        
        console.log('🟢 MERLIM carregado com UPLOAD DE QUALQUER ARQUIVO!');
    </script>
</body>
</html>
