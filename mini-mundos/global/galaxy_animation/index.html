<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Galaxy Azura | Mini-Mundo</title>

    <link rel="stylesheet" href="./style.css">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
        }
        
        .webgl {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        #backToPortal {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            border: 1px solid #44aaff;
            color: #44aaff;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-family: monospace;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 1000;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(68,170,255,0.3);
        }
        
        #backToPortal:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(68,170,255,0.6);
        }
        
        body.transition-out {
            opacity: 0;
            transform: scale(0.98);
            transition: all 0.4s ease;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: #88ccff;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 10px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <canvas class="webgl"></canvas>

    <button id="backToPortal">
        ⤺ VOLTAR PARA O PORTAL
    </button>
    
    <div class="info">🌀 GALÁXIA • Mini-Mundo</div>

    <script type="module" src="script2.js"></script>

    <script>
        const backButton = document.getElementById('backToPortal');
        
        function voltarParaPortal() {
            // Pega a asura da URL (ex: ?asura=atena)
            const urlParams = new URLSearchParams(window.location.search);
            const asura = urlParams.get('asura') || 'merlim';
            
            document.body.classList.add('transition-out');
            
            const flash = document.createElement('div');
            flash.style.cssText = `
                position: fixed;
                inset: 0;
                background: radial-gradient(circle, #44aaff, transparent);
                opacity: 0;
                transition: opacity 0.5s ease;
                z-index: 10000;
                pointer-events: none;
            `;
            document.body.appendChild(flash);
            
            requestAnimationFrame(() => {
                flash.style.opacity = '0.8';
                setTimeout(() => {
                    // VOLTA PARA O PORTAL PLANNER com a mesma asura
                    window.location.href = `../shared/portals/portal-system.html?asura=${asura}`;
                }, 400);
            });
        }
        
        if (backButton) {
            backButton.addEventListener('click', (e) => {
                e.preventDefault();
                voltarParaPortal();
            });
        }
        
        // BOTÃO VOLTAR DO CELULAR
        function voltarAoPortalCelular() {
            const urlParams = new URLSearchParams(window.location.search);
            const asura = urlParams.get('asura') || 'merlim';
            
            document.body.classList.add('transition-out');
            
            const flash = document.createElement('div');
            flash.style.cssText = `
                position: fixed;
                inset: 0;
                background: radial-gradient(circle, #44aaff, transparent);
                opacity: 0;
                transition: opacity 0.4s ease;
                z-index: 100000;
                pointer-events: none;
            `;
            document.body.appendChild(flash);
            
            requestAnimationFrame(() => {
                flash.style.opacity = '0.8';
                setTimeout(() => {
                    window.location.href = `../shared/portals/portal-system.html?asura=${asura}`;
                }, 350);
            });
        }
        
        window.addEventListener('popstate', (event) => {
            event.preventDefault();
            history.pushState(null, null, window.location.href);
            voltarAoPortalCelular();
        });
        
        history.pushState(null, null, window.location.href);
        
        console.log("✅ Galáxia: volta para o PORTAL PLANNER");
    </script>

</body>

</html>
