<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diva Realm</title>

<style>

*{
	margin:0;
	padding:0;
	box-sizing:border-box;
}

body{
	width:100%;
	height:100vh;
	overflow:hidden;
	background:
		radial-gradient(circle at center,
		#ff4db8,
		#170010,
		#000000);
	font-family:sans-serif;
}

.portal{
	position:absolute;
	inset:0;
	background:
		radial-gradient(circle,
		rgba(255,255,255,0.15),
		transparent 60%);
	animation:pulse 4s infinite;
}

.fog{
	position:absolute;
	inset:0;
	backdrop-filter:blur(10px);
	background:rgba(255,0,140,0.05);
}

.title{
	position:absolute;
	left:50%;
	top:50%;
	transform:translate(-50%,-50%);
	font-size:6rem;
	color:white;
	text-shadow:
		0 0 20px #ff4db8,
		0 0 80px #ff4db8;
	letter-spacing:10px;
}

@keyframes pulse{
	0%{transform:scale(1);opacity:0.6;}
	50%{transform:scale(1.08);opacity:1;}
	100%{transform:scale(1);opacity:0.6;}
}

</style>
</head>
<body>
<div class="portal"></div>
<div class="fog"></div>
<h1 class="title">DIVA</h1>
</body>
</html>
