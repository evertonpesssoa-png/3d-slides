<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hestia Realm</title>
<style>
body{
	margin:0;
	overflow:hidden;
	height:100vh;
	background:
		radial-gradient(circle,
		#fff0b3,
		#5e5330,
		#000000);
}

.glow{
	position:absolute;
	inset:0;
	background:
		radial-gradient(circle,
		rgba(255,255,255,0.2),
		transparent 70%);
}

.title{
	position:absolute;
	top:50%;
	left:50%;
	transform:translate(-50%,-50%);
	font-size:6rem;
	color:white;
	text-shadow:0 0 50px #fff0b3;
}
</style>
</head>
<body>
<div class="glow"></div>
<h1 class="title">HESTIA</h1>
</body>
</html>
