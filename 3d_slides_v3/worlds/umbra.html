<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umbra Realm</title>
<style>
body{
	margin:0;
	overflow:hidden;
	height:100vh;
	background:
		radial-gradient(circle,
		#8b2fff,
		#120018,
		#000000);
}

.shadow{
	position:absolute;
	inset:0;
	background:
		radial-gradient(circle,
		rgba(255,255,255,0.05),
		transparent 70%);
	filter:blur(40px);
}

.title{
	position:absolute;
	top:50%;
	left:50%;
	transform:translate(-50%,-50%);
	font-size:6rem;
	color:#d7b4ff;
	text-shadow:
		0 0 20px #8b2fff,
		0 0 100px #8b2fff;
}
</style>
</head>
<body>
<div class="shadow"></div>
<h1 class="title">UMBRA</h1>
</body>
</html>
