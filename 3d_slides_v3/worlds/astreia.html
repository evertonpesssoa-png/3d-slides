<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astreia Realm</title>
<style>
body{
	margin:0;
	overflow:hidden;
	height:100vh;
	background:
		radial-gradient(circle,
		#287bff,
		#050d30,
		#000000);
}

.stars{
	position:absolute;
	inset:0;
	background-image:radial-gradient(white 1px, transparent 1px);
	background-size:40px 40px;
	opacity:0.4;
}

.title{
	position:absolute;
	top:50%;
	left:50%;
	transform:translate(-50%,-50%);
	font-size:6rem;
	color:white;
	text-shadow:0 0 50px #287bff;
}
</style>
</head>
<body>
<div class="stars"></div>
<h1 class="title">ASTREIA</h1>
</body>
</html>
