<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siria Realm</title>
<style>
body{
	margin:0;
	overflow:hidden;
	height:100vh;
	background:
		radial-gradient(circle,
		#35ff9c,
		#021a10,
		#000000);
}

.layer{
	position:absolute;
	inset:0;
	background:
		linear-gradient(
		to top,
		rgba(0,0,0,0.8),
		transparent
		);
}

.title{
	position:absolute;
	top:50%;
	left:50%;
	transform:translate(-50%,-50%);
	font-size:6rem;
	color:#d8ffe9;
	text-shadow:0 0 40px #35ff9c;
}
</style>
</head>
<body>
<div class="layer"></div>
<h1 class="title">SIRIA</h1>
</body>
</html>
