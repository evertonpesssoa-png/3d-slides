<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <link rel="stylesheet" href="./style.css">

    <title>Banner</title>
</head>

<body>

    <div class="banner">

        <!-- =========================
             SLIDER 3D
        ========================== -->

        <div class="slider" style="--quantity: 9">

            <div class="item" style="--position: 1">
                <img src="images/siria.png" alt="Siria">
            </div>

            <div class="item" style="--position: 2">
                <img src="images/umbra.png" alt="Umbra">
            </div>

            <div class="item" style="--position: 3">
                <img src="images/astreia.png" alt="Astreia">
            </div>

            <div class="item" style="--position: 4">
                <img src="images/daedala.png" alt="Daedala">
            </div>

            <div class="item" style="--position: 5">
                <img src="images/merlim.png" alt="Merlim">
            </div>

            <div class="item" style="--position: 6">
                <img src="images/victoria.png" alt="Victoria">
            </div>

            <div class="item" style="--position: 7">
                <img src="images/atena.png" alt="Atena">
            </div>

            <div class="item" style="--position: 8">
                <img src="images/hestia.png" alt="Hestia">
            </div>

            <div class="item" style="--position: 9">
                <img src="images/diva.png" alt="Diva">
            </div>

        </div>

        <!-- =========================
             CONTENT
        ========================== -->

        <div class="content">

            <h1 data-content="ASURAS">
                ASURAS
            </h1>

            <div class="author">

                <h2>Mestre</h2>

                <p>
                    <b>Grimório Digital</b>
                </p>

                <p>
                    Sistema Modular Asura
                </p>

            </div>

            <div class="model"></div>

        </div>

    </div>

</body>

</html>
