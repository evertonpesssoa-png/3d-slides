<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        http-equiv="X-UA-Compatible"
        content="IE=edge"
    >

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <link rel="stylesheet" href="./style.css">

    <title>ASURAS</title>

</head>

<body>

    <div class="banner">

        <!-- =========================
             PARTICULAS
        ========================== -->

        <canvas id="particles"></canvas>

        <!-- =========================
             SLIDER 3D
        ========================== -->

        <div class="slider" style="--quantity: 9">

            <!-- DIVA -->

            <div
                class="item"
                data-asura="diva"
                data-color="#ff4db8"
                style="--position: 1"
            >
                <img src="images/diva.png" alt="Diva">
            </div>

            <!-- SIRIA -->

            <div
                class="item"
                data-asura="siria"
                data-color="#35ff9c"
                style="--position: 2"
            >
                <img src="images/siria.png" alt="Siria">
            </div>

            <!-- MERLIM -->

            <div
                class="item"
                data-asura="merlim"
                data-color="#00d9ff"
                style="--position: 3"
            >
                <img src="images/merlim.png" alt="Merlim">
            </div>

            <!-- ASTREIA -->

            <div
                class="item"
                data-asura="astreia"
                data-color="#287bff"
                style="--position: 4"
            >
                <img src="images/astreia.png" alt="Astreia">
            </div>

            <!-- UMBRA -->

            <div
                class="item"
                data-asura="umbra"
                data-color="#8b2fff"
                style="--position: 5"
            >
                <img src="images/umbra.png" alt="Umbra">
            </div>

            <!-- ATENA -->

            <div
                class="item"
                data-asura="atena"
                data-color="#ffd54f"
                style="--position: 6"
            >
                <img src="images/atena.png" alt="Atena">
            </div>

            <!-- VITORIA -->

            <div
                class="item"
                data-asura="vitoria"
                data-color="#ff4444"
                style="--position: 7"
            >
                <img src="images/victoria.png" alt="Victoria">
            </div>

            <!-- HESTIA -->

            <div
                class="item"
                data-asura="hestia"
                data-color="#fff0b3"
                style="--position: 8"
            >
                <img src="images/hestia.png" alt="Hestia">
            </div>

            <!-- DAEDALA -->

            <div
                class="item"
                data-asura="daedala"
                data-color="#00ffd5"
                style="--position: 9"
            >
                <img src="images/daedala.png" alt="Daedala">
            </div>

        </div>

        <!-- =========================
             CONTENT
        ========================== -->

        <div class="content">

            <h1 data-content="ASURAS">
                ASURAS
            </h1>

            <div class="author">

                <h2>Mestre</h2>

                <p>
                    <b>Grimório Digital</b>
                </p>

                <p>
                    Sistema Modular Asura
                </p>

            </div>

            <div class="model"></div>

        </div>

    </div>

    <!-- =========================
         AUDIO
    ========================== -->

    <audio
        id="hoverSound"
        src="sounds/hover.mp3"
        preload="auto"
    ></audio>

    <!-- =========================
         SCRIPT
    ========================== -->

    <script src="script.js"></script>

</body>

</html>
